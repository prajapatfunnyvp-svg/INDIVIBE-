<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Facebook ❤️ Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        .fb-reels-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .fb-reels-feed::-webkit-scrollbar { display: none; }
        .reel-slide { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB TOP HEADER */
        .fb-top-header { position: absolute; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 100; }
        .fb-top-header i { font-size: 24px; margin-right: 15px; color: white; }
        .fb-top-header b { font-size: 20px; flex: 1; font-weight: 500; color: white; }

        /* FB SIDE BAR (Exactly as image, but with ❤️) */
        .fb-side-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 100; width: 45px; }
        .action-btn-group { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        /* 🔴 ONLY THIS CHANGE: Instagram Heart for Like ❤️ */
        .heart-icon { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.8)); transition: 0.1s; }
        .heart-icon.liked { color: #ff3040; } /* Instagram Red */

        /* CHAT, SHARE, MORE (FB STYLE) */
        .fb-style-icon { font-size: 28px !important; color: white; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.8)); }
        .action-count { font-size: 11px; margin-top: 3px; font-weight: 600; text-shadow: 0 1px 3px #000; }

        /* FB BOTTOM INFO */
        .fb-bottom-info { position: absolute; left: 15px; bottom: 100px; width: 75%; z-index: 100; }
        .fb-user-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .fb-u-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid white; }
        .fb-u-name { font-weight: 700; font-size: 15px; text-shadow: 0 1px 3px #000; }
        .fb-f-btn { background: transparent; border: 1px solid white; color: white; padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: 600; }
        .fb-reel-cap { font-size: 14px; text-shadow: 0 1px 3px #000; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="fb-reels-feed" id="main-feed"></div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function initFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('main-feed').innerHTML = data.map(v => `
                    <div class="reel-slide">
                        <div class="fb-top-header">
                            <i class="material-icons-outlined">arrow_back</i>
                            <b>Reels</b>
                            <i class="material-icons-outlined" style="margin-left:auto">search</i>
                            <i class="material-icons-outlined">more_vert</i>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="fb-bottom-info">
                            <div class="fb-user-meta">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="fb-u-avatar">
                                <span class="fb-u-name">Vishnupur Fifthoot</span>
                                <button class="fb-f-btn">Follow</button>
                            </div>
                            <div class="fb-reel-cap">${v.caption || 'Made with IndiVibe ❤️'}</div>
                        </div>
                        <div class="fb-side-actions">
                            <div class="action-btn-group" onclick="toggleHeart(this)">
                                <i class="material-icons-outlined heart-icon">favorite_border</i>
                                <span class="action-count">1.5M</span>
                            </div>
                            <div class="action-btn-group">
                                <i class="material-icons-outlined fb-style-icon">chat_bubble_outline</i>
                                <span class="action-count">45K</span>
                            </div>
                            <div class="action-btn-group" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons-outlined fb-style-icon" style="transform: scaleX(-1);">reply</i>
                                <span class="action-count">Share</span>
                            </div>
                            <div class="action-btn-group">
                                <i class="material-icons-outlined fb-style-icon">more_horiz</i>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        const video = e.target.querySelector('video');
                        if (e.isIntersecting) video.play().catch(a => {}); else { video.pause(); video.currentTime = 0; }
                    });
                }, { threshold: 0.8 });
                document.querySelectorAll('.reel-slide').forEach(r => obs.observe(r));
            }
        }

        function toggleHeart(el) {
            const i = el.querySelector('.heart-icon');
            if(i.innerText === 'favorite_border') {
                i.innerText = 'favorite'; i.style.color = '#ff3040';
            } else {
                i.innerText = 'favorite_border'; i.style.color = 'white';
            }
        }

        initFeed();
    </script>
</body>
</html>

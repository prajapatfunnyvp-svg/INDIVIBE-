<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE - Pro Reels</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Full Screen Snap Scroll */
        #feed { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }

        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Top Header (Back & Search) */
        .top-nav { position: absolute; top: 15px; width: 100%; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .back-text { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; }

        /* RIGHT SIDE ACTIONS (Facebook Style Vertical) */
        .right-ui { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 100; }
        .action-box { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-box i { font-size: 32px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .action-box span { font-size: 13px; font-weight: 600; margin-top: 2px; }
        
        /* Insta Heart Style */
        .insta-heart { color: #fff; transition: 0.2s; }
        .liked { color: #ff3040; }

        /* Bottom Left Info */
        .bottom-info { position: absolute; bottom: 80px; left: 15px; z-index: 100; max-width: 70%; }
        .profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #fff; }
        .name { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 4px; }
        .verify-icon { font-size: 16px; color: #1877F2; }

        /* Facebook Style Bottom Comment Bar */
        .comment-bar { position: absolute; bottom: 15px; width: 100%; padding: 0 12px; display: flex; align-items: center; gap: 10px; z-index: 100; }
        .input-box { flex: 1; background: rgba(255,255,255,0.2); border-radius: 30px; padding: 10px 18px; font-size: 15px; border: 0.5px solid rgba(255,255,255,0.3); color: #fff; }

        /* Double Tap Heart Animation */
        .pop-h { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; color: #fff; opacity: 0; z-index: 200; pointer-events: none; }
        .pop-h.active { animation: fbInstaPop 0.8s ease; }
        @keyframes fbInstaPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="feed"></div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadReels() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(v => `
                    <div class="reel">
                        <div class="top-nav">
                            <div class="back-text"><i class="material-icons">arrow_back</i> Reels</div>
                            <div style="display:flex; gap:15px;"><i class="material-icons">search</i><i class="material-icons">account_circle</i></div>
                        </div>

                        <video src="${v.video_url}" loop playsinline onclick="playToggle(this)" ondblclick="doLike(this)"></video>
                        <div class="pop-h material-icons">favorite</div>

                        <div class="right-ui">
                            <div class="action-box" onclick="doLike(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons insta-heart l-icon">favorite_border</i><span>1</span>
                            </div>
                            <div class="action-box"><i class="material-icons">chat_bubble_outline</i><span>0</span></div>
                            <div class="action-box" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons">reply</i><span>Share</span></div>
                            <div class="action-box" onclick="window.open('${v.video_url}')"><i class="material-icons">download</i></div>
                            <div class="action-box"><i class="material-icons">more_horiz</i></div>
                        </div>

                        <div class="bottom-info">
                            <div class="profile-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="avatar">
                                <span class="name">Vishnupur Fifthoot <i class="material-icons verify-icon">check_circle</i></span>
                            </div>
                            <p class="caption">${v.caption || ''}</p>
                        </div>

                        <div class="comment-bar">
                            <div class="input-box">कमेंट जोड़ें...</div>
                            <i class="material-icons">sentiment_satisfied</i>
                        </div>
                    </div>
                `).join('');
                startPlayer();
            }
        }

        let tTimer;
        function playToggle(v) {
            if (tTimer) return;
            tTimer = setTimeout(() => { v.paused ? v.play() : v.pause(); tTimer = null; }, 250);
        }

        function doLike(v) {
            clearTimeout(tTimer); tTimer = null;
            const pop = v.parentElement.querySelector('.pop-h');
            pop.classList.add('active');
            setTimeout(() => pop.classList.remove('active'), 800);
            
            const heart = v.parentElement.querySelector('.l-icon');
            heart.innerText = 'favorite'; 
            heart.classList.add('liked');
        }

        function startPlayer() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => obs.observe(r));
        }

        loadReels();
    </script>
</body>
</html>

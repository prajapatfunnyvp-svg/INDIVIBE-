<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe Vibe - Core Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Full Screen Feed */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* INTERACTIVE SIDEBAR */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action { text-align: center; cursor: pointer; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .action i { font-size: 35px; color: #fff; }
        .action span { font-size: 11px; margin-top: 5px; font-weight: 600; }
        .liked { color: #ff3040 !important; font-variation-settings: 'FILL' 1; }

        /* BRANDING */
        .branding { position: absolute; top: 40px; right: 15px; display: flex; align-items: center; gap: 8px; z-index: 100; pointer-events: none; }
        .branding img { width: 22px; height: 22px; border-radius: 4px; }
        .branding span { font-weight: bold; font-size: 16px; text-shadow: 1px 1px 4px #000; }

        /* FOOTER & FOLLOW */
        .video-meta { position: absolute; bottom: 145px; left: 16px; z-index: 100; width: 75%; }
        .profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .profile-pic { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .v-tick { color: #1877F2; font-size: 16px; }
        .follow-label { border: 1px solid #fff; padding: 2px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }

        /* PILL COMMENT BOX (TRANSLUCENT) */
        .comment-area { position: fixed; bottom: 85px; width: 100%; padding: 0 16px; z-index: 1000; }
        .pill-wrapper { background: rgba(255,255,255,0.18); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; }
        .pill-wrapper input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 14px; }
        .pill-wrapper input::placeholder { color: rgba(255,255,255,0.7); }

        /* OPTIONS MENU (3-Dot) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; }
        .menu-sheet { position: fixed; bottom: -100%; width: 100%; background: #262626; border-radius: 15px 15px 0 0; z-index: 3500; transition: 0.3s; padding: 15px 0; }
        .menu-sheet.active { bottom: 0; }
        .menu-row { display: flex; justify-content: space-around; padding: 10px 0 20px; border-bottom: 0.5px solid #333; }
        .menu-row-item { text-align: center; }
        .menu-row-item i { background: #333; padding: 12px; border-radius: 8px; font-size: 24px; }
        .menu-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; font-size: 16px; border-bottom: 0.1px solid #333; }
        .menu-item:last-child { border: none; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #222; z-index: 2500; }
        .nav-bar i { font-size: 30px; color: #fff; opacity: 0.5; }
        .active-tab { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div class="comment-area">
        <div class="pill-wrapper">
            <input type="text" id="comInput" placeholder="कमेंट जोड़ें..." onkeypress="if(event.key==='Enter') postCom()">
            <i class="material-icons" style="opacity:0.7;">sentiment_satisfied_alt</i>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>
    <div class="menu-sheet" id="menuSheet">
        <div style="width:40px; height:4px; background:#555; margin:0 auto 15px; border-radius:10px;"></div>
        <div class="menu-row">
            <div class="menu-row-item"><i class="material-icons">loop</i><p>Remix</p></div>
            <div class="menu-row-item"><i class="material-icons">layers</i><p>Sequence</p></div>
            <div class="menu-row-item"><i class="material-icons">sync</i><p>Auto-scroll</p></div>
        </div>
        <div class="menu-item"><i class="material-icons">fullscreen</i> View fullscreen</div>
        <div class="menu-item"><i class="material-icons">file_download</i> Download Video</div>
        <div class="menu-item" style="color:#ff3040;"><i class="material-icons">report_problem</i> Report</div>
    </div>

    <nav class="nav-bar">
        <i class="material-icons">home</i>
        <i class="material-icons">search</i>
        <i class="material-icons" style="font-size:38px;">add_box</i>
        <i class="material-icons active-tab">play_circle_outline</i>
        <i class="material-icons">person_outline</i>
    </nav>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', {ascending: false});
            if(data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="branding">
                            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png">
                            <span>Indivibe</span>
                        </div>
                        <div class="sidebar">
                            <div class="action" onclick="this.querySelector('i').classList.toggle('liked')"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="action" onclick="document.getElementById('comInput').focus()"><i class="material-icons">chat_bubble_outline</i><span>1,155</span></div>
                            <div class="action" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="action"><i class="material-icons">bookmark_border</i><span>Save</span></div>
                            <div class="action" onclick="toggleMenu(true)"><i class="material-icons">more_horiz</i></div>
                        </div>
                        <div class="video-meta">
                            <div class="profile-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="profile-pic">
                                <span style="font-weight:bold;">Vishnu Raj <i class="material-icons v-tick">check_circle</i></span>
                                <div class="follow-label" onclick="this.innerText='Following'; this.style.color='#aaa'">Follow</div>
                            </div>
                            <p>${v.caption || 'Naya Vibe! #indivibe'}</p>
                        </div>
                    </div>
                `).join('');
                initIntersectionObserver();
            }
        }

        function toggleMenu(show) { document.getElementById('menuSheet').classList.toggle('active', show); document.getElementById('overlay').style.display = show ? 'block' : 'none'; }
        function closeSheet() { toggleMenu(false); }
        function postCom() { alert('Comment Posted!'); document.getElementById('comInput').value = ''; }

        function initIntersectionObserver() {
            const obs = new IntersectionObserver(es => { es.forEach(e => { const v = e.target.querySelector('video'); if(e.isIntersecting) v.play(); else v.pause(); }); }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => obs.observe(c));
        }

        loadFeed();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro - Final UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* REELS FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FACEBOOK STYLE TOP HEADER (Match image_6) */
        .fb-top-bar { position: absolute; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); z-index: 100; }
        .fb-top-bar span { font-size: 28px; margin-right: 15px; cursor: pointer; }
        .fb-top-bar b { font-size: 20px; flex: 1; }

        /* FACEBOOK STYLE SIDE ACTIONS (Right Side) */
        .vibe-actions { position: absolute; right: 10px; bottom: 85px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
        
        /* 🔴 INSTAGRAM HEART (❤️) */
        .ig-heart { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); transition: 0.2s; }
        
        /* 🔵 FACEBOOK COMMENT & SHARE ICONS */
        .fb-icon { font-size: 30px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); opacity: 0.95; }
        .action-label { font-size: 12px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 3px #000; }

        /* FACEBOOK STYLE BOTTOM INFO */
        .vibe-info { position: absolute; left: 15px; bottom: 90px; width: 78%; z-index: 100; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; pointer-events: auto; }
        .user-pic { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid white; object-fit: cover; }
        .user-name { font-weight: 700; font-size: 15px; text-shadow: 0 1px 4px #000; }
        .follow-badge { border: 1.2px solid white; padding: 2px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); color: white; }
        .vibe-caption { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 4px #000; font-weight: 400; padding-left: 2px; pointer-events: auto; }

        /* OPTIONS TRAY (Bottom Sheet) */
        #menu-tray { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 2000; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding-bottom: 40px; }
        #menu-tray.open { bottom: 0; }
        .tray-handle { width: 36px; height: 4px; background: #555; border-radius: 10px; margin: 12px auto; }
        .tray-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 0.1px solid #333; cursor: pointer; font-size: 16px; font-weight: 600; color: white; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div id="menu-tray">
        <div class="tray-handle" onclick="closeTray()"></div>
        <div class="tray-item" id="btn-download"><span class="material-icons-outlined">file_download</span> Download Reel</div>
        <div class="tray-item" onclick="alert('Report submitted.')" style="color: #ff4d4d;"><span class="material-icons-outlined">report</span> Report Content</div>
        <div class="tray-item" onclick="closeTray()"><span class="material-icons-outlined">close</span> Cancel</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function fetchFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="fb-top-bar">
                            <span class="material-icons-outlined">arrow_back</span>
                            <b>Reels</b>
                            <span class="material-icons-outlined">search</span>
                            <span class="material-icons-outlined">account_circle</span>
                        </div>

                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pic">
                                <span class="user-name">@vishnu_vibes</span>
                                <div class="follow-badge">Follow</div>
                            </div>
                            <div class="vibe-caption">${v.caption || 'IndiVibe Quality Content'}</div>
                        </div>

                        <div class="vibe-actions">
                            <div class="action-item" onclick="handleLike(this)">
                                <span class="material-icons-outlined ig-heart">favorite_border</span>
                                <span class="action-label">1.5M</span>
                            </div>
                            <div class="action-item" onclick="alert('Comments opening...')">
                                <span class="material-icons-outlined fb-icon">mode_comment</span>
                                <span class="action-label">45K</span>
                            </div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})">
                                <span class="material-icons-outlined fb-icon">share</span>
                                <span class="action-label">Share</span>
                            </div>
                            <div class="action-item" onclick="openTray('${v.video_url}')">
                                <span class="material-icons-outlined fb-icon">more_horiz</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                startScrollObserver();
            }
        }

        function startScrollObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target.querySelector('video');
                    if (e.isIntersecting) { video.play().catch(() => {}); } 
                    else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => observer.observe(c));
        }

        function handleLike(el) {
            const icon = el.querySelector('.ig-heart');
            if(icon.innerText === 'favorite_border') {
                icon.innerText = 'favorite';
                icon.style.color = '#ff3040';
            } else {
                icon.innerText = 'favorite_border';
                icon.style.color = 'white';
            }
        }

        function openTray(url) {
            document.getElementById('menu-tray').classList.add('open');
            document.getElementById('btn-download').onclick = () => { window.open(url); closeTray(); };
        }

        function closeTray() { document.getElementById('menu-tray').classList.remove('open'); }

        fetchFeed();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe - Real Vibe App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Vibe Feed */
        #feed { height: calc(100vh - 130px); overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: calc(100vh - 130px); width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Real Watermark (Top Right) */
        .vibe-watermark { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 8px; z-index: 100; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 8px; }
        .vibe-watermark img { width: 20px; height: 20px; border-radius: 4px; }
        .vibe-watermark span { font-size: 14px; font-weight: bold; opacity: 0.9; }

        /* Sidebar Buttons */
        .vibe-sidebar { position: absolute; right: 12px; bottom: 40px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .sidebar-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .sidebar-item i { font-size: 32px; color: #fff; }
        .sidebar-item span { font-size: 11px; font-weight: 600; margin-top: 2px; }
        .vibe-liked { color: #ff3040 !important; }

        /* User Footer Info */
        .vibe-footer { position: absolute; bottom: 10px; left: 16px; z-index: 100; width: 75%; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .username { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 4px; }

        /* PERMANENT PILL COMMENT BOX (Bottom) */
        .comment-pill-container { position: fixed; bottom: 65px; width: 100%; padding: 10px 15px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 1000; }
        .comment-pill-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 50px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.2); }
        .comment-pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 14px; }
        .comment-pill-box input::placeholder { color: rgba(255,255,255,0.7); }
        .pill-icons { display: flex; gap: 12px; color: #fff; opacity: 0.8; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; z-index: 1001; }
        .nav-icon { color: #fff; opacity: 0.6; font-size: 28px; cursor: pointer; }
        .nav-icon.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="feed">
        </div>

    <div class="comment-pill-container">
        <div class="comment-pill-box">
            <input type="text" placeholder="कमेंट जोड़ें...">
            <div class="pill-icons">
                <i class="material-icons" style="font-size:20px;">alternate_email</i>
                <i class="material-icons" style="font-size:20px;">sentiment_satisfied_alt</i>
                <i class="material-icons" style="font-size:20px;">gif</i>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <i class="material-icons nav-icon active">home</i>
        <i class="material-icons nav-icon">search</i>
        <i class="material-icons nav-icon" style="font-size:38px;">add_box</i>
        <i class="material-icons nav-icon">play_circle_outline</i>
        <i class="material-icons nav-icon">person_outline</i>
    </nav>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function initApp() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="vibe-watermark">
                            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png">
                            <span>Indivibe</span>
                        </div>

                        <div class="vibe-sidebar">
                            <div class="sidebar-item" onclick="this.querySelector('i').classList.toggle('vibe-liked')">
                                <i class="material-icons">favorite</i><span>1.2M</span>
                            </div>
                            <div class="sidebar-item">
                                <i class="material-icons">chat_bubble</i><span>540</span>
                            </div>
                            <div class="sidebar-item" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons" style="transform:scaleX(-1)">reply</i><span>Share</span>
                            </div>
                            <div class="sidebar-item" onclick="this.querySelector('i').innerText='bookmark'">
                                <i class="material-icons-outlined">bookmark_border</i><span>Save</span>
                            </div>
                            <div class="sidebar-item"><i class="material-icons">more_horiz</i></div>
                        </div>

                        <div class="vibe-footer">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-avatar">
                                <span class="username">Vishnu Raj <i class="material-icons" style="color:#1877F2; font-size:14px;">check_circle</i></span>
                            </div>
                            <p style="font-size:14px; text-shadow:1px 1px 2px #000;">${v.caption || 'Naya Vibe, Nayi Shuruaat! #indivibe'}</p>
                        </div>
                    </div>
                `).join('');
                setupObserver();
            }
        }

        function setupObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) vid.play(); else vid.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(card => observer.observe(card));
        }

        initApp();
    </script>
</body>
</html>

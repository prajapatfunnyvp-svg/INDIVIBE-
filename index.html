<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe - Modern Feed</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        /* 📱 INSTAGRAM STYLE HEADER */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-logo { width: 40px; }
        .header-name { font-size: 26px; font-weight: 900; color: #00f2ea; margin-left: 10px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px #000; }

        /* 🎬 REELS CONTAINER (Starts after header) */
        .feed { height: calc(100vh - 60px); margin-top: 60px; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .v-card { height: calc(100vh - 60px); width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 💥 SOCIAL ICONS */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .icon-btn { text-align: center; font-size: 28px; filter: drop-shadow(2px 2px 5px #000); cursor: pointer; }
        .icon-btn span { font-size: 11px; display: block; font-family: sans-serif; }

        /* 🚀 SPLASH (LOADING) SCREEN */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .go-btn { background: linear-gradient(45deg, #00f2ea, #005f5c); color: #000; border: none; padding: 15px 50px; border-radius: 50px; font-weight: bold; font-size: 20px; box-shadow: 0 10px 20px rgba(0,242,234,0.3); margin-top:20px; }
    </style>
</head>
<body>

    <div class="app-header">
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="header-logo">
        <div class="header-name">IndiVibe</div>
    </div>

    <div id="main-feed" class="feed"></div>

    <div id="splash">
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:110px; filter: drop-shadow(0 0 15px #00f2ea);">
        <h1 style="color:#00f2ea; letter-spacing:4px; font-size:40px; margin: 10px 0;">IndiVibe</h1>
        <p style="color:#00f2ea; opacity:0.7;">Original Music Vibes</p>
        <button onclick="startApp()" class="go-btn">VIBE START KAREIN</button>
    </div>

    <script>
        function startApp() {
            document.getElementById('splash').style.display = 'none';
            const feed = document.getElementById('main-feed');
            
            // Backup Videos (Jaise chal rahe the)
            const backupVideos = [{u:'https://vjs.zencdn.net/v/oceans.mp4', n:'@Dshrat_Nayak'}];
            
            feed.innerHTML = backupVideos.map(v => `
                <div class="v-card">
                    <video src="${v.u}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                    <div class="side-icons">
                        <div class="icon-btn" onclick="alert('Video Liked!')">❤️<span>15.2k</span></div>
                        <div class="icon-btn" onclick="openChat()">💬<span>800</span></div>
                        <div class="icon-btn" onclick="shareApp()">🚀<span>Share</span></div>
                    </div>
                    <div style="position:absolute; bottom:40px; left:15px; text-shadow: 2px 2px 5px #000; font-family:sans-serif;">
                        <h4 style="margin:0;">${v.n}</h4>
                        <p style="font-size:14px; margin:5px 0;">🎵 Flute Music Session • Original Audio</p>
                    </div>
                </div>
            `).join('');
            document.querySelector('video').play();
        }

        function shareApp() {
            // Mobile ka asli share feature
            if (navigator.share) {
                navigator.share({ title: 'IndiVibe Music', url: window.location.href });
            } else {
                alert('Link Copied! Apne doston ko WhatsApp par bhein.');
            }
        }

        function openChat() {
            let msg = prompt("Iss video ke baare mein kya kehna hai?");
            if(msg) alert("Message Sent: " + msg);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE REELS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #start-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#00f2ea; }
        button { background:#00f2ea; color:#000; border:none; padding:20px 50px; border-radius:50px; font-weight:bold; font-size:22px; cursor:pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>INDIVIBE</h1>
        <button onclick="startNow()">START WATCHING</button>
    </div>

    <div id="feed" class="feed-container"></div>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        async function startNow() {
            document.getElementById('start-screen').style.display = 'none';
            
            try {
                const { data, error } = await _supa.from('videos').select('*');
                if (data && data.length > 0) {
                    const feed = document.getElementById('feed');
                    feed.innerHTML = data.map((item, index) => `
                        <div class="video-card">
                            <video id="vid-${index}" src="${item.video_url}" loop playsinline muted onclick="unmute(this)"></video>
                        </div>
                    `).join('');

                    // Pehle video ko chalu karein
                    const v = document.querySelector('video');
                    v.play();
                    alert("Tip: Video par tap karein awaz ke liye!");
                }
            } catch (e) {
                alert("Database Error!");
            }
        }

        function unmute(v) {
            v.muted = false;
            if(v.paused) v.play();
        }

        // Scroll hone par play/pause logic
        document.getElementById('feed').addEventListener('scroll', () => {
            const vids = document.querySelectorAll('video');
            vids.forEach(v => {
                const r = v.getBoundingClientRect();
                if(r.top >= 0 && r.top < window.innerHeight / 2) v.play();
                else v.pause();
            });
        });
    </script>
</body>
</html>

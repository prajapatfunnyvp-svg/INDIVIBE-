<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE - Live Reels</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .reels-container { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="reels-container" id="reels">
        <p id="loading" style="position: absolute;">Video Load Ho Raha Hai...</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const SUPABASE_ANON_KEY = 'Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        
        // Connection create karna
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchVideos() {
            const { data, error } = await _supabase.from('videos').select('*');
            
            if (error) {
                document.getElementById('loading').innerText = "Error: " + error.message;
                return;
            }

            const container = document.getElementById('reels');
            const loader = document.getElementById('loading');
            
            if (data && data.length > 0) {
                loader.style.display = 'none';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'reel';
                    div.innerHTML = `
                        <video src="${item.video_url}" loop autoplay muted playsinline></video>
                    `;
                    container.appendChild(div);
                });
            } else {
                loader.innerText = "Database mein koi video nahi mila!";
            }
        }
        fetchVideos();
    </script>
</body>
</html>

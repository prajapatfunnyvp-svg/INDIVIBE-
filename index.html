<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root { --neon: #00f2ea; --bg: #000; --border: #262626; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* PAGES */
        .page { display: none; height: 100vh; width: 100%; position: absolute; top: 0; }
        .page.active { display: block; }

        /* REELS FEED */
        #vibe-feed { overflow-y: scroll; scroll-snap-type: y mandatory; height: 100vh; scrollbar-width: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* OVERLAYS */
        .vibe-actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .vibe-icon { font-size: 35px !important; cursor: pointer; text-shadow: 0 2px 10px #000; }
        .vibe-info { position: absolute; left: 15px; bottom: 100px; width: 70%; z-index: 10; }

        /* UPLOAD MODAL & EDITING */
        .upload-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .preview-box { width: 100%; height: 300px; background: #111; border-radius: 15px; overflow: hidden; margin-bottom: 20px; position: relative; }
        .preview-box video { width: 100%; height: 100%; object-fit: contain; }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        
        /* FILTERS */
        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
        .filter-btn { padding: 8px 15px; background: #333; border-radius: 20px; font-size: 12px; white-space: nowrap; }

        .btn-main { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid var(--border); z-index: 100; }
    </style>
</head>
<body>

    <div id="vibe-feed" class="page active">
        <div style="padding: 100px 20px; text-align: center;">Vibes Load ho rahi hain...</div>
    </div>

    <div id="upload-page" class="upload-overlay">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="material-icons-outlined" onclick="closeUpload()">close</span>
            <h3 style="margin:0;">New Post</h3>
            <span style="color: var(--neon); font-weight: bold;" onclick="finalPublish()">Share</span>
        </div>

        <div class="preview-box">
            <video id="upload-preview" muted loop></video>
        </div>

        <textarea id="video-caption" placeholder="Write a caption or add #hashtags..."></textarea>
        
        <p style="font-size: 14px; color: gray;">Filters:</p>
        <div class="filter-scroll">
            <div class="filter-btn" onclick="applyFilter('none')">Normal</div>
            <div class="filter-btn" onclick="applyFilter('grayscale(100%)')">B&W</div>
            <div class="filter-btn" onclick="applyFilter('sepia(100%)')">Old Style</div>
            <div class="filter-btn" onclick="applyFilter('brightness(1.5)')">Bright</div>
            <div class="filter-btn" onclick="applyFilter('contrast(1.5)')">Sharp</div>
        </div>

        <div id="upload-status" style="text-align: center; color: var(--neon); font-size: 14px; margin-bottom: 10px;"></div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined" onclick="location.reload()">home</span>
        <span class="material-icons-outlined">search</span>
        <span class="material-icons-outlined" onclick="triggerFileInput()">add_box</span>
        <span class="material-icons-outlined">play_circle</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width: 26px; height: 26px; border-radius: 50%;">
    </div>

    <input type="file" id="actual-file-input" accept="video/*" style="display: none;" onchange="handleFileSelect(event)">

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        let selectedFile = null;
        let currentFilter = 'none';

        // 1. LOAD VIDEOS
        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map((v, i) => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()" style="filter: ${v.filter || 'none'}"></video>
                        <div class="vibe-info">
                            <b style="display:block; margin-bottom:5px;">@vishnu_vibes</b>
                            <p style="margin:0; font-size:14px;">${v.caption || 'No caption'}</p>
                        </div>
                        <div class="vibe-actions">
                            <span class="material-icons-outlined vibe-icon" onclick="this.style.color='red'; this.innerText='favorite'">favorite_border</span>
                            <span class="material-icons-outlined vibe-icon">chat_bubble_outline</span>
                            <span class="material-icons-outlined vibe-icon" onclick="navigator.share({url:'${v.video_url}'})">send</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 2. UPLOAD & EDITING LOGIC
        function triggerFileInput() { document.getElementById('actual-file-input').click(); }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                const url = URL.createObjectURL(selectedFile);
                document.getElementById('upload-preview').src = url;
                document.getElementById('upload-preview').play();
                document.getElementById('upload-page').style.display = 'flex';
            }
        }

        function applyFilter(filter) {
            currentFilter = filter;
            document.getElementById('upload-preview').style.filter = filter;
        }

        async function finalPublish() {
            if (!selectedFile) return;
            const status = document.getElementById('upload-status');
            status.innerText = "🚀 Processing & Uploading...";
            
            const fileName = `${Date.now()}_vibe.mp4`;
            const { data, error } = await supa.storage.from('vibe-videos').upload(fileName, selectedFile);
            
            if (!error) {
                const { data: urlData } = supa.storage.from('vibe-videos').getPublicUrl(fileName);
                const caption = document.getElementById('video-caption').value;
                
                await supa.from('videos').insert([{ 
                    video_url: urlData.publicUrl, 
                    caption: caption, 
                    filter: currentFilter,
                    is_safe: true 
                }]);
                
                status.innerText = "✅ Published Successfully!";
                setTimeout(() => location.reload(), 1500);
            } else {
                alert("Upload failed: " + error.message);
            }
        }

        function closeUpload() { document.getElementById('upload-page').style.display = 'none'; }

        loadVibes();
    </script>
</body>
</html>

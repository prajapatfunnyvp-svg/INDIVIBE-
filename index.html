<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 📱 HEADER */
        .header { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 100; background: #000; border-bottom: 0.5px solid #222; }
        .logo { font-size: 26px; font-weight: bold; color: #00f2ea; letter-spacing: -1px; }

        /* 🔴 NOTIFICATION BADGE */
        .notif-wrapper { position: relative; display: flex; align-items: center; }
        .badge { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: #ff3b30; border-radius: 50%; border: 1.5px solid #000; }

        /* 📄 PAGES */
        .page { display: none; height: calc(100vh - 65px); overflow-y: auto; padding-top: 60px; }
        .page.active { display: block; }
        #vibe-page { height: 100vh; padding: 0; overflow-y: scroll; scroll-snap-type: y mandatory; }

        /* ⭕ PERFECT ROUND STORIES */
        .stories-bar { display: flex; gap: 15px; padding: 15px; overflow-x: auto; border-bottom: 0.5px solid #222; scrollbar-width: none; }
        .story-item { 
            min-width: 65px; max-width: 65px; height: 65px; 
            border-radius: 50%; border: 2.5px solid #00f2ea; 
            padding: 3px; box-sizing: border-box; flex-shrink: 0;
        }
        .story-item img { 
            width: 100%; height: 100%; border-radius: 50%; 
            object-fit: cover; display: block;
        }

        /* 🎬 VIBE CARD */
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .vibe-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; z-index: 50; text-align: center; }
        .action-icon { font-size: 32px; cursor: pointer; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* 🧭 BOTTOM NAV: Rounded Vibe Icon */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; align-items: center; justify-content: space-around; border-top: 0.5px solid #222; z-index: 400; }
        .nav-icon { font-size: 28px !important; color: #8e8e8e; cursor: pointer; }
        .nav-icon.active { color: white; }
        
        .vibe-btn { 
            display: flex; align-items: center; gap: 6px; 
            border: 2px solid #00f2ea; border-radius: 12px; 
            padding: 5px 12px; color: #00f2ea; font-weight: bold; font-size: 13px;
        }
        .vibe-btn.active { background: #00f2ea; color: #000; }

        .modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; transition: 0.3s; }
        .modal.active { top: 0; }
    </style>
</head>
<body>

    <div class="header" id="main-header">
        <div class="logo">IndiVibe</div>
        <div style="display: flex; gap: 20px;">
            <div class="notif-wrapper"><span class="material-icons-outlined">favorite_border</span><div class="badge"></div></div>
            <div class="notif-wrapper" onclick="toggleModal('chat-m')"><span class="material-icons-outlined">chat_bubble_outline</span><div class="badge"></div></div>
        </div>
    </div>

    <div id="home-page" class="page active">
        <div class="stories-bar">
            <div class="story-item"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"></div>
            <div class="story-item"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200"></div>
            <div class="story-item"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200"></div>
            <div class="story-item"><img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=200"></div>
        </div>
        <div style="padding: 100px 20px; text-align: center; color: #555;">
            <span class="material-icons-outlined" style="font-size: 50px;">grid_view</span>
            <p>No new posts from friends.</p>
        </div>
    </div>

    <div id="vibe-page" class="page"></div>

    <div id="chat-m" class="modal">
        <div style="padding: 20px; border-bottom: 0.5px solid #222; display: flex; align-items: center; gap: 15px;">
            <span class="material-icons-outlined" onclick="toggleModal('chat-m')">arrow_back</span>
            <h3>Direct Messages</h3>
        </div>
        <p style="text-align: center; margin-top: 50px; color: gray;">Saare messages yahan dikhenge.</p>
    </div>

    <div class="bottom-nav">
        <span class="material-icons-outlined nav-icon active" id="home-i" onclick="showPage('home-page')">home</span>
        <span class="material-icons-outlined nav-icon">search</span>
        <span class="material-icons-outlined nav-icon">add_box</span>
        <div class="vibe-btn" id="vibe-b" onclick="showPage('vibe-page')">
            <span class="material-icons-outlined" style="font-size: 18px;">play_circle</span> VIBE
        </div>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid #333;">
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('home-i').classList.toggle('active', id === 'home-page');
            document.getElementById('vibe-b').classList.toggle('active', id === 'vibe-page');
            document.getElementById('main-header').style.display = (id === 'vibe-page') ? 'none' : 'flex';
            if(id === 'vibe-page') loadVibes();
        }

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').eq('is_safe', true);
            if (data) {
                document.getElementById('vibe-page').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                        <div class="vibe-actions">
                            <span class="material-icons-outlined action-icon">favorite_border</span>
                            <span class="material-icons-outlined action-icon" onclick="prompt('Comment:')">chat_bubble_outline</span>
                            <span class="material-icons-outlined action-icon" onclick="navigator.share({url:window.location.href})">send</span>
                            <span class="material-icons-outlined action-icon">more_vert</span>
                        </div>
                    </div>
                `).join('');
                document.querySelector('#vibe-page video').play();
            }
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
    </script>
</body>
</html>

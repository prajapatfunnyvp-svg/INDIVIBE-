    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* 1. TOP NAVIGATION & STORIES (HOME STYLE) */
        .home-header { position: absolute; top: 0; width: 100%; padding: 45px 15px 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 20px; }
        .logo-area img { width: 28px; height: 28px; border-radius: 6px; }

        .stories-container { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-ring { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #f09433; padding: 2px; flex-shrink: 0; cursor: pointer; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }

        /* 2. MAIN VIDEO FEED */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 3. RIGHT SIDEBAR (INTERACTION) */
        .interaction-sidebar { position: absolute; right: 12px; bottom: 145px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-item i { font-size: 32px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .action-item span { font-size: 12px; margin-top: 4px; font-weight: 600; }
        .liked { color: #ff3040 !important; }

        /* 4. FOOTER INFO (USER & CAPTION) */
        .vibe-details { position: absolute; bottom: 130px; left: 15px; z-index: 100; width: 75%; }
        .user-profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .profile-pic { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #fff; }
        .username-text { font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 4px; }
        .follow-badge { border: 1px solid #fff; padding: 3px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }

        /* 5. THE PILL COMMENT BOX (TRANSLUCENT) */
        .comment-pill-bar { position: fixed; bottom: 75px; width: 100%; padding: 0 15px; z-index: 1000; }
        .pill-wrapper { background: rgba(255,255,255,0.18); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
        .pill-wrapper input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 14px; }
        .pill-wrapper input::placeholder { color: rgba(255,255,255,0.7); }

        /* 6. BOTTOM SHEETS (REELS MENU) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #262626; border-radius: 20px 20px 0 0; z-index: 2500; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 15px 0; }
        .sheet.open { bottom: 0; }
        .sheet-btn { padding: 16px 25px; display: flex; align-items: center; gap: 15px; color: #fff; cursor: pointer; border-bottom: 0.5px solid #333; }
        .sheet-btn i { font-size: 24px; }

        /* 7. BOTTOM NAVIGATION */
        .main-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.3px solid #222; z-index: 1001; }
        .main-nav i { color: #fff; font-size: 28px; opacity: 0.5; cursor: pointer; }
        .active-tab { opacity: 1 !important; }
    </style>
</head>

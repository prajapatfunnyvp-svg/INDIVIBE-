<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe 3D Pro</title>
    <style>
        /* 3D App Styling */
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .v-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 3D Glass Header */
        .header-3d {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.1); padding: 8px 15px;
            border-radius: 15px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .logo-img { width: 30px; height: 30px; border-radius: 5px; }
        .brand-3d {
            font-size: 20px; font-weight: 900; color: #00f2ea;
            text-shadow: 2px 2px 0px #005f5c, 3px 3px 10px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        /* Social Icons */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; z-index: 50; }
        .icon-box { text-align: center; font-size: 28px; cursor: pointer; filter: drop-shadow(2px 2px 5px #000); }
        .icon-box span { font-size: 11px; display: block; margin-top: 2px; }

        /* Start Screen */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-large { width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 20px #00f2ea); }
        .enter-btn { background: #00f2ea; color: #000; border: none; padding: 18px 50px; border-radius: 50px; font-weight: bold; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="logo-large">
        <div class="brand-3d" style="font-size: 45px;">IndiVibe</div>
        <p style="margin: 20px 0; color: #00f2ea; opacity: 0.7;">Vibe Like Never Before</p>
        <button class="enter-btn" onclick="launch()">ENTER APP</button>
    </div>

    <div id="main-feed" class="feed"></div>

    <script>
        // Backup Videos (Agar database nahi chala toh ye dikhenge)
        const myData = [
            {v: "https://vjs.zencdn.net/v/oceans.mp4", u: "@Dshrat_Nayak"},
            {v: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4", u: "@IndiVibe_Music"}
        ];

        function launch() {
            document.getElementById('start-overlay').style.display = 'none';
            const feed = document.getElementById('main-feed');
            
            feed.innerHTML = myData.map(v => `
                <div class="v-card">
                    <div class="header-3d">
                        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="logo-img">
                        <div class="brand-3d">IndiVibe</div>
                    </div>
                    
                    <video src="${v.v}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                    
                    <div class="side-icons">
                        <div class="icon-box" onclick="alert('Like Done!')">❤️<span>12k</span></div>
                        <div class="icon-box" onclick="openChat()">💬<span>45</span></div>
                        <div class="icon-box" onclick="navigator.share({title:'IndiVibe', url:window.location.href})">🚀<span>Share</span></div>
                    </div>

                    <div style="position:absolute; bottom:40px; left:15px; text-shadow: 2px 2px 5px #000;">
                        <h4 style="margin:0;">${v.u}</h4>
                        <p style="font-size:14px; margin:5px 0;">Relaxing Flute Music 🎵</p>
                    </div>
                </div>
            `).join('');
            
            document.querySelector('video').play();
        }

        function openChat() {
            let msg = prompt("Doston ko message bhejein:");
            if(msg) alert("Message Sent: " + msg);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>INDIVIBE Premium</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
  height: 100vh;
  width: 100vw;
}

/* TOP BAR & STORIES (FIXED AT TOP) */
.header-container {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  padding: 10px 15px;
}

.brand { font-weight: 900; font-size: 24px; color: #1877F2; margin-bottom: 8px; }

.stories-bar {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 5px;
  scrollbar-width: none;
}
.stories-bar::-webkit-scrollbar { display: none; }

.story-ring {
  min-width: 62px; height: 62px; border-radius: 50%;
  background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  padding: 2px;
}
.story-ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }

/* MAIN FEED (FULL SCREEN SNAP) */
.main-feed {
  height: 100vh;
  width: 100vw;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  position: relative;
  z-index: 10;
}
.main-feed::-webkit-scrollbar { display: none; }

.video-box {
  height: 100vh;
  width: 100vw;
  scroll-snap-align: start;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

video { width: 100%; height: 100%; object-fit: cover; }

/* ACTION BUTTONS */
.side-buttons {
  position: absolute;
  right: 15px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  z-index: 500;
  align-items: center;
}
.btn-ui { text-align: center; cursor: pointer; }
.btn-ui span { font-size: 11px; display: block; margin-top: 4px; font-weight: bold; }

/* USER INFO */
.user-overlay {
  position: absolute;
  bottom: 100px;
  left: 15px;
  z-index: 500;
  width: 75%;
}
.u-tag { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.u-tag img { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }

/* BOTTOM NAVIGATION */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 65px;
  background: #000;
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 0.5px solid #333;
  z-index: 1000;
}

/* HEART POP */
.pop-heart {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  font-size: 100px; color: #ff3040; z-index: 600; opacity: 0; pointer-events: none;
}
.pop-heart.show { animation: heartAnim 0.8s ease-out; }
@keyframes heartAnim {
  0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
  50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
}
</style>
</head>
<body>

<div class="header-container">
  <div class="brand">INDIVIBE</div>
  <div class="stories-bar">
    <div class="story-ring"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"></div>
    <div class="story-ring"><img src="https://picsum.photos/101"></div>
    <div class="story-ring"><img src="https://picsum.photos/102"></div>
    <div class="story-ring"><img src="https://picsum.photos/103"></div>
    <div class="story-ring"><img src="https://picsum.photos/104"></div>
  </div>
</div>

<div id="feed" class="main-feed"></div>

<div class="bottom-nav">
  <i data-lucide="home"></i>
  <i data-lucide="search"></i>
  <i data-lucide="plus-square" style="transform: scale(1.2)"></i>
  <i data-lucide="user"></i>
</div>

<script>
const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
const supabase = window.supabase.createClient(S_URL, S_KEY);

async function initIndiVibe() {
  const { data, error } = await supabase.from("videos").select("*").order('created_at', { ascending: false });
  
  if (data) {
    const feedDiv = document.getElementById("feed");
    feedDiv.innerHTML = data.map(v => `
      <div class="video-box">
        <video src="${v.video_url}" loop playsinline onclick="tapControl(this)" ondblclick="triggerLike(this)"></video>
        <div class="pop-heart">❤️</div>
        
        <div class="side-buttons">
          <div class="btn-ui" onclick="triggerLike(this.parentElement.parentElement.querySelector('video'))">
            <i data-lucide="heart" class="l-icon"></i><span>1.2M</span>
          </div>
          <div class="btn-ui" onclick="alert('Comments coming soon')">
            <i data-lucide="message-circle"></i><span>45K</span>
          </div>
          <div class="btn-ui" onclick="navigator.share({url:'${v.video_url}'})">
            <i data-lucide="share-2"></i><span>Share</span>
          </div>
          <div class="btn-ui" onclick="window.open('${v.video_url}')">
            <i data-lucide="download-cloud"></i>
          </div>
        </div>

        <div class="user-overlay">
          <div class="u-tag">
            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png">
            <b>Vishnupur Fifthoot</b>
          </div>
          <p>${v.caption || ''}</p>
        </div>
      </div>
    `).join('');

    lucide.createIcons();
    setupVideoObserver();
  } else if (error) {
    console.error("Data error:", error);
  }
}

let tapTimer;
function tapControl(v) {
  if (tapTimer) return;
  tapTimer = setTimeout(() => { v.paused ? v.play() : v.pause(); tapTimer = null; }, 250);
}

function triggerLike(v) {
  clearTimeout(tapTimer); tapTimer = null;
  const h = v.parentElement.querySelector(".pop-heart");
  h.classList.add("show");
  setTimeout(() => h.classList.remove("show"), 800);
  
  const icon = v.parentElement.querySelector(".l-icon");
  icon.style.fill = "#ff3040"; icon.style.stroke = "#ff3040";
}

function setupVideoObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const vid = e.target.querySelector("video");
      if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
    });
  }, { threshold: 0.6 });
  document.querySelectorAll(".video-box").forEach(box => observer.observe(box));
}

initIndiVibe();
</script>
</body>
</html>

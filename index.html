<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE REELS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; bottom: 80px; left: 20px; z-index: 10; text-shadow: 1px 1px 5px #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; z-index: 100; }
    </style>
</head>
<body>
    <div id="reels" class="reels-container"><div id="msg">Reels Load Ho Rahi Hain...</div></div>
    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const K1 = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.';
        const K2 = 'Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        
        const _supa = supabase.createClient(URL, K1 + K2);

        async function start() {
            const msg = document.getElementById('msg');
            try {
                const { data, error } = await _supa.from('videos').select('*');
                if (error) { msg.innerText = "Error: " + error.message; return; }
                
                if (data && data.length > 0) {
                    msg.style.display = 'none';
                    const container = document.getElementById('reels');
                    data.forEach(v => {
                        // Vishu: Ye line video link dhoondh legi chahe spelling kuch bhi ho
                        const videoSrc = v.video_url || v['video _url'] || v.url;
                        const caption = v.cuption || v.caption || "";

                        if (videoSrc) {
                            const d = document.createElement('div');
                            d.className = 'reel';
                            d.innerHTML = `
                                <video src="${videoSrc}" loop autoplay muted playsinline></video>
                                <div class="info"><h3>@indivibe</h3><p>${caption}</p></div>
                            `;
                            container.appendChild(d);
                        }
                    });
                } else {
                    msg.innerText = "Database Connected! Par Table khali hai.";
                }
            } catch (e) { msg.innerText = "Connection Failed!"; }
        }
        start();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .card { border: 2px solid #00f2ea; padding: 40px; border-radius: 30px; width: 85%; background: #111; box-shadow: 0 0 25px #00f2ea; }
        h1 { font-size: 38px; margin-bottom: 10px; text-shadow: 0 0 10px #00f2ea; }
        button { background: #00f2ea; color: #000; border: none; padding: 22px 55px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 26px; margin-top: 25px; box-shadow: 0 0 15px #00f2ea; }
    </style>
</head>
<body>
    <div id="ui" class="card">
        <h1>INDIVIBE</h1>
        <p id="st">Checking Connection...</p>
        <div id="box"></div>
    </div>
    <video id="v" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover;" controls playsinline loop></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        async function go() {
            const status = document.getElementById('st');
            try {
                // Hum seedha sabse naya video link utha rahe hain
                let { data, error } = await _supa.from('videos').select('*');
                
                if (data && data.length > 0) {
                    status.innerText = "READY!";
                    document.getElementById('box').innerHTML = '<button onclick="playNow()">WATCH NOW</button>';
                    document.getElementById('v').src = data[data.length - 1].video_url;
                } else if (error) {
                    status.innerText = "Error: " + error.message;
                } else {
                    status.innerText = "Database is Empty! Save Row in Supabase.";
                }
            } catch (err) {
                status.innerText = "Network Error!";
            }
        }

        function playNow() {
            document.getElementById('ui').style.display = 'none';
            const vid = document.getElementById('v');
            vid.style.display = 'block';
            vid.play().catch(e => alert("Please tap to play video"));
        }
        
        // Isse turant chalayenge
        go();
    </script>
</body>
</html>

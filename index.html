<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe Official - Full App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Multi-Tab Logic */
        .app-page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
        .app-page.active { display: block; }

        /* 1. HOME SCREEN (Stories & Logo) */
        .header-home { padding: 45px 15px 10px; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .logo-main { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 22px; }
        .logo-main img { width: 30px; height: 30px; border-radius: 6px; }
        .story-section { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; border-bottom: 0.1px solid #222; }
        .story-section::-webkit-scrollbar { display: none; }
        .ring { width: 68px; height: 68px; border-radius: 50%; border: 2.5px solid #f09433; padding: 2.5px; flex-shrink: 0; }
        .ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        /* 2. VIBE SCREEN (Full Screen Reels) */
        #vibe-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar & Info */
        .vibe-actions { position: absolute; right: 12px; bottom: 150px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .v-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .v-btn i { font-size: 34px; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }
        .v-btn span { font-size: 12px; font-weight: 600; margin-top: 5px; }
        .liked { color: #ff3040 !important; }

        .vibe-meta { position: absolute; bottom: 135px; left: 16px; z-index: 100; width: 75%; }
        .profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .profile-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #fff; }
        .blue-tick { color: #1877F2; font-size: 16px; }
        .follow-btn { border: 1px solid #fff; padding: 3px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        /* 3. PILL COMMENT BOX (Instagram Style) */
        .pill-wrapper { position: fixed; bottom: 78px; width: 100%; padding: 0 16px; z-index: 1000; }
        .pill-bar { background: rgba(255,255,255,0.18); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        .pill-bar input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }

        /* 4. BOTTOM NAVIGATION */
        .nav-footer { position: fixed; bottom: 0; width: 100%; height: 68px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.2px solid #333; z-index: 2000; }
        .nav-footer i { color: #fff; font-size: 30px; opacity: 0.5; cursor: pointer; }
        .active-tab { opacity: 1 !important; }

        /* 5. MENU SHEET & OVERLAY */
        .black-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2500; }
        .menu-sheet { position: fixed; bottom: -100%; width: 100%; background: #262626; border-radius: 20px 20px 0 0; z-index: 3000; transition: 0.4s cubic-bezier(0, 0, 0.2, 1); padding-bottom: 30px; }
        .sheet-option { padding: 18px 25px; display: flex; align-items: center; gap: 15px; font-size: 16px; border-bottom: 0.1px solid #3a3a3a; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-tab" class="app-page active">
        <header class="header-home">
            <div class="logo-main"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"> Indivibe</div>
            <i class="material-icons-outlined">send</i>
        </header>
        <div class="story-section">
            <div class="ring"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"></div>
            <div class="ring"><img src="https://i.pravatar.cc/100?u=1"></div>
            <div class="ring"><img src="https://i.pravatar.cc/100?u=2"></div>
            <div class="ring"><img src="https://i.pravatar.cc/100?u=3"></div>
        </div>
        <div style="text-align:center; padding-top:100px; opacity:0.4;">Home Feed Content</div>
    </div>

    <div id="vibe-tab" class="app-page">
        <div id="vibe-container"></div>
        <div class="pill-wrapper">
            <div class="pill-bar">
                <input type="text" id="mainComment" placeholder="कमेंट जोड़ें...">
                <i class="material-icons" style="opacity:0.7; font-size:20px;">sentiment_satisfied_alt</i>
            </div>
        </div>
    </div>

    <div id="search-tab" class="app-page"><div style="padding:100px; text-align:center;">Search Vibes...</div></div>
    <div id="upload-tab" class="app-page"><div style="padding:100px; text-align:center;"><h2>Upload Your Video</h2><input type="file" style="margin-top:20px;"></div></div>
    <div id="profile-tab" class="app-page"><div style="padding:100px; text-align:center;"><h2>Vishnu Raj</h2><p>Content Creator</p></div></div>

    <nav class="nav-footer">
        <i class="material-icons active-tab" onclick="navTo('home-tab', this)">home</i>
        <i class="material-icons" onclick="navTo('search-tab', this)">search</i>
        <i class="material-icons" onclick="navTo('upload-tab', this)" style="font-size:38px;">add_box</i>
        <i class="material-icons" onclick="navTo('vibe-tab', this)">play_circle_outline</i>
        <i class="material-icons" onclick="navTo('profile-tab', this)">person_outline</i>
    </nav>

    <div class="black-overlay" id="ovl" onclick="closeM()"></div>
    <div class="menu-sheet" id="mSheet">
        <div style="width:40px; height:4px; background:#555; margin:12px auto; border-radius:10px;"></div>
        <div class="sheet-option" onclick="alert('Link Copied')"><i class="material-icons">link</i> Copy Link</div>
        <div class="sheet-option" onclick="alert('Downloading')"><i class="material-icons">file_download</i> Download Video</div>
        <div class="sheet-option" style="color:#ff3040;" onclick="alert('Reported')"><i class="material-icons">report_problem</i> Report</div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        // Navigation Controller
        function navTo(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-footer i').forEach(i => i.classList.remove('active-tab'));
            el.classList.add('active-tab');
            if(id === 'vibe-tab') fetchVibes();
        }

        async function fetchVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', {ascending: false});
            if(data) {
                document.getElementById('vibe-container').innerHTML = data.map(v => `
                    <div class="vibe-unit">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-actions">
                            <div class="v-btn" onclick="this.querySelector('i').classList.toggle('liked')"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="v-btn" onclick="document.getElementById('mainComment').focus()"><i class="material-icons-outlined">chat_bubble_outline</i><span>1,155</span></div>
                            <div class="v-btn" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform:scaleX(-1)">reply</i><span>13.3K</span></div>
                            <div class="v-btn" onclick="openM()"><i class="material-icons">more_horiz</i></div>
                        </div>
                        <div class="vibe-meta">
                            <div class="profile-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="profile-avatar">
                                <span style="font-weight:bold;">Vishnu Raj <i class="material-icons blue-tick">check_circle</i></span>
                                <div class="follow-btn" onclick="this.innerText='Following'">Follow</div>
                            </div>
                            <p style="font-size:14px; opacity:0.9;">${v.caption || 'Feel the Vibe! #indivibe'}</p>
                        </div>
                    </div>
                `).join('');
                setupPlayer();
            }
        }

        function setupPlayer() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play(); else v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-unit').forEach(u => obs.observe(u));
        }

        function openM() { document.getElementById('mSheet').style.bottom = '0'; document.getElementById('ovl').style.display='block'; }
        function closeM() { document.getElementById('mSheet').style.bottom = '-100%'; document.getElementById('ovl').style.display='none'; }

        fetchVibes();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root { --neon: #00f2ea; --bg: #000; --gray: #8e8e8e; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* HEADER - 𝐼𝓃𝒹𝒾𝓋𝒾𝒷𝑒 Style */
        .top-header { position: fixed; top: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 1000; border-bottom: 0.5px solid #222; }
        .logo { font-size: 28px; font-family: cursive; color: var(--neon); font-style: italic; text-shadow: 0 0 10px rgba(0,242,234,0.3); }

        /* PAGES */
        .page { display: none; height: calc(100vh - 65px); overflow-y: auto; padding-top: 60px; }
        .page.active { display: block; }
        #vibe-feed { height: 100vh; padding: 0; overflow-y: scroll; scroll-snap-type: y mandatory; }

        /* PERFECT ROUND STORIES */
        .stories-bar { display: flex; gap: 15px; padding: 15px; overflow-x: auto; border-bottom: 0.5px solid #222; scrollbar-width: none; }
        .story-item { width: 65px; height: 65px; border-radius: 50%; border: 2.5px solid var(--neon); padding: 3px; flex-shrink: 0; box-sizing: border-box; position: relative; }
        .story-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-add { position: absolute; bottom: 0; right: 0; background: #0095f6; border-radius: 50%; border: 2px solid #000; font-size: 14px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }

        /* VIBE CARD (FULL SCREEN) */
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .vibe-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; z-index: 50; }
        .vibe-icon { font-size: 32px; text-shadow: 0 2px 10px #000; cursor: pointer; text-align: center; }

        /* BOTTOM NAV */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; align-items: center; justify-content: space-around; border-top: 0.5px solid #222; z-index: 500; }
        .nav-btn { font-size: 28px !important; color: var(--gray); cursor: pointer; }
        .nav-btn.active { color: white; }
        .vibe-center-btn { border: 2.5px solid var(--neon); border-radius: 12px; padding: 4px 12px; color: var(--neon); font-weight: bold; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .vibe-center-btn.active { background: var(--neon); color: #000; }

        /* MODALS */
        .overlay { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; transition: 0.4s; }
        .overlay.active { top: 0; }
        .modern-modal { position: absolute; bottom: 0; width: 100%; background: #1a1a1a; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        .upload-btn { background: var(--neon); color: #000; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-header" id="header">
        <div class="logo">𝐼𝓃𝒹𝒾𝓋𝒾𝒷𝑒</div>
        <div style="display: flex; gap: 20px;">
            <span class="material-icons-outlined">favorite_border</span>
            <span class="material-icons-outlined" onclick="alert('Messages feature active!')">chat_bubble_outline</span>
        </div>
    </div>

    <div id="home-page" class="page active">
        <div class="stories-bar">
            <div class="story-item"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"><div class="story-add">+</div></div>
            <div class="story-item"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100"></div>
        </div>
        <div style="padding: 100px 20px; text-align: center; color: #444;">
            <h3>Home Feed Updated</h3>
            <p>Friends ki vibes yahan dikhengi!</p>
        </div>
    </div>

    <div id="vibe-feed" class="page"></div>

    <div id="up-modal" class="overlay">
        <div class="modern-modal">
            <div style="width: 40px; height: 4px; background: #333; margin: 0 auto 20px; border-radius: 2px;"></div>
            <h2>Create New Vibe</h2>
            <p id="up-status" style="color: var(--neon);"></p>
            <input type="file" id="video-file" accept="video/*" style="display: none;" onchange="startUpload(event)">
            <button class="upload-btn" onclick="document.getElementById('video-file').click()">Select Video from Gallery</button>
            <button onclick="toggleM('up-modal')" style="width: 100%; background: none; color: gray; border: none; padding: 15px;">Cancel</button>
        </div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-btn active" id="h-icon" onclick="showP('home-page')">home</span>
        <span class="material-icons-outlined nav-btn">search</span>
        <span class="material-icons-outlined nav-btn" onclick="toggleM('up-modal')">add_box</span>
        <div class="vibe-center-btn" id="v-btn" onclick="showP('vibe-feed')">
            <span class="material-icons-outlined" style="font-size: 18px;">play_circle</span> VIBE
        </div>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid #333;">
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        function showP(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('h-icon').classList.toggle('active', id === 'home-page');
            document.getElementById('v-btn').classList.toggle('active', id === 'vibe-feed');
            document.getElementById('header').style.display = (id === 'vibe-feed') ? 'none' : 'flex';
            if(id === 'vibe-feed') loadVibes();
        }

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').eq('is_safe', true);
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                        <div class="vibe-actions">
                            <span class="material-icons-outlined vibe-icon">favorite_border</span>
                            <span class="material-icons-outlined vibe-icon" onclick="prompt('Add comment:')">chat_bubble_outline</span>
                            <span class="material-icons-outlined vibe-icon" onclick="navigator.share({url:window.location.href})">send</span>
                            <span class="material-icons-outlined vibe-icon">more_vert</span>
                        </div>
                    </div>
                `).join('');
                document.querySelector('#vibe-feed video').play();
            }
        }

        async function startUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            
            const status = document.getElementById('up-status');
            status.innerText = "🚀 Uploading Vibe...";
            
            const fileName = `${Date.now()}_vibe.mp4`;
            
            // 1. Upload to Storage
            const { data, error } = await supa.storage.from('vibe-videos').upload(fileName, file);
            
            if (error) {
                alert("Error: " + error.message);
                status.innerText = "";
                return;
            }

            // 2. Get URL & Save to Database
            const { data: urlData } = supa.storage.from('vibe-videos').getPublicUrl(fileName);
            await supa.from('videos').insert([{ video_url: urlData.publicUrl, is_safe: true }]);
            
            status.innerText = "✅ Upload Successful!";
            setTimeout(() => location.reload(), 1500);
        }

        function toggleM(id) { document.getElementById(id).classList.toggle('active'); }
    </script>
</body>
</html>

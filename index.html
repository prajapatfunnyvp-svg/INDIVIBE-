<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE Final Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        /* WATERMARK */
        .watermark { position: absolute; top: 20px; left: 20px; opacity: 0.7; font-weight: 800; font-size: 18px; z-index: 100; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); pointer-events: none; }

        /* REELS CONTAINER (INSTAGRAM STYLE SCROLL) */
        #reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #reels-container::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* SIDE TOOLS (REPORT & DOWNLOAD) */
        .side-tools { position: absolute; right: 15px; top: 40%; display: flex; flex-direction: column; gap: 25px; z-index: 100; }
        .tool-icon { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .tool-icon i { font-size: 30px !important; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .tool-icon span { font-size: 11px; font-weight: bold; }

        /* USER INFO OVERLAY */
        .user-overlay { position: absolute; bottom: 130px; left: 15px; z-index: 100; }
        .u-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-pic { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #fff; }
        .u-name { font-weight: 700; font-size: 16px; }

        /* FACEBOOK STYLE BAR (WITH HEART LIKE) */
        .action-bar { position: absolute; bottom: 70px; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index: 100; }
        .act-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .act-btn i { font-size: 26px !important; }
        .act-btn span { font-size: 14px; font-weight: 700; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #333; z-index: 1000; }
        .bottom-nav i { font-size: 28px; color: #fff; }

        /* INSTAGRAM STYLE HEART POP */
        .h-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: #ff3040; opacity: 0; z-index: 500; pointer-events: none; }
        .h-pop.active { animation: heartPop 0.8s ease; }
        @keyframes heartPop { 0% { transform: translate(-50%,-50%) scale(0); opacity: 0; } 50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0; } }
    </style>
</head>
<body>

    <div id="reels-container">
        </div>

    <div class="bottom-nav">
        <i class="material-icons-outlined" style="color: #1877F2;">home</i>
        <i class="material-icons-outlined">search</i>
        <i class="material-icons-outlined">add_box</i>
        <i class="material-icons-outlined">person_outline</i>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function startApp() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (!data) return;

            document.getElementById('reels-container').innerHTML = data.map(v => `
                <div class="reel">
                    <div class="watermark">INDIVIBE</div>
                    <video src="${v.video_url}" loop playsinline onclick="handleTap(this)" ondblclick="instaLike(this)"></video>
                    <div class="h-pop material-icons-outlined">favorite</div>
                    
                    <div class="side-tools">
                        <div class="tool-icon" onclick="window.open('${v.video_url}')"><i class="material-icons-outlined">download</i><span>Save</span></div>
                        <div class="tool-icon" onclick="alert('Video Reported')"><i class="material-icons-outlined">report</i><span>Report</span></div>
                    </div>

                    <div class="user-overlay">
                        <div class="u-row">
                            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-pic">
                            <span class="u-name">Vishnupur Fifthoot</span>
                        </div>
                        <p style="padding-left:52px;">${v.caption || ''}</p>
                    </div>

                    <div class="action-bar">
                        <div class="act-btn" onclick="instaLike(this.parentElement.parentElement.querySelector('video'))">
                            <i class="material-icons-outlined l-icon">favorite_border</i><span>Like</span>
                        </div>
                        <div class="act-btn" onclick="alert('Comment Box Coming Soon')">
                            <i class="material-icons-outlined">chat_bubble_outline</i><span>Comment</span>
                        </div>
                        <div class="act-btn" onclick="navigator.share({url:'${v.video_url}'})">
                            <i class="material-icons-outlined">share</i><span>Share</span>
                        </div>
                    </div>
                </div>
            `).join('');

            setupObserver();
        }

        let tTimer;
        function handleTap(v) {
            if (tTimer) return;
            tTimer = setTimeout(() => { v.paused ? v.play() : v.pause(); tTimer = null; }, 250);
        }

        function instaLike(v) {
            clearTimeout(tTimer); tTimer = null;
            const heart = v.parentElement.querySelector('.h-pop');
            heart.classList.add('active');
            setTimeout(() => heart.classList.remove('active'), 800);
            
            const likeIcon = v.parentElement.querySelector('.l-icon');
            likeIcon.innerText = 'favorite'; 
            likeIcon.style.color = '#ff3040';
        }

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => obs.observe(r));
        }

        startApp();
    </script>
</body>
</html>

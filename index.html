<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro v3 - FBxIG Mix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* REELS SNAP SCROLLING */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HEADER & TOP CONTROLS (FACEBOOK STYLE like image_6.png) */
        .vibe-header { position: absolute; top: 0; width: 100%; height: 70px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); display: flex; align-items: center; padding: 0 15px; z-index: 200; pointer-events: none; }
        .back-btn, .search-btn, .options-btn { color: white; font-size: 28px !important; opacity: 0.9; cursor: pointer; pointer-events: auto; }
        .vibe-title { flex: 1; text-align: left; font-size: 20px; font-weight: 700; opacity: 0.9; pointer-events: auto; display: flex; gap: 5px; align-items: center;}

        /* RIGHT ACTIONS (FACEBOOK SEQUENCE like image_6.png) */
        .vibe-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; width: 50px;}
        .vibe-icon { font-size: 28px !important; color: white; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8)); opacity: 0.9;}
        .action-label { font-size: 11px; margin-top: 1px; font-weight: 500; text-shadow: 0 1px 3px #000; color: white; opacity: 0.9; }
        
        /* 🟢 INSTAGRAM HEART LIKE (like image_1.png) - Redesigned to fit FB sequence */
        .heart-icon { font-size: 30px !important; color: white; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8)); transition: color 0.1s; }
        .heart-label { position: absolute; top: 12px; right: -5px; background: #ff3040; color: white; font-size: 10px; padding: 1px 4px; border-radius: 10px; font-weight: 700;}

        /* BOTTOM INFO & CAPTION (like image_6.png) */
        .vibe-info { position: absolute; left: 15px; bottom: 90px; width: 80%; z-index: 100; pointer-events: none; }
        .user-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; pointer-events: auto; }
        .user-pic { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid white; object-fit: cover; }
        .user-name { font-weight: 700; font-size: 14px; text-shadow: 0 1px 4px #000; }
        .follow-btn { border: 1.2px solid white; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        .vibe-caption { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 4px #000; font-weight: 400; padding-left: 2px; color: white; opacity: 0.95; pointer-events: auto; }

        /* TRAY SHEET FOR MORE OPTIONS */
        #option-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #262626; border-radius: 15px 15px 0 0; z-index: 2000; transition: 0.3s ease-out; padding-bottom: 40px; }
        #option-sheet.open { bottom: 0; }
        .sheet-handle { width: 36px; height: 4px; background: #555; border-radius: 10px; margin: 12px auto; }
        .sheet-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 0.1px solid #333; cursor: pointer; font-size: 16px; font-weight: 600; color: white; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div id="option-sheet">
        <div class="sheet-handle" onclick="closeSheet()"></div>
        <div class="sheet-item" id="sheet-download" style="color: white;">
            <span class="material-icons-outlined">file_download</span> Download Video
        </div>
        <div class="sheet-item" onclick="alert('Report submitted to Vishnu.')" style="color: #ff3b3b;">
            <span class="material-icons-outlined">report_problem</span> Report This Reel
        </div>
        <div class="sheet-item" onclick="closeSheet()" style="color: white; opacity: 0.7;">
            <span class="material-icons-outlined">close</span> Cancel
        </div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function getVideos() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="vibe-header">
                            <span class="material-icons-outlined back-btn">arrow_back</span>
                            <div class="vibe-title">Reels <span class="material-icons-outlined" style="font-size:18px;">expand_more</span></div>
                            <span class="material-icons-outlined search-btn" style="margin-right:15px;">search</span>
                            <span class="material-icons-outlined options-btn">account_circle</span>
                        </div>

                        <video src="${v.video_url}?v=3" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="vibe-info">
                            <div class="user-meta">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pic">
                                <span class="user-name">@vishnu_vibes</span>
                                <button class="follow-btn">Follow</button>
                            </div>
                            <div class="vibe-caption">${v.caption || 'IndiVibe Quality Content 🇮🇳'}</div>
                        </div>

                        <div class="vibe-actions">
                            <div class="action-item" onclick="toggleLike(this)">
                                <span class="material-icons-outlined heart-icon">favorite_border</span>
                                <span class="heart-label">1.5M</span>
                            </div>
                            <div class="action-item" onclick="alert('Comment section opening...')">
                                <span class="material-icons-outlined vibe-icon">mode_comment</span>
                                <span class="action-label">45K</span>
                            </div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})">
                                <span class="material-icons-outlined vibe-icon">share</span>
                            </div>
                            <div class="action-item" onclick="openSheet('${v.video_url}')">
                                <span class="material-icons-outlined vibe-icon" style="font-size:24px;">more_horiz</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                initializeScrolling();
            }
        }

        function initializeScrolling() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target.querySelector('video');
                    if (e.isIntersecting) { video.play().catch(a => {}); } 
                    else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => obs.observe(c));
        }

        function toggleLike(el) {
            const icon = el.querySelector('.heart-icon');
            if(icon.innerText === 'favorite_border') {
                icon.innerText = 'favorite';
                icon.style.color = '#ff3040';
            } else {
                icon.innerText = 'favorite_border';
                icon.style.color = 'white';
            }
        }

        function openSheet(url) {
            document.getElementById('option-sheet').classList.add('open');
            document.getElementById('sheet-download').onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = "IndiVibe_Reel.mp4";
                a.click();
                closeSheet();
            };
        }

        function closeSheet() { document.getElementById('option-sheet').classList.remove('open'); }

        getVideos();
    </script>
</body>
</html>

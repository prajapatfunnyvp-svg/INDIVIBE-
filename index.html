<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Reels Container */
        #feed-wrapper { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed-wrapper::-webkit-scrollbar { display: none; }
        
        .fb-reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB Header */
        .fb-header { position: absolute; top: 0; width: 100%; height: 50px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 10; }
        .fb-header b { font-size: 19px; flex: 1; font-weight: 600; }

        /* FB Side Actions */
        .fb-side { position: absolute; right: 12px; bottom: 90px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .act-group { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .heart { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
        .fb-icon { font-size: 28px !important; color: white; }
        .stat { font-size: 12px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 2px #000; }

        /* FB Bottom Info */
        .fb-bottom { position: absolute; bottom: 0; left: 0; width: 100%; padding: 0 12px 12px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); z-index: 10; }
        .u-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .u-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid #fff; }
        .u-name { font-weight: 700; font-size: 14px; }
        .u-follow { border: 1px solid #fff; padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .v-caption { font-size: 14px; margin-bottom: 12px; line-height: 1.3; color: #fff; }

        /* 💬 FB STYLE SLIM COMMENT BOX */
        .fb-comment-bar { width: 100%; height: 38px; background: rgba(255, 255, 255, 0.15); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; align-items: center; padding: 0 15px; color: #eee; font-size: 14px; cursor: pointer; }

        /* Real Comment Sheet (Parda) */
        #comm-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; background: #242526; border-radius: 15px 15px 0 0; z-index: 100; transition: 0.3s; display: flex; flex-direction: column; }
        #comm-sheet.open { bottom: 0; }
        .sh-top { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; }
        .sh-list { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .sh-input-area { padding: 10px 15px 25px; border-top: 1px solid #333; display: flex; gap: 10px; align-items: center; }
        .sh-input { background: #3a3b3c; border-radius: 20px; padding: 10px 15px; flex: 1; border: none; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="feed-wrapper"></div>

    <div id="comm-sheet">
        <div class="sh-top" onclick="toggleSheet(false)">Comments</div>
        <div class="sh-list" id="msg-list">Abhi tak koi comment nahi hai.</div>
        <div class="sh-input-area">
            <input type="text" class="sh-input" id="msg-in" placeholder="Comment jodein...">
            <span style="color:#1877F2; font-weight:bold;" onclick="sendMsg()">Post</span>
        </div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function init() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed-wrapper').innerHTML = data.map(v => `
                    <div class="fb-reel">
                        <div class="fb-header">
                            <i class="material-icons-outlined">arrow_back</i>
                            <b>IndiVibe</b>
                            <i class="material-icons-outlined" style="margin-left:auto">search</i>
                            <i class="material-icons-outlined">camera_alt</i>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="fb-side">
                            <div class="act-group" onclick="doLike(this)"><i class="material-icons-outlined heart">favorite_border</i><span class="stat">1.2M</span></div>
                            <div class="act-group" onclick="toggleSheet(true)"><i class="material-icons-outlined fb-icon">chat_bubble_outline</i><span class="stat">45K</span></div>
                            <div class="act-group" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined fb-icon" style="transform: scaleX(-1);">reply</i><span class="stat">Share</span></div>
                            <div class="act-group"><i class="material-icons-outlined fb-icon">more_horiz</i></div>
                        </div>

                        <div class="fb-bottom">
                            <div class="u-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
                                <span class="u-name">Vishnupur Fifthoot</span>
                                <div class="u-follow">Follow</div>
                            </div>
                            <div class="v-caption">${v.caption || 'New Reel on IndiVibe'}</div>
                            <div class="fb-comment-bar" onclick="toggleSheet(true)">कमेंट जोड़ें...</div>
                        </div>
                    </div>
                `).join('');
                startScroll();
            }
        }

        function startScroll() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.fb-reel').forEach(r => obs.observe(r));
        }

        function doLike(el) {
            const i = el.querySelector('.heart');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        function toggleSheet(show) {
            const s = document.getElementById('comm-sheet');
            if(show) s.classList.add('open'); else s.classList.remove('open');
        }

        function sendMsg() {
            const val = document.getElementById('msg-in').value;
            if(val) {
                document.getElementById('msg-list').innerHTML += `<div style="margin-bottom:10px;"><b>Aap:</b> ${val}</div>`;
                document.getElementById('msg-in').value = "";
            }
        }

        init();
    </script>
</body>
</html>

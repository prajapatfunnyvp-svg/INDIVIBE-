<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe FB v12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        /* NEW CLASSES TO BYPASS CACHE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        .v-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-container::-webkit-scrollbar { display: none; }
        .v-slide { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* EXACT FB TOP BAR */
        .fb-top-fix { position: absolute; top: 0; width: 100%; height: 56px; display: flex; align-items: center; padding: 0 16px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 10; }
        .fb-top-fix .material-icons-outlined { font-size: 24px; margin-right: 20px; }
        .fb-top-fix b { font-size: 19px; flex: 1; }

        /* EXACT FB SIDE BUTTONS (SMALL SIZE) */
        .fb-right-btns { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .btn-box { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
        
        /* ❤️ IG HEART BUTTON (Small & Slim) */
        .fb-heart-icon { font-size: 26px !important; color: white; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
        
        /* 💬 FB OTHER ICONS (24px - Small) */
        .fb-small-icon { font-size: 24px !important; color: white; opacity: 0.9; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
        .fb-label { font-size: 11px; margin-top: 2px; font-weight: 500; text-shadow: 0 1px 2px #000; }

        /* FB BOTTOM TEXT */
        .fb-text-area { position: absolute; left: 16px; bottom: 90px; width: 70%; z-index: 10; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #fff; }
        .u-name { font-weight: 700; font-size: 14px; text-shadow: 0 1px 3px #000; }
        .f-tag { border: 1px solid white; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); }
        .v-caption { font-size: 14px; text-shadow: 0 1px 3px #000; line-height: 1.3; }
    </style>
</head>
<body>

    <div class="v-container" id="main-feed"></div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('main-feed').innerHTML = data.map(v => `
                    <div class="v-slide">
                        <div class="fb-top-fix">
                            <span class="material-icons-outlined">arrow_back</span>
                            <b>Vibes</b>
                            <span class="material-icons-outlined" style="margin-left:auto">search</span>
                            <span class="material-icons-outlined">account_circle</span>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="fb-text-area">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
                                <span class="u-name">@vishnu_vibes</span>
                                <div class="f-tag">Follow</div>
                            </div>
                            <div class="v-caption">${v.caption || ''}</div>
                        </div>

                        <div class="fb-right-btns">
                            <div class="btn-box" onclick="doLike(this)">
                                <span class="material-icons-outlined fb-heart-icon">favorite_border</span>
                                <span class="fb-label">1.5M</span>
                            </div>
                            <div class="btn-box">
                                <span class="material-icons-outlined fb-small-icon">chat_bubble_outline</span>
                                <span class="fb-label">45K</span>
                            </div>
                            <div class="btn-box" onclick="navigator.share({url:'${v.video_url}'})">
                                <span class="material-icons-outlined fb-small-icon">share</span>
                                <span class="fb-label">Share</span>
                            </div>
                            <div class="btn-box">
                                <span class="material-icons-outlined fb-small-icon">more_horiz</span>
                                <span class="fb-label">More</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        const video = e.target.querySelector('video');
                        if (e.isIntersecting) video.play(); else { video.pause(); video.currentTime = 0; }
                    });
                }, { threshold: 0.8 });
                document.querySelectorAll('.v-slide').forEach(s => observer.observe(s));
            }
        }

        function doLike(el) {
            const i = el.querySelector('.fb-heart-icon');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        loadVibes();
    </script>
</body>
</html>

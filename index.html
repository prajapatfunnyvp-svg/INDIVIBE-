<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* HEADER */
        .header { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 100; background: #000; border-bottom: 0.5px solid #222; }
        .logo { font-size: 24px; font-weight: bold; font-style: italic; color: #00f2ea; }

        /* PAGES */
        .page { display: none; height: calc(100vh - 60px); overflow-y: auto; padding-top: 60px; padding-bottom: 60px; }
        .page.active { display: block; }
        #vibe-page { height: 100vh; padding: 0; overflow-y: scroll; scroll-snap-type: y mandatory; }

        /* STORIES (24h Concept) */
        .stories-bar { display: flex; gap: 12px; padding: 15px; overflow-x: auto; border-bottom: 0.5px solid #222; scrollbar-width: none; }
        .story-item { min-width: 65px; height: 65px; border-radius: 50%; border: 2px solid #00f2ea; padding: 2px; position: relative; }
        .story-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-add { position: absolute; bottom: 0; right: 0; background: #0095f6; border-radius: 50%; border: 2px solid #000; font-size: 14px; }

        /* VIBE CARD (Full Reels Style) */
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .vibe-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; z-index: 50; }
        .vibe-actions span { text-align: center; cursor: pointer; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* UPLOAD & FILTER MODAL */
        .modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #121212; z-index: 500; transition: 0.4s; padding: 20px; box-sizing: border-box; }
        .modal.active { top: 0; }
        .filter-preview { width: 100%; height: 300px; background: #222; border-radius: 15px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .filter-btn { padding: 8px 15px; background: #333; border: none; color: white; border-radius: 5px; margin-right: 5px; }

        /* BOTTOM NAV */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; justify-content: space-around; border-top: 0.5px solid #222; z-index: 400; }
        .vibe-btn { border: 2px solid #00f2ea; border-radius: 8px; padding: 2px 8px; color: #00f2ea; font-weight: bold; }
        .nav-icon { font-size: 28px !important; color: #8e8e8e; }
        .nav-icon.active { color: white; }
    </style>
</head>
<body>

    <div class="header" id="main-header">
        <div class="logo">IndiVibe</div>
        <div style="display: flex; gap: 15px;">
            <span class="material-icons-outlined">favorite_border</span>
            <span class="material-icons-outlined" onclick="alert('Messages opening...')">chat_bubble_outline</span>
        </div>
    </div>

    <div id="home-page" class="page active">
        <div class="stories-bar">
            <div class="story-item"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"><div class="story-add">+</div></div>
            <div class="story-item"><img src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=100"></div>
        </div>
        <div style="padding: 20px; color: gray;">
            <h3>Dost ki Vibe yahan dikhegi...</h3>
            <div style="height: 300px; background: #111; border-radius: 10px; display:flex; align-items:center; justify-content:center;">New Post Coming Soon</div>
        </div>
    </div>

    <div id="vibe-page" class="page"></div>

    <div id="upload-modal" class="modal">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span onclick="toggleModal('upload-modal')">Cancel</span>
            <b>New Vibe</b>
            <span style="color: #00f2ea;" onclick="alert('Uploading...')">Share</span>
        </div>
        <div class="filter-preview" id="preview-box">Yahan Video Filter hoga</div>
        <input type="file" accept="video/*" onchange="previewFile(event)">
        <div style="margin-top: 20px;">
            <p>Select Filter:</p>
            <button class="filter-btn" onclick="applyFilter('none')">Normal</button>
            <button class="filter-btn" onclick="applyFilter('sepia(1)')">Retro</button>
            <button class="filter-btn" onclick="applyFilter('grayscale(1)')">B&W</button>
        </div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-icon active" onclick="showPage('home-page', this)">home</span>
        <span class="material-icons-outlined nav-icon" onclick="alert('Search...')">search</span>
        <span class="material-icons-outlined nav-icon" onclick="toggleModal('upload-modal')">add_box</span>
        <span class="vibe-btn" onclick="showPage('vibe-page', this)">VIBE</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width: 25px; height: 25px; border-radius: 50%;">
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            
            document.getElementById('main-header').style.display = (id === 'vibe-page') ? 'none' : 'flex';
            if(id === 'vibe-page') loadVibes();
        }

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').eq('is_safe', true);
            if (data) {
                document.getElementById('vibe-page').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                        <div class="vibe-actions">
                            <span class="material-icons-outlined" style="font-size:35px">favorite_border</span>
                            <span class="material-icons-outlined" style="font-size:35px" onclick="prompt('Write a comment:')">chat_bubble_outline</span>
                            <span class="material-icons-outlined" style="font-size:35px" onclick="navigator.share({url:window.location.href})">send</span>
                            <span class="material-icons-outlined" style="font-size:35px">more_vert</span>
                        </div>
                    </div>
                `).join('');
                document.querySelector('#vibe-page video').play();
            }
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

        function previewFile(event) {
            const box = document.getElementById('preview-box');
            box.innerHTML = `<video src="${URL.createObjectURL(event.target.files[0])}" autoplay muted loop style="width:100%"></video>`;
        }

        function applyFilter(f) {
            document.querySelector('#preview-box video').style.filter = f;
        }
    </script>
</body>
</html>

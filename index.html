<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Page Management */
        .page { display: none; height: calc(100vh - 70px); width: 100vw; overflow-y: auto; position: absolute; }
        .active { display: block; }

        /* 1. HOME FEED (Post style) */
        .home-header { padding: 45px 15px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.1px solid #222; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 22px; }
        .logo img { width: 30px; height: 30px; border-radius: 8px; }
        .stories { display: flex; gap: 12px; padding: 15px; overflow-x: auto; border-bottom: 0.1px solid #222; }
        .stories::-webkit-scrollbar { display: none; }
        .s-ring { width: 70px; height: 70px; border-radius: 50%; border: 2.5px solid #f09433; padding: 2.5px; flex-shrink: 0; }
        .s-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        /* 2. VIBE FEED (Full Screen Reel) */
        #vibe-page { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar & Overlay UI */
        .vibe-sidebar { position: absolute; right: 12px; bottom: 155px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .v-btn { text-align: center; cursor: pointer; }
        .v-btn i { font-size: 34px; color: #fff; text-shadow: 0 2px 8px #000; }
        .v-btn span { font-size: 12px; font-weight: 600; margin-top: 4px; }
        .liked { color: #ff3040 !important; }

        .vibe-meta { position: absolute; bottom: 140px; left: 16px; z-index: 100; width: 75%; }
        .user-tag { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .user-tag img { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .v-tick { color: #1877F2; font-size: 16px; }

        /* 3. INSTAGRAM PILL COMMENT BOX */
        .comment-pill-wrap { position: fixed; bottom: 85px; width: 100%; padding: 0 15px; z-index: 1000; }
        .pill { background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        .pill input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }

        /* 4. REAL SHARE SHEET */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2000; }
        .share-sheet { position: fixed; bottom: -100%; width: 100%; background: #262626; border-radius: 20px 20px 0 0; z-index: 3000; transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); padding: 20px; }
        .share-sheet.open { bottom: 0; }
        .f-grid { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; }
        .f-item { text-align: center; min-width: 75px; position: relative; }
        .f-item img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 5px; }
        .send-now { background: #0095f6; color: #fff; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 15px; }

        /* 5. BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #333; z-index: 2500; }
        .bottom-nav i { font-size: 30px; opacity: 0.4; cursor: pointer; }
        .active-tab { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <header class="home-header">
            <div class="logo"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"> Indivibe</div>
            <i class="material-icons-outlined">favorite_border</i>
        </header>
        <div class="stories">
            <div class="s-ring"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"></div>
            <div class="s-ring"><img src="https://i.pravatar.cc/100?u=1"></div>
            <div class="s-ring"><img src="https://i.pravatar.cc/100?u=2"></div>
        </div>
        <div style="padding: 100px 20px; text-align: center; color: #555;">No Posts yet. Visit Vibe to see Reels!</div>
    </div>

    <div id="search" class="page"><div style="padding:100px; text-align:center;">Khojiye...</div></div>

    <div id="upload" class="page">
        <div style="padding:100px; text-align:center;">
            <h2>Upload Vibe</h2>
            <input type="file" id="videoFile" accept="video/*" style="margin-top:20px;">
        </div>
    </div>

    <div id="vibe-page" class="page" style="height:100vh;">
        <div id="vibe-container"></div>
        <div class="comment-pill-wrap">
            <div class="pill">
                <input type="text" id="comInput" placeholder="कमेंट जोड़ें..." onkeypress="if(event.key==='Enter') postCom()">
                <i class="material-icons" style="opacity:0.6; font-size:20px;">sentiment_satisfied_alt</i>
            </div>
        </div>
    </div>

    <div id="profile" class="page"><div style="padding:100px; text-align:center;"><h2>Vishnu Raj</h2><p>Rajasthan, India</p></div></div>

    <nav class="bottom-nav">
        <i class="material-icons active-tab" onclick="switchPage('home', this)">home</i>
        <i class="material-icons" onclick="switchPage('search', this)">search</i>
        <i class="material-icons" onclick="switchPage('upload', this)" style="font-size:36px;">add_box</i>
        <i class="material-icons" onclick="switchPage('vibe-page', this)">play_circle_outline</i>
        <i class="material-icons" onclick="switchPage('profile', this)">person_outline</i>
    </nav>

    <div class="overlay" id="ovl" onclick="closeShare()"></div>
    <div class="share-sheet" id="shSheet">
        <h4 style="text-align:center;">Doston ko bhejें</h4>
        <div class="f-grid">
            <div class="f-item" onclick="this.style.opacity='0.5'"><img src="https://i.pravatar.cc/100?u=x"><p>Rahul</p></div>
            <div class="f-item" onclick="this.style.opacity='0.5'"><img src="https://i.pravatar.cc/100?u=y"><p>Ankit</p></div>
            <div class="f-item" onclick="this.style.opacity='0.5'"><img src="https://i.pravatar.cc/100?u=z"><p>Priya</p></div>
        </div>
        <button class="send-now" onclick="alert('Video Bhej di gayi!'); closeShare()">Bhejein</button>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        function switchPage(pId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('.bottom-nav i').forEach(i => i.classList.remove('active-tab'));
            el.classList.add('active-tab');
            if(pId === 'vibe-page') loadReels();
        }

        async function loadReels() {
            const { data } = await supa.from('videos').select('*').order('created_at', {ascending: false});
            if(data) {
                document.getElementById('vibe-container').innerHTML = data.map(v => `
                    <div class="vibe-unit">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-sidebar">
                            <div class="v-btn" onclick="toggleLike(this)"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="v-btn" onclick="document.getElementById('comInput').focus()"><i class="material-icons-outlined">chat_bubble_outline</i><span>540</span></div>
                            <div class="v-btn" onclick="openShare()"><i class="material-icons" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="v-btn"><i class="material-icons">bookmark_border</i><span>Save</span></div>
                            <div class="v-btn"><i class="material-icons">more_horiz</i></div>
                        </div>
                        <div class="vibe-meta">
                            <div class="user-tag">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png">
                                <strong>Vishnu Raj <i class="material-icons v-tick">check_circle</i></strong>
                            </div>
                            <p>${v.caption || 'Feel the vibe! #indivibe'}</p>
                        </div>
                    </div>
                `).join('');
                initPlayer();
            }
        }

        function toggleLike(e) { e.querySelector('i').classList.toggle('liked'); }
        function openShare() { document.getElementById('shSheet').classList.add('open'); document.getElementById('ovl').style.display='block'; }
        function closeShare() { document.getElementById('shSheet').classList.remove('open'); document.getElementById('ovl').style.display='none'; }
        function postCom() { alert('Comment: ' + document.getElementById('comInput').value); document.getElementById('comInput').value = ''; }

        function initPlayer() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => { const v = e.target.querySelector('video'); if(e.isIntersecting) v.play(); else v.pause(); });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-unit').forEach(u => obs.observe(u));
        }

        loadReels();
    </script>
</body>
</html>

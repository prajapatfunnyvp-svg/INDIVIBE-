<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro v5 - FB Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* REELS (VIBES) SNAP SCROLLING */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* TOP HEADER (FACEBOOK STYLE like image_6.png) */
        .fb-top-bar { position: absolute; top: 0; width: 100%; height: 65px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); z-index: 100; }
        .fb-top-bar span { font-size: 28px !important; margin-right: 15px; cursor: pointer; color: white; }
        .fb-top-bar b { font-size: 20px; flex: 1; font-weight: 700; color: white; }

        /* RIGHT SIDE ACTIONS (Exact FB Layout & Gap like image_6.png) */
        .vibe-actions { position: absolute; right: 10px; bottom: 90px; display: flex; flex-direction: column; gap: 16px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
        .vibe-icon { font-size: 28px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); transition: 0.2s; }
        .action-label { font-size: 11px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 3px #000; color: white; }

        /* BOTTOM LEFT USER INFO (FB Style like image_6.png) */
        .vibe-info { position: absolute; left: 15px; bottom: 95px; width: 78%; z-index: 100; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; pointer-events: auto; }
        .user-pic { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid white; object-fit: cover; }
        .user-name { font-weight: 700; font-size: 14px; text-shadow: 0 1px 4px #000; }
        .follow-badge { border: 1.2px solid white; padding: 2px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); color: white; }
        .vibe-desc { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 4px #000; font-weight: 400; padding-left: 2px; pointer-events: auto; }

        /* FACEBOOK STYLE BOTTOM TRAY (For Download/Report/Save) */
        #fb-tray { position: fixed; bottom: -100%; left: 0; width: 100%; background: #262626; border-radius: 20px 20px 0 0; z-index: 2000; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding-bottom: 40px; }
        #fb-tray.open { bottom: 0; }
        .tray-handle { width: 36px; height: 4px; background: #555; border-radius: 10px; margin: 12px auto; }
        .tray-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 0.1px solid #333; cursor: pointer; font-size: 16px; font-weight: 600; color: white; }
        .tray-item:last-child { border: none; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #262626; z-index: 1000; }
        .nav-btn { font-size: 28px !important; color: white; opacity: 0.6; }
        .nav-btn.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div id="fb-tray">
        <div class="tray-handle" onclick="closeTray()"></div>
        <div class="tray-item" onclick="saveVibe()"><span class="material-icons-outlined">bookmark_border</span> <b>Save to Vibe Collection</b></div>
        <div class="tray-item" id="btn-download" style="color: white;"><span class="material-icons-outlined">file_download</span> <b>Download Video</b></div>
        <div class="tray-item" onclick="alert('Report submitted to Vishnu.')" style="color: #ff3b3b;"><span class="material-icons-outlined">report_problem</span> <b>Report Content</b></div>
        <div class="tray-item" onclick="closeTray()" style="color: white; opacity: 0.7;"><span class="material-icons-outlined">close</span> Cancel</div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-btn" onclick="location.reload()">home</span>
        <span class="material-icons-outlined nav-btn">search</span>
        <span class="material-icons-outlined nav-btn">add_box</span>
        <span class="material-icons-outlined nav-btn active">play_circle</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:26px; height:26px; border-radius:50%; border: 1.5px solid #fff;">
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function fetchFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="fb-top-bar">
                            <span class="material-icons-outlined">arrow_back</span>
                            <b>Vibes</b>
                            <span class="material-icons-outlined">search</span>
                            <span class="material-icons-outlined">account_circle</span>
                        </div>
                        <video src="${v.video_url}?v=5" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pic">
                                <span class="user-name">@vishnu_vibes</span>
                                <div class="follow-badge">Follow</div>
                            </div>
                            <div class="vibe-desc">${v.caption || 'IndiVibe Pro Quality Content'}</div>
                        </div>
                        <div class="vibe-actions">
                            <div class="action-item" onclick="handleLike(this)"><span class="material-icons-outlined vibe-icon">thumb_up_off_alt</span><span class="action-label">1.5M</span></div>
                            <div class="action-item" onclick="alert('Comments opening...')"><span class="material-icons-outlined vibe-icon">mode_comment</span><span class="action-label">45K</span></div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})"><span class="material-icons-outlined vibe-icon">share</span></div>
                            <div class="action-item" onclick="openTray('${v.video_url}')"><span class="material-icons-outlined vibe-icon">more_horiz</span></div>
                        </div>
                    </div>
                `).join('');
                startScrollObserver();
            }
        }

        function startScrollObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target.querySelector('video');
                    if (e.isIntersecting) { video.play().catch(() => {}); } 
                    else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => observer.observe(c));
        }

        function openTray(url) {
            document.getElementById('fb-tray').classList.add('open');
            document.getElementById('btn-download').onclick = () => {
                window.open(url, '_blank');
                closeTray();
            };
        }

        function closeTray() { document.getElementById('fb-tray').classList.remove('open'); }

        function handleLike(el) {
            const i = el.querySelector('.vibe-icon');
            if(i.innerText === 'thumb_up_off_alt') {
                i.innerText = 'thumb_up';
                i.style.color = '#3578E5'; // FB Blue
            } else {
                i.innerText = 'thumb_up_off_alt';
                i.style.color = 'white';
            }
        }

        function saveVibe() {
            alert('Saving function needs backend setup to your Vibe database. Saved internally for now!');
            closeTray();
        }

        fetchFeed();
    </script>
</body>
</html>

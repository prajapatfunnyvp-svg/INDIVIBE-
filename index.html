<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; }
    </style>
</head>
<body>
    <div id="reels" class="reels-container"><div id="msg">Reels taiyar ho rahi hain...</div></div>
    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const K1 = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.';
        const K2 = 'Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        const _supa = supabase.createClient(URL, K1 + K2);

        async function load() {
            const { data, error } = await _supa.from('videos').select('*');
            if (data && data.length > 0) {
                document.getElementById('msg').style.display = 'none';
                const container = document.getElementById('reels');
                data.forEach(v => {
                    const videoSrc = v.video_url || v.url || Object.values(v).find(val => val && val.includes('http'));
                    if (videoSrc) {
                        const d = document.createElement('div');
                        d.className = 'reel';
                        d.innerHTML = `<video src="${videoSrc}" loop autoplay muted playsinline></video>`;
                        container.appendChild(d);
                    }
                });
            } else {
                document.getElementById('msg').innerText = error ? "Error: " + error.message : "Database khali hai!";
            }
        }
        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* TOP NAV: Instagram Style (Reels | Friends) */
        .top-nav { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); }
        .nav-link { font-size: 18px; font-weight: 700; opacity: 0.6; }
        .nav-link.active { opacity: 1; border-bottom: 2px solid white; }

        /* VIBE FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* RIGHT ACTIONS (Instagram Standard) */
        .vibe-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 100; }
        .vibe-icon { font-size: 32px !important; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); cursor: pointer; }
        .action-label { font-size: 12px; font-weight: 600; margin-top: 2px; }

        /* USER INFO (Bottom Left) */
        .vibe-info { position: absolute; left: 15px; bottom: 90px; width: 75%; z-index: 100; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .user-pic { width: 32px; height: 32px; border-radius: 50%; border: 1px solid white; }
        .follow-btn { border: 1px solid white; padding: 2px 10px; border-radius: 5px; font-size: 12px; font-weight: 700; background: transparent; color: white; }

        /* BOTTOM NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #262626; z-index: 1000; }
        .nav-btn { font-size: 28px !important; color: white; opacity: 0.7; }
        
        /* UPLOAD MODAL */
        #upload-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="top-nav">
        <span class="nav-link active">Vibes</span>
        <span class="nav-link">Friends</span>
    </div>

    <div id="vibe-feed">
        <div style="padding-top: 100px; text-align: center;">Loading...</div>
    </div>

    <div id="upload-modal">
        <h3>Upload New Vibe</h3>
        <input type="file" id="video-input" accept="video/*" style="margin-bottom: 20px;">
        <input type="text" id="caption-input" placeholder="Write a caption..." style="width: 80%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: none;">
        <button onclick="handleUpload()" id="upload-btn" style="padding: 10px 30px; background: #00f2ea; border: none; border-radius: 5px; font-weight: bold;">Upload Now</button>
        <button onclick="toggleModal(false)" style="background: none; color: white; border: none; margin-top: 15px;">Cancel</button>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-btn">home</span>
        <span class="material-icons-outlined nav-btn">search</span>
        <span class="material-icons-outlined nav-btn" onclick="toggleModal(true)">add_box</span>
        <span class="material-icons-outlined nav-btn">play_circle</span>
        <span class="material-icons-outlined nav-btn">person</span>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pic">
                                <b>vishnu_vibes</b>
                                <button class="follow-btn">Follow</button>
                            </div>
                            <p>${v.caption || 'Feel the vibe! 🇮🇳'}</p>
                        </div>
                        <div class="vibe-actions">
                            <span class="material-icons-outlined vibe-icon" onclick="like(this)">favorite_border</span>
                            <span class="action-label">1.5M</span>
                            <span class="material-icons-outlined vibe-icon">chat_bubble_outline</span>
                            <span class="action-label">45K</span>
                            <span class="material-icons-outlined vibe-icon">send</span>
                            <span class="material-icons-outlined vibe-icon" onclick="save(this)">bookmark_border</span>
                        </div>
                    </div>
                `).join('');
                document.querySelector('video').play();
            }
        }

        // --- UPLOAD LOGIC ---
        function toggleModal(show) { document.getElementById('upload-modal').style.display = show ? 'flex' : 'none'; }

        async function handleUpload() {
            const file = document.getElementById('video-input').files[0];
            const caption = document.getElementById('caption-input').value;
            const btn = document.getElementById('upload-btn');

            if (!file) return alert("Video select karein!");
            
            btn.innerText = "Uploading...";
            btn.disabled = true;

            const fileName = `${Date.now()}_${file.name}`;
            
            // 1. Upload to Storage
            const { data: uploadData, error: uploadError } = await supa.storage
                .from('videos')
                .upload(fileName, file);

            if (uploadError) {
                console.error(uploadError);
                alert("Upload failed! Storage check karein.");
                btn.innerText = "Upload Now";
                btn.disabled = false;
                return;
            }

            // 2. Get Public URL
            const { data: urlData } = supa.storage.from('videos').getPublicUrl(fileName);
            
            // 3. Save to Database
            await supa.from('videos').insert([{ video_url: urlData.publicUrl, caption: caption }]);

            alert("Vibe uploaded successfully!");
            location.reload();
        }

        function like(el) { el.innerText = (el.innerText === 'favorite_border') ? 'favorite' : 'favorite_border'; el.style.color = (el.innerText === 'favorite') ? 'red' : 'white'; }
        function save(el) { el.innerText = (el.innerText === 'bookmark_border') ? 'bookmark' : 'bookmark_border'; }

        loadVibes();
    </script>
</body>
</html>

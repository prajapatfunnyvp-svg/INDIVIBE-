<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* Smooth Vertical Scroll */
        .v-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-feed::-webkit-scrollbar { display: none; }
        
        .v-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB Header */
        .v-head { position: absolute; top: 0; width: 100%; height: 55px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 10; }
        .v-head b { font-size: 20px; flex: 1; }

        /* Side Actions (Right Side) */
        .v-side { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .v-action { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .v-action i { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .v-action span { font-size: 11px; margin-top: 3px; font-weight: bold; text-shadow: 0 1px 2px #000; }

        /* Bottom Profile (No Comment Box Here) */
        .v-bottom { position: absolute; bottom: 25px; left: 15px; width: 75%; z-index: 10; }
        .v-user { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .v-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .v-name { font-weight: 700; font-size: 15px; }
        .v-follow { border: 1px solid #fff; padding: 1px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .v-cap { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 3px #000; }

        /* 📱 NEW: FB Style Sliding Comment Drawer */
        #drawer-comm { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; background: #242526; border-radius: 15px 15px 0 0; z-index: 100; transition: 0.3s ease; display: flex; flex-direction: column; }
        #drawer-comm.open { bottom: 0; }
        .dr-head { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; position: relative; }
        .dr-list { flex: 1; overflow-y: auto; padding: 15px; }
        .dr-input-bar { padding: 10px 15px 30px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .fb-input-box { background: #3a3b3c; border-radius: 20px; padding: 10px 15px; flex: 1; border: none; color: white; outline: none; }

        /* More Options (Save/Report) */
        #drawer-opt { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 101; transition: 0.3s; }
        #drawer-opt.open { bottom: 0; }
        .opt-row { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="reels-feed" class="v-feed"></div>

    <div id="drawer-comm">
        <div class="dr-head">Comments <i class="material-icons-outlined" style="position:absolute; right:15px;" onclick="closeAll()">close</i></div>
        <div class="dr-list" id="dr-data">No comments yet.</div>
        <div class="dr-input-bar">
            <input type="text" id="dr-in" class="fb-input-box" placeholder="Write a comment...">
            <span style="color:#1877F2; font-weight:bold; padding-top:8px" onclick="addComm()">Post</span>
        </div>
    </div>

    <div id="drawer-opt">
        <div class="opt-row" onclick="alert('Saved')"><i class="material-icons-outlined">bookmark_border</i> Save Video</div>
        <div class="opt-row" onclick="alert('Downloading...')"><i class="material-icons-outlined">download</i> Download</div>
        <div class="opt-row" style="color:red" onclick="alert('Reported')"><i class="material-icons-outlined">report</i> Report</div>
        <div class="opt-row" onclick="closeAll()" style="justify-content:center; color:#aaa">Cancel</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function load() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('reels-feed').innerHTML = data.map(v => `
                    <div class="v-unit">
                        <div class="v-head"><i class="material-icons-outlined">arrow_back</i><b>IndiVibe</b></div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="v-side">
                            <div class="v-action" onclick="like(this)"><i class="material-icons-outlined">favorite_border</i><span>1.5M</span></div>
                            <div class="v-action" onclick="openComm()"><i class="material-icons-outlined">chat_bubble_outline</i><span>45K</span></div>
                            <div class="v-action" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform: scaleX(-1);">reply</i><span>Share</span></div>
                            <div class="v-action" onclick="openOpt()"><i class="material-icons-outlined">more_horiz</i></div>
                        </div>
                        <div class="v-bottom">
                            <div class="v-user">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="v-avatar">
                                <span class="v-name">Vishnupur Fifthoot</span>
                                <div class="v-follow">Follow</div>
                            </div>
                            <div class="v-cap">${v.caption || ''}</div>
                        </div>
                    </div>
                `).join('');
                startVideos();
            }
        }

        function startVideos() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.v-unit').forEach(u => obs.observe(u));
        }

        function like(el) {
            const i = el.querySelector('i');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        function openComm() { document.getElementById('drawer-comm').classList.add('open'); }
        function openOpt() { document.getElementById('drawer-opt').classList.add('open'); }
        function closeAll() { 
            document.getElementById('drawer-comm').classList.remove('open');
            document.getElementById('drawer-opt').classList.remove('open');
        }
        function addComm() {
            const t = document.getElementById('dr-in');
            if(t.value) {
                document.getElementById('dr-data').innerHTML += `<div style="margin-bottom:10px"><b>Aap:</b> ${t.value}</div>`;
                t.value = "";
            }
        }

        load();
    </script>
</body>
</html>

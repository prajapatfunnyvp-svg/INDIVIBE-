<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe Official Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Vibe Feed */
        #main-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-container { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar Actions */
        .sidebar { position: absolute; right: 12px; bottom: 150px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .action-btn { text-align: center; cursor: pointer; }
        .action-btn i { font-size: 35px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .action-btn span { font-size: 12px; display: block; margin-top: 4px; font-weight: 600; }

        /* Video Info */
        .video-data { position: absolute; bottom: 140px; left: 16px; z-index: 100; width: 70%; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .v-tick { color: #1877F2; font-size: 16px; vertical-align: middle; }

        /* Real Instagram Pill Comment Box */
        .comment-section { position: fixed; bottom: 80px; width: 100%; padding: 0 16px; z-index: 1000; }
        .pill-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; }
        .pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }
        .pill-box i { font-size: 22px; opacity: 0.8; }

        /* Share / Send Sheet */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; z-index:2000; }
        .share-sheet { position: fixed; bottom: -100%; width: 100%; background: #262626; border-radius: 20px 20px 0 0; z-index: 3000; transition: 0.4s; padding: 20px; }
        .share-sheet.active { bottom: 0; }
        .friend-list { display: flex; gap: 20px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .friend { text-align: center; min-width: 70px; }
        .friend img { width: 55px; height: 55px; border-radius: 50%; margin-bottom: 5px; border: 1px solid #444; }
        .send-btn { background: #0095f6; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #222; z-index: 2500; }
        .nav-bar i { font-size: 30px; color: #fff; opacity: 0.5; }
        .active-icon { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="main-feed"></div>

    <div class="comment-section">
        <div class="pill-box">
            <input type="text" id="commentInput" placeholder="कमेंट जोड़ें..." onkeypress="if(event.key==='Enter') addComment()">
            <i class="material-icons">sentiment_satisfied_alt</i>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeShare()"></div>
    <div class="share-sheet" id="shareSheet">
        <h3 style="text-align:center; margin-bottom:15px;">Doston ko bhejein</h3>
        <div class="friend-list">
            <div class="friend" onclick="selectF(this)"><img src="https://i.pravatar.cc/100?u=1"><p>Rahul</p></div>
            <div class="friend" onclick="selectF(this)"><img src="https://i.pravatar.cc/100?u=2"><p>Amit</p></div>
            <div class="friend" onclick="selectF(this)"><img src="https://i.pravatar.cc/100?u=3"><p>Priya</p></div>
            <div class="friend" onclick="selectF(this)"><img src="https://i.pravatar.cc/100?u=4"><p>Sumit</p></div>
        </div>
        <button class="send-btn" onclick="sendVideo()">Bhejein</button>
    </div>

    <nav class="nav-bar">
        <i class="material-icons active-icon">home</i>
        <i class="material-icons">search</i>
        <i class="material-icons" style="font-size:38px;">add_box</i>
        <i class="material-icons">play_circle_outline</i>
        <i class="material-icons">person_outline</i>
    </nav>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', {ascending: false});
            if(data) {
                document.getElementById('main-feed').innerHTML = data.map(v => `
                    <div class="vibe-container">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="action-btn" onclick="this.querySelector('i').style.color='#ff3040'"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="action-btn" onclick="document.getElementById('commentInput').focus()"><i class="material-icons">chat_bubble_outline</i><span>1,155</span></div>
                            <div class="action-btn" onclick="openShare()"><i class="material-icons" style="transform:scaleX(-1)">reply</i><span>13.3K</span></div>
                            <div class="action-btn"><i class="material-icons">bookmark_border</i><span>Save</span></div>
                            <div class="action-btn"><i class="material-icons">more_horiz</i></div>
                        </div>
                        <div class="video-data">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="avatar">
                                <strong>Vishnu Raj <i class="material-icons v-tick">check_circle</i></strong>
                            </div>
                            <p style="font-size:14px; opacity:0.9;">${v.caption || 'Naya Vibe! #indivibe'}</p>
                        </div>
                    </div>
                `).join('');
                startAutoPlay();
            }
        }

        function openShare() { document.getElementById('shareSheet').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeShare() { document.getElementById('shareSheet').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        
        function selectF(el) { el.style.opacity = '0.5'; el.innerHTML += '<i class="material-icons" style="position:absolute; color:#0095f6;">check_circle</i>'; }
        
        function sendVideo() { alert('Video bhej di gayi hai!'); closeShare(); }

        function addComment() { 
            const val = document.getElementById('commentInput').value;
            if(val) { alert('Comment Posted: ' + val); document.getElementById('commentInput').value = ''; }
        }

        function startAutoPlay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) video.play(); else video.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.vibe-container').forEach(card => observer.observe(card));
        }

        loadVibes();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE - Vibe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .brand { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 24px; font-weight: 900; text-shadow: 2px 2px 8px #000; }

        /* SIDEBAR - Exactly like Image */
        .vibe-sidebar { position: absolute; right: 12px; bottom: 110px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action-node { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-node i { font-size: 32px; text-shadow: 0 2px 10px #000; }
        .action-node span { font-size: 13px; font-weight: 600; margin-top: 2px; }
        .red { color: #ff3040 !important; }

        /* USER INFO */
        .vibe-info { position: absolute; bottom: 85px; left: 16px; z-index: 100; max-width: 80%; }
        .u-line { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #fff; }
        .u-name { font-weight: 700; font-size: 15px; }

        /* GOOL (ROUNDED) FB COMMENT BOX - Exact Copy */
        .comment-area { position: absolute; bottom: 20px; width: 100%; padding: 0 12px; z-index: 100; display: flex; justify-content: center; }
        .comment-pill { 
            width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); border-radius: 30px; padding: 8px 15px; 
            display: flex; align-items: center; border: 0.5px solid rgba(255,255,255,0.2);
        }
        .comment-pill span { flex: 1; color: #eee; font-size: 14px; padding-left: 5px; }
        .comment-pill i { font-size: 22px; opacity: 0.9; margin: 0 5px; }

        /* 3-DOT SHEET (Download, Interest, No Interest) */
        .fb-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; 
            border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 15px 0; 
            z-index: 1000; transition: 0.3s ease;
        }
        .fb-sheet.active { bottom: 0; }
        .sheet-row { display: flex; align-items: center; gap: 15px; padding: 16px 20px; border-bottom: 0.5px solid #333; color: #e4e6eb; cursor: pointer; }
        .sheet-row i { font-size: 28px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 900; }

        /* Double Tap Pop */
        .pop-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; color: #fff; z-index: 200; pointer-events: none; opacity: 0; }
        .animate-heart { animation: heartPop 0.8s ease; }
        @keyframes heartPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>
    
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>
    <div class="fb-sheet" id="sheet">
        <div style="width: 40px; height: 4px; background: #555; margin: 0 auto 10px; border-radius: 2px;"></div>
        <div class="sheet-row" id="dlBtn"><i class="material-icons-outlined">file_download</i> <span>Download</span></div>
        <div class="sheet-row" onclick="alert('Added to Interest'); closeMenu()"><i class="material-icons-outlined">star_outline</i> <span>Interest</span></div>
        <div class="sheet-row" onclick="alert('Marked as Not Interested'); closeMenu()"><i class="material-icons-outlined">visibility_off</i> <span>Not Interested</span></div>
        <div class="sheet-row" onclick="closeMenu()" style="border:none; justify-content:center; color:#999;"><span>Cancel</span></div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        let activeUrl = "";

        async function init() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="brand">INDIVIBE</div>
                        <video src="${v.video_url}" loop playsinline onclick="vTap(this)" ondblclick="vLike(this)"></video>
                        <div class="pop-heart material-icons-outlined">favorite</div>

                        <div class="vibe-sidebar">
                            <div class="action-node" onclick="vLike(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons-outlined h-icon">favorite_border</i><span>14K</span>
                            </div>
                            <div class="action-node"><i class="material-icons-outlined">chat_bubble_outline</i><span>980</span></div>
                            <div class="action-node" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="action-node" onclick="alert('Saved!')"><i class="material-icons-outlined">bookmark_border</i><span>Save</span></div>
                            <div class="action-node" onclick="openMenu('${v.video_url}')"><i class="material-icons-outlined">more_horiz</i></div>
                        </div>

                        <div class="vibe-info">
                            <div class="u-line">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
                                <span class="u-name">Vishnupur Fifthoot</span>
                            </div>
                            <p style="padding-left:4px; font-size:14px;">${v.caption || ''}</p>
                        </div>

                        <div class="comment-area">
                            <div class="comment-pill">
                                <span>कमेंट जोड़ें...</span>
                                <i class="material-icons-outlined">alternate_email</i>
                                <i class="material-icons-outlined">sentiment_satisfied</i>
                                <i class="material-icons-outlined">gif_box</i>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupObs();
            }
        }

        function openMenu(url) {
            activeUrl = url;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('sheet').classList.add('active');
        }

        function closeMenu() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('sheet').classList.remove('active');
        }

        document.getElementById('dlBtn').onclick = () => { window.open(activeUrl); closeMenu(); };

        let t;
        function vTap(v) {
            if (t) return;
            t = setTimeout(() => { v.paused ? v.play() : v.pause(); t = null; }, 250);
        }

        function vLike(v) {
            clearTimeout(t); t = null;
            const h = v.parentElement.querySelector('.pop-heart');
            h.classList.add('animate-heart');
            setTimeout(() => h.classList.remove('animate-heart'), 800);
            const icon = v.parentElement.querySelector('.h-icon');
            icon.innerText = 'favorite'; icon.classList.add('red');
        }

        function setupObs() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(r => obs.observe(r));
        }

        init();
    </script>
</body>
</html>

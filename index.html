<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>INDIVIBE Final</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* CSS: Design and Layout */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background:#000; color:#fff; overflow:hidden; }

/* Header & Stories */
.top-nav { position: fixed; top: 0; width: 100%; z-index: 100; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); padding: 10px 15px; }
.brand { font-weight: 900; font-size: 24px; color: #1877F2; }
.stories { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
.stories::-webkit-scrollbar { display: none; }
.s-circle { min-width: 62px; height: 62px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; }
.s-circle img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }

/* Feed */
#feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
#feed::-webkit-scrollbar { display: none; }
.video-container { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
video { width: 100%; height: 100%; object-fit: cover; }

/* Actions */
.actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 50; align-items: center; }
.act-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-shadow: 0 1px 4px #000; }
.act-btn span { font-size: 11px; margin-top: 4px; font-weight: bold; }

/* Heart Pop */
.heart-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: #ff3040; opacity: 0; pointer-events: none; z-index: 60; }
.heart-pop.animate { animation: popHeart 0.8s forwards; }
@keyframes popHeart { 0% { transform: translate(-50%,-50%) scale(0); opacity: 0; } 50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0; } }

/* User Info */
.user-info { position: absolute; bottom: 80px; left: 15px; z-index: 50; }
.u-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #fff; }

/* Drawer */
.drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; background: #1c1c1e; border-radius: 20px 20px 0 0; z-index: 200; transition: 0.3s; padding: 20px; }
.drawer.active { bottom: 0; }
</style>
</head>
<body>

<div class="top-nav">
  <div class="brand">INDIVIBE</div>
  <div class="stories">
    <div class="s-circle"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"></div>
    <div class="s-circle"><img src="https://picsum.photos/200"></div>
    <div class="s-circle"><img src="https://picsum.photos/300"></div>
    <div class="s-circle"><img src="https://picsum.photos/400"></div>
  </div>
</div>

<div id="feed"></div>

<div class="drawer" id="comm-drawer">
  <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
    <b>Comments</b>
    <i data-lucide="x" onclick="toggleC(false)"></i>
  </div>
  <div id="comm-list" style="overflow-y:auto; height:80%;">Loading...</div>
</div>

<script>
/* Yeh wahi Logic hai jo aapne upar bheja tha, bas Supabase Key aur ID fix ki gayi hai */
const supabase = window.supabase.createClient(
  "https://jxjbmjburdksqfjyhrxp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4"
);

let currentVideoId = null;
let observer;

async function loadVibes() {
  const { data } = await supabase.from("videos").select(`id, video_url, caption, created_at`).order('created_at', { ascending: false });
  if (data) renderFeed(data);
}

function renderFeed(videos) {
  const feed = document.getElementById("feed");
  feed.innerHTML = videos.map(v => `
    <div class="video-container" data-id="${v.id}">
      <video src="${v.video_url}" loop playsinline></video>
      <div class="heart-pop">❤</div>
      <div class="actions">
        <div class="act-btn like-btn"><i data-lucide="heart" class="h-icon"></i><span>1.2M</span></div>
        <div class="act-btn comment-btn"><i data-lucide="message-circle"></i><span>45K</span></div>
        <div class="act-btn share-btn"><i data-lucide="share-2"></i><span>Share</span></div>
        <div class="act-btn download-btn"><i data-lucide="download"></i></div>
      </div>
      <div class="user-info">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
          <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
          <b>@vishnu_pur</b>
        </div>
        <p>${v.caption || ''}</p>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
  bindEvents();
  setupObserver();
}

function bindEvents() {
  document.querySelectorAll(".video-container").forEach(container => {
    const video = container.querySelector("video");
    const id = container.dataset.id;
    let lastTap = 0;

    video.addEventListener("click", () => {
      const now = Date.now();
      if (now - lastTap < 300) { likeVideo(id, container); } 
      else { video.paused ? video.play() : video.pause(); }
      lastTap = now;
    });

    container.querySelector(".like-btn").onclick = () => likeVideo(id, container);
    container.querySelector(".comment-btn").onclick = () => openComments(id);
    container.querySelector(".share-btn").onclick = () => navigator.share({ url: video.src });
    container.querySelector(".download-btn").onclick = () => window.open(video.src);
  });
}

async function likeVideo(id, container) {
  const heart = container.querySelector(".heart-pop");
  heart.classList.add("animate");
  setTimeout(() => heart.classList.remove("animate"), 800);
  const icon = container.querySelector(".h-icon");
  icon.style.fill = "#ff3040"; icon.style.stroke = "#ff3040";
}

function openComments(id) {
  document.getElementById("comm-drawer").classList.add("active");
  document.getElementById("comm-list").innerHTML = "Real-time comments feature active.";
}

function setupObserver() {
  observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const v = e.target.querySelector("video");
      if (e.isIntersecting) v.play(); else v.pause();
    });
  }, { threshold: 0.7 });
  document.querySelectorAll(".video-container").forEach(c => observer.observe(c));
}

function toggleC(open) { document.getElementById("comm-drawer").classList.toggle("active", open); }

loadVibes();
</script>
</body>
</html>

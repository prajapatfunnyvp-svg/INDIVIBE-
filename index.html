<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00f2ea; font-family: sans-serif; overflow: hidden; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .v-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .go-btn { background: #00f2ea; color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <h1>INDIVIBE</h1>
        <p id="msg">Connecting to Server...</p>
        <button id="btn" class="go-btn" onclick="startApp()">START VIBING</button>
    </div>

    <div id="feed" class="feed"></div>

    <script>
        // In dono ko dhyan se dekhein, inme galti nahi honi chahiye
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        
        const _supa = supabase.createClient(URL, KEY);

        async function init() {
            try {
                const { data, error } = await _supa.from('videos').select('*');
                if (error) {
                    document.getElementById('msg').innerText = "Key Error: Check API Key settings.";
                } else if (data && data.length > 0) {
                    window.vList = data;
                    document.getElementById('msg').innerText = "Connected! ✅";
                    document.getElementById('btn').style.display = "block";
                } else {
                    document.getElementById('msg').innerText = "Table is Empty in Supabase!";
                }
            } catch (e) {
                document.getElementById('msg').innerText = "Network Error!";
            }
        }
        init();

        function startApp() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('feed').innerHTML = window.vList.map(v => `
                <div class="v-card">
                    <video src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                    <div style="position:absolute; bottom:30px; left:15px;"><h4>@IndiVibe_Music</h4></div>
                </div>
            `).join('');
            document.querySelector('video').play();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE CHECK</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; margin: 0; }
        .card { border: 2px solid #00f2ea; padding: 30px; border-radius: 20px; width: 80%; background: #111; }
        button { background: #00f2ea; color: #000; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>INDIVIBE</h1>
        <p id="msg">Checking Database...</p>
        <div id="box"></div>
    </div>
    <video id="vid" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover;" controls playsinline loop></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6InF1b24iLCJpYXQiOjE3NDI5MTQ0MDAsImV4cCI6MjA1ODQ3NDQwMH0.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        const _supa = supabase.createClient(URL, KEY);

        async function init() {
            try {
                const { data, error } = await _supa.from('videos').select('*');
                
                if (error) {
                    document.getElementById('msg').innerText = "Error: " + error.message;
                } else if (data && data.length > 0) {
                    document.getElementById('msg').innerText = "INDIVIBE READY!";
                    document.getElementById('box').innerHTML = '<button onclick="play()">WATCH NOW</button>';
                    document.getElementById('vid').src = data[data.length - 1].video_url;
                } else {
                    document.getElementById('msg').innerText = "Database is EMPTY! Please add a video link in Supabase.";
                }
            } catch (e) {
                document.getElementById('msg').innerText = "Connection Failed.";
            }
        }

        function play() {
            document.querySelector('.card').style.display = 'none';
            const v = document.getElementById('vid');
            v.style.display = 'block';
            v.play();
        }
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe - Real Vibe Design</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Vibe Feed */
        #feed { height: calc(100vh - 65px); overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: calc(100vh - 65px); width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Watermark for Promotion */
        .vibe-watermark { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 5px; opacity: 0.7; pointer-events: none; z-index: 10; }
        .vibe-watermark img { width: 22px; height: 22px; border-radius: 4px; }
        .vibe-watermark span { font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        /* Sidebar Actions (Icons from your image) */
        .vibe-sidebar { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .vibe-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .vibe-btn i { font-size: 32px; color: #fff; }
        .vibe-btn span { font-size: 11px; font-weight: 600; margin-top: 2px; }
        .vibe-liked { color: #ff3040 !important; }

        /* User Info Section */
        .vibe-footer { position: absolute; bottom: 20px; left: 16px; z-index: 100; width: 75%; }
        .vibe-user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .vibe-logo { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #fff; }
        .vibe-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 4px; }

        /* Pill Comment Sheet */
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 20px 20px 0 0; z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .sheet.active { bottom: 0; }
        .sheet-header { padding: 12px; text-align: center; border-bottom: 0.5px solid #333; }
        .pill-container { padding: 10px 15px 30px; background: #242526; }
        .pill-box { background: #3a3b3c; border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border: 1px solid #444; }
        .pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }

        /* Navigation Bar */
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; z-index: 1000; }
        nav i { color: #fff; font-size: 28px; opacity: 0.7; }
        nav i.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="feed"></div>

    <nav>
        <i class="material-icons active">home</i>
        <i class="material-icons-outlined">search</i>
        <i class="material-icons-outlined" style="font-size:38px;">add_box</i>
        <i class="material-icons-outlined">play_circle_outline</i>
        <i class="material-icons-outlined">person</i>
    </nav>

    <div class="sheet" id="commentSheet">
        <div class="sheet-header"><div style="width:35px;height:4px;background:#555;margin:0 auto 10px;border-radius:10px;"></div><b>Comments</b></div>
        <div style="height:40vh; overflow-y:auto; padding:20px; color:#888; text-align:center;">No comments yet. Be the first to Vibe!</div>
        <div class="pill-container">
            <div class="pill-box">
                <input type="text" placeholder="Add a comment...">
                <i class="material-icons" style="color:#1877F2;">send</i>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // Use your key
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="vibe-watermark">
                            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png">
                            <span>Indivibe</span>
                        </div>

                        <div class="vibe-sidebar">
                            <div class="vibe-btn" onclick="this.querySelector('i').classList.toggle('vibe-liked')"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="vibe-btn" onclick="document.getElementById('commentSheet').classList.add('active')"><i class="material-icons-outlined">chat_bubble_outline</i><span>5K</span></div>
                            <div class="vibe-btn"><i class="material-icons-outlined" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="vibe-btn" onclick="this.querySelector('i').style.color='#ffd700'"><i class="material-icons-outlined">bookmark_border</i><span>Save</span></div>
                            <div class="vibe-btn"><i class="material-icons">more_horiz</i></div>
                        </div>

                        <div class="vibe-footer">
                            <div class="vibe-user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="vibe-logo">
                                <span class="vibe-name">Vishnu Raj <i class="material-icons" style="font-size:14px;color:#1877F2;">check_circle</i></span>
                            </div>
                            <p style="font-size:14px; text-shadow:1px 1px 2px #000;">${v.caption || 'Feel the Vibe! #indivibe'}</p>
                        </div>
                    </div>
                `).join('');
                setupObserver();
            }
        }

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) vid.play(); else vid.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(r => obs.observe(r));
        }

        loadVibes();
    </script>
</body>
</html>

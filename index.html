<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE - Connect & Vibe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Level 2: Buttons (Like, Comment, Share) */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 20; }
        .btn { text-align: center; cursor: pointer; }
        .btn-icon { font-size: 30px; margin-bottom: 2px; text-shadow: 0 0 10px #000; }
        .btn-text { font-size: 12px; font-weight: bold; }

        /* User Branding */
        .user-info { position: absolute; bottom: 30px; left: 15px; z-index: 10; }
        .user-info h4 { margin: 0; font-size: 18px; color: #00f2ea; }

        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .go-btn { background: #00f2ea; color: #000; border: none; padding: 18px 50px; border-radius: 50px; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 0 20px #00f2ea; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:#00f2ea; letter-spacing: 2px;">INDIVIBE</h1>
        <p id="st">Checking Connection...</p>
        <button class="go-btn" id="sBtn" onclick="runApp()" style="display:none;">START VIBING</button>
    </div>

    <div id="main-feed" class="feed"></div>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        async function init() {
            try {
                // Seedha data mang rahe hain
                const { data, error } = await _supa.from('videos').select('*');
                if (data && data.length > 0) {
                    window.vList = data;
                    document.getElementById('st').innerText = "Database Connected! ✅";
                    document.getElementById('sBtn').style.display = "block";
                } else {
                    document.getElementById('st').innerText = "Table empty or Error! ❌";
                }
            } catch (e) { document.getElementById('st').innerText = "Offline Mode"; }
        }
        init();

        function runApp() {
            document.getElementById('start-overlay').style.display = 'none';
            const feed = document.getElementById('main-feed');
            
            feed.innerHTML = window.vList.map((v, i) => `
                <div class="video-card">
                    <video id="v-${i}" src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted; this.play();"></video>
                    <div class="side-bar">
                        <div class="btn" onclick="alert('Liked!')"><div class="btn-icon">❤️</div><div class="btn-text">1.2k</div></div>
                        <div class="btn" onclick="alert('Comment box coming soon!')"><div class="btn-icon">💬</div><div class="btn-text">45</div></div>
                        <div class="btn" onclick="alert('Link Copied!')"><div class="btn-icon">🚀</div><div class="btn-text">Share</div></div>
                    </div>
                    <div class="user-info">
                        <h4>@IndiVibe_Music</h4>
                        <p>Relaxing Instrumental Flute</p>
                    </div>
                </div>
            `).join('');
            
            const first = document.querySelector('video');
            if(first) first.play();
        }

        document.getElementById('main-feed').addEventListener('scroll', () => {
            document.querySelectorAll('video').forEach(v => {
                const r = v.getBoundingClientRect();
                if(r.top >= 0 && r.top < window.innerHeight / 2) v.play();
                else v.pause();
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Full Screen Feed */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar - Transparent System */
        .sidebar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .v-btn { text-align: center; cursor: pointer; color: #fff; }
        .v-btn i { font-size: 32px; text-shadow: 0 0 8px rgba(0,0,0,0.7); font-variation-settings: 'FILL' 0; transition: 0.2s; }
        .v-btn span { font-size: 12px; font-weight: 500; margin-top: 2px; display: block; }
        
        /* Fill Logic (Instagram Style) */
        .v-btn.active i { font-variation-settings: 'FILL' 1; }
        .like-btn.active i { color: #ff3040; }
        .save-btn.active i { color: #fff; }

        /* Meta Data */
        .meta { position: absolute; bottom: 100px; left: 16px; z-index: 100; width: 70%; pointer-events: none; }
        .u-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; pointer-events: auto; }
        .u-pic { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #fff; }

        /* THE GOL (PILL) COMMENT BOX - ONLY IN SHEET */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 2000; }
        .sheet { position: fixed; bottom: -100%; width: 100%; background: #1a1a1a; border-radius: 15px 15px 0 0; z-index: 3000; transition: 0.3s cubic-bezier(0.17, 0.84, 0.44, 1); }
        .sheet.active { bottom: 0; }
        .com-sheet { height: 60%; display: flex; flex-direction: column; }
        .handle { width: 40px; height: 4px; background: #444; margin: 10px auto; border-radius: 10px; }

        /* Pill Input System */
        .pill-footer { padding: 10px 16px; border-top: 0.5px solid #333; display: flex; align-items: center; gap: 10px; }
        .pill-box { flex: 1; background: #333; border-radius: 30px; padding: 8px 15px; display: flex; align-items: center; }
        .pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 14px; }

        /* 3-DOT MENU */
        .m-row { display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 0.1px solid #333; }
        .m-icon { text-align: center; }
        .m-icon i { background: #333; padding: 12px; border-radius: 12px; margin-bottom: 5px; }
        .m-opt { padding: 16px 25px; display: flex; align-items: center; gap: 15px; font-size: 16px; }

        /* Double Tap Heart */
        .pop-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #fff; font-size: 100px; opacity: 0; pointer-events: none; z-index: 1000; }
        .animate { animation: pop 0.8s ease-out; }
        @keyframes pop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>
    <i class="material-icons pop-heart" id="hAnim">favorite</i>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="sheet com-sheet" id="comSheet">
        <div class="handle"></div>
        <div id="cBox" style="flex:1; overflow-y:auto; padding:20px; color:#888; text-align:center;">Abhi koi comment nahi hai.</div>
        <div class="pill-footer">
            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:32px; border-radius:50%;">
            <div class="pill-box">
                <input type="text" id="cInp" placeholder="Comment jodein...">
                <i class="material-icons" style="color:#0095f6;" onclick="sendC()">send</i>
            </div>
        </div>
    </div>

    <div class="sheet" id="menuSheet" style="padding-bottom:20px;">
        <div class="handle"></div>
        <div class="m-row">
            <div class="m-icon" onclick="alert('Remixing...')"><i class="material-icons">loop</i><p>Remix</p></div>
            <div class="m-icon" onclick="alert('Sequence On')"><i class="material-icons">layers</i><p>Sequence</p></div>
            <div class="m-icon" onclick="alert('Auto Scroll On')"><i class="material-icons">sync</i><p>Auto-scroll</p></div>
        </div>
        <div class="m-opt" onclick="alert('Downloading...')"><i class="material-icons">download</i> Download Video</div>
        <div class="m-opt" onclick="alert('Interested')"><i class="material-icons">star_outline</i> Interested</div>
        <div class="m-opt" onclick="alert('Not Interested')"><i class="material-icons">sentiment_dissatisfied</i> Not Interested</div>
        <div class="m-opt" style="color:#ff3040;" onclick="alert('Reported')"><i class="material-icons">report</i> Report</div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function getVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at',{ascending:false});
            if(data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card" ondblclick="doLike(this)">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="v-btn like-btn" onclick="this.classList.toggle('active')"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="v-btn" onclick="openS('comSheet')"><i class="material-icons">chat_bubble_outline</i><span>1,155</span></div>
                            <div class="v-btn" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="v-btn save-btn" onclick="this.classList.toggle('active')"><i class="material-icons">bookmark_border</i><span>Save</span></div>
                            <div class="v-btn" onclick="openS('menuSheet')"><i class="material-icons">more_horiz</i></div>
                        </div>
                        <div class="meta">
                            <div class="u-info">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-pic">
                                <b>Vishnu Raj <i class="material-icons" style="color:#1877F2; font-size:14px;">check_circle</i></b>
                            </div>
                            <p>${v.caption || 'Indivibe!'}</p>
                        </div>
                    </div>
                `).join('');
                playLogic();
            }
        }

        function doLike(c) {
            c.querySelector('.like-btn').classList.add('active');
            const h = document.getElementById('hAnim');
            h.classList.add('animate');
            setTimeout(() => h.classList.remove('animate'), 800);
        }

        function openS(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeAll() { document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('active')); document.getElementById('overlay').style.display='none'; }
        
        function sendC() {
            const val = document.getElementById('cInp').value;
            if(val) {
                document.getElementById('cBox').innerHTML = `<div style="text-align:left; margin-bottom:10px;"><b>Me:</b> ${val}</div>` + document.getElementById('cBox').innerHTML;
                document.getElementById('cInp').value = '';
            }
        }

        function playLogic() {
            const obs = new IntersectionObserver(es => { es.forEach(e => { const v = e.target.querySelector('video'); if(e.isIntersecting) v.play(); else v.pause(); }); }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => obs.observe(c));
        }

        getVibes();
    </script>
</body>
</html>

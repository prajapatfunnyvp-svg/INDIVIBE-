<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        #feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed-container::-webkit-scrollbar { display: none; }
        .v-reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB TOPBAR */
        .fb-top { position: absolute; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 100; }
        .fb-top i { font-size: 24px; margin-right: 15px; }
        .fb-top b { font-size: 20px; flex: 1; font-weight: 500; }

        /* FB RIGHT ACTIONS (❤️ Heart + FB Icons) */
        .fb-right { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .btn-act { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .h-icon { font-size: 30px !important; color: white; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.8)); }
        .fb-icon { font-size: 28px !important; color: white; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.8)); }
        .count-txt { font-size: 11px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 3px #000; }

        /* FB BOTTOM TEXT AREA */
        .fb-bottom { position: absolute; left: 15px; bottom: 100px; width: 75%; z-index: 100; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .u-name { font-weight: 700; font-size: 15px; text-shadow: 0 1px 3px #000; }
        .f-btn { background: transparent; border: 1px solid #fff; color: #fff; padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: 600; }
        .v-cap { font-size: 14px; text-shadow: 0 1px 3px #000; line-height: 1.3; }

        /* COMMENT & MORE TRAY (AS REQUESTED) */
        .tray { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 1000; transition: 0.3s; padding: 15px; }
        .tray.open { bottom: 0; }
        .tray-opt { padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; font-size: 16px; }
        .comment-box { background: #3a3b3c; border-radius: 20px; padding: 10px 15px; width: 100%; border: none; color: white; margin-top: 10px; }

        /* WATERMARK */
        .watermark { position: absolute; top: 70px; right: 15px; opacity: 0.3; font-size: 14px; font-weight: bold; color: white; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

    <div id="feed-container"></div>

    <div id="more-tray" class="tray">
        <div style="width:40px;height:4px;background:#555;margin:0 auto 15px;border-radius:2px;"></div>
        <div class="tray-opt" onclick="downloadWithWatermark()"><i class="material-icons-outlined">download</i> Download Video</div>
        <div class="tray-opt" onclick="reportAction('Spam')"><i class="material-icons-outlined">report</i> Report Video</div>
        <div class="tray-opt" onclick="reportAction('Not Interested')"><i class="material-icons-outlined">visibility_off</i> Not Interested</div>
        <div class="tray-opt" onclick="closeTrays()" style="color:#ff3040; border:none;">Cancel</div>
    </div>

    <div id="comment-tray" class="tray" style="height:50%;">
        <div style="font-weight:bold; margin-bottom:15px; text-align:center;">Comments</div>
        <div id="comm-list" style="height:150px; overflow-y:auto; font-size:14px; color:#aaa; margin-bottom:10px;">Be the first to comment...</div>
        <input type="text" class="comment-box" id="c-input" placeholder="Add a comment...">
        <button onclick="postComment()" style="background:none; border:none; color:#1877F2; font-weight:bold; float:right; margin-top:10px;">Post</button>
        <div onclick="closeTrays()" style="text-align:center; width:100%; margin-top:40px; font-size:12px; color:#888;">Close</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        let activeVideoUrl = '';

        async function init() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed-container').innerHTML = data.map(v => `
                    <div class="v-reel">
                        <div class="fb-top">
                            <i class="material-icons-outlined">arrow_back</i>
                            <b>Reels</b>
                            <i class="material-icons-outlined" style="margin-left:auto">search</i>
                            <i class="material-icons-outlined">more_vert</i>
                        </div>
                        <div class="watermark">IndiVibe</div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="fb-bottom">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
                                <span class="u-name">Vishnupur Fifthoot</span>
                                <button class="f-btn">Follow</button>
                            </div>
                            <div class="v-cap">${v.caption || ''}</div>
                        </div>
                        <div class="fb-right">
                            <div class="btn-act" onclick="handleLike(this)">
                                <i class="material-icons-outlined h-icon">favorite_border</i>
                                <span class="count-txt">1.5M</span>
                            </div>
                            <div class="btn-act" onclick="openComments()">
                                <i class="material-icons-outlined fb-icon">chat_bubble_outline</i>
                                <span class="count-txt">45K</span>
                            </div>
                            <div class="btn-act" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons-outlined fb-icon" style="transform: scaleX(-1);">reply</i>
                                <span class="count-txt">Share</span>
                            </div>
                            <div class="btn-act" onclick="openMore('${v.video_url}')">
                                <i class="material-icons-outlined fb-icon">more_horiz</i>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupObserver();
            }
        }

        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target.querySelector('video');
                    if (e.isIntersecting) video.play(); else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-reel').forEach(r => observer.observe(r));
        }

        function handleLike(el) {
            const i = el.querySelector('.h-icon');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        function openMore(url) { activeVideoUrl = url; document.getElementById('more-tray').classList.add('open'); }
        function openComments() { document.getElementById('comment-tray').classList.add('open'); }
        function closeTrays() { document.querySelectorAll('.tray').forEach(t => t.classList.remove('open')); }

        function downloadWithWatermark() {
            alert("Downloading with IndiVibe Watermark...");
            const a = document.createElement('a'); a.href = activeVideoUrl; a.download = 'IndiVibe_Video.mp4'; a.click();
            closeTrays();
        }

        function reportAction(msg) { alert("Reported as: " + msg); closeTrays(); }

        function postComment() {
            const val = document.getElementById('c-input').value;
            if(val) {
                document.getElementById('comm-list').innerHTML += `<div style="margin-bottom:8px;"><b>You:</b> ${val}</div>`;
                document.getElementById('c-input').value = "";
            }
        }

        init();
    </script>
</body>
</html>

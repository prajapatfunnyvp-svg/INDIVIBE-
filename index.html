<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Reels Container - Instagram Style Smooth Scroll */
        #reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #reels-container::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Watermark (Top Left) */
        .vibe-watermark { position: absolute; top: 25px; left: 20px; z-index: 100; font-size: 24px; font-weight: 900; letter-spacing: 1px; text-shadow: 2px 2px 10px #000; opacity: 0.9; }

        /* Right Actions (Facebook Style Vertical) */
        .fb-side-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .act-group { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .act-group i { font-size: 32px; text-shadow: 0 2px 8px #000; }
        .act-group span { font-size: 13px; font-weight: 600; margin-top: 4px; }
        .red-heart { color: #ff3040 !important; }

        /* User Info (Bottom Left) */
        .user-meta { position: absolute; bottom: 85px; left: 15px; z-index: 100; max-width: 75%; }
        .u-profile { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #fff; }
        .u-name-tick { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 4px; }
        .verify-tick { font-size: 16px; color: #1877F2; }

        /* FLOATING COMPACT COMMENT BOX (Exactly like Facebook) */
        .fb-comment-anchor { position: absolute; bottom: 15px; width: 100%; padding: 0 15px; display: flex; justify-content: center; z-index: 100; }
        .fb-comment-box { 
            width: 100%; max-width: 450px; background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(15px); border-radius: 25px; padding: 8px 18px; 
            display: flex; align-items: center; justify-content: space-between; 
            border: 0.5px solid rgba(255,255,255,0.3);
        }
        .fb-comment-box span { font-size: 14px; color: #fff; font-weight: 500; }

        /* Double Tap Heart Pop */
        .h-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; color: #fff; opacity: 0; z-index: 200; pointer-events: none; }
        .h-active { animation: fbInstaHeartPop 0.8s ease; }
        @keyframes fbInstaHeartPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="reels-container">
        </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function initFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('reels-container').innerHTML = data.map(v => `
                    <div class="reel">
                        <div class="vibe-watermark">INDIVIBE</div>
                        <video src="${v.video_url}" loop playsinline onclick="handleVideoTap(this)" ondblclick="handleDoubleTapHeart(this)"></video>
                        <div class="h-pop material-icons">favorite</div>

                        <div class="fb-side-actions">
                            <div class="act-group" onclick="handleDoubleTapHeart(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons l-btn">favorite_border</i><span>1</span>
                            </div>
                            <div class="act-group"><i class="material-icons">chat_bubble_outline</i><span>0</span></div>
                            <div class="act-group" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons" style="transform: scaleX(-1);">reply</i><span>Share</span></div>
                            <div class="act-group" onclick="window.open('${v.video_url}')"><i class="material-icons">download</i></div>
                            <div class="act-group"><i class="material-icons">more_horiz</i></div>
                        </div>

                        <div class="user-meta">
                            <div class="u-profile">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-img">
                                <span class="u-name-tick">Vishnupur Fifthoot <i class="material-icons verify-tick">check_circle</i></span>
                            </div>
                            <p style="font-size:14px; text-shadow: 1px 1px 2px #000;">${v.caption || ''}</p>
                        </div>

                        <div class="fb-comment-anchor">
                            <div class="fb-comment-box">
                                <span>Write a comment...</span>
                                <i class="material-icons" style="font-size:22px; opacity:0.8;">sentiment_satisfied</i>
                            </div>
                        </div>
                    </div>
                `).join('');
                attachIntersectionObserver();
            }
        }

        let clickTimer;
        function handleVideoTap(v) {
            if (clickTimer) return;
            clickTimer = setTimeout(() => { v.paused ? v.play() : v.pause(); clickTimer = null; }, 250);
        }

        function handleDoubleTapHeart(v) {
            clearTimeout(clickTimer); clickTimer = null;
            const h = v.parentElement.querySelector('.h-pop');
            h.classList.add('h-active');
            setTimeout(() => h.classList.remove('h-active'), 800);
            
            const heartIcon = v.parentElement.querySelector('.l-btn');
            heartIcon.innerText = 'favorite'; 
            heartIcon.classList.add('red-heart');
        }

        function attachIntersectionObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => observer.observe(r));
        }

        initFeed();
    </script>
</body>
</html>

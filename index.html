<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE - Live Reels</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .caption { position: absolute; bottom: 80px; left: 20px; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); }
    </style>
</head>
<body>
    <div class="reels-container" id="reels-list"></div>
    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        const supabaseClient = supabase.createClient(URL, KEY);

        async function fetchMyVideos() {
            const { data, error } = await supabaseClient.from('videos').select('*');
            const container = document.getElementById('reels-list');
            if (data && data.length > 0) {
                data.forEach(v => {
                    container.innerHTML += `
                        <div class="reel">
                            <video src="${v.video_url}" autoplay loop muted playsinline></video>
                            <div class="caption">${v.caption || ''}</div>
                        </div>`;
                });
            } else {
                container.innerHTML = '<div class="reel"><h1>Database mein video daalein!</h1></div>';
            }
        }
        fetchMyVideos();
    </script>
</body>
</html>

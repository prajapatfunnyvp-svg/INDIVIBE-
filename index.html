<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro - Pure Vibe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root { --neon: #00f2ea; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* TOP VIBE HEADER (Instagram Style) */
        .vibe-header { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .vibe-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .camera-icon { font-size: 28px !important; }

        /* VIBE FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* RIGHT ACTIONS STACK (Pixel Perfect Alignment) */
        .vibe-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .action-group { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .vibe-icon { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .action-label { font-size: 12px; margin-top: 4px; font-weight: 600; text-shadow: 0 1px 3px #000; }

        /* BOTTOM USER INFO */
        .vibe-info { position: absolute; left: 15px; bottom: 95px; width: 75%; z-index: 100; }
        .user-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .user-pfp { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid white; }
        .follow-tag { border: 1px solid white; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .vibe-desc { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 4px #000; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* GLASS NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 0.2px solid #333; z-index: 1000; }
        .nav-icon { font-size: 28px !important; color: white; opacity: 0.6; }
        .nav-icon.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="vibe-header">
        <span class="vibe-title">Vibes</span>
        <span class="material-icons-outlined camera-icon">photo_camera</span>
    </div>

    <div id="vibe-feed">
        <div style="padding: 100px 20px; text-align: center;">Vibes load ho rahi hain...</div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-icon" onclick="location.reload()">home</span>
        <span class="material-icons-outlined nav-icon">search</span>
        <span class="material-icons-outlined nav-icon" onclick="alert('Upload Vibe')">add_box</span>
        <span class="material-icons-outlined nav-icon active">play_circle_filled</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width: 26px; height: 26px; border-radius: 50%;">
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function getVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map((v, i) => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="vibe-info">
                            <div class="user-meta">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pfp">
                                <span style="font-weight:700;">vishnu_vibes</span>
                                <span class="follow-tag">Follow</span>
                            </div>
                            <div class="vibe-desc">${v.caption || 'IndiVibe Pro - Feel the Vibe! 🇮🇳'}</div>
                        </div>

                        <div class="vibe-actions">
                            <div class="action-group" onclick="likeVibe(this)">
                                <span class="material-icons-outlined vibe-icon">favorite_border</span>
                                <span class="action-label">1.5M</span>
                            </div>
                            <div class="action-group">
                                <span class="material-icons-outlined vibe-icon">chat_bubble_outline</span>
                                <span class="action-label">45K</span>
                            </div>
                            <div class="action-group" onclick="navigator.share({url:'${v.video_url}'})">
                                <span class="material-icons-outlined vibe-icon">send</span>
                            </div>
                            <div class="action-group" onclick="saveVibe(this)">
                                <span class="material-icons-outlined vibe-icon">bookmark_border</span>
                            </div>
                            <div class="action-group">
                                <span class="material-icons-outlined vibe-icon">more_vert</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                setTimeout(() => document.querySelector('video').play(), 500);
            }
        }

        function likeVibe(el) {
            const icon = el.querySelector('.vibe-icon');
            icon.innerText = (icon.innerText === 'favorite_border') ? 'favorite' : 'favorite_border';
            icon.style.color = (icon.innerText === 'favorite') ? 'red' : 'white';
        }

        function saveVibe(el) {
            const icon = el.querySelector('.vibe-icon');
            icon.innerText = (icon.innerText === 'bookmark_border') ? 'bookmark' : 'bookmark_border';
        }

        getVibes();
    </script>
</body>
</html>

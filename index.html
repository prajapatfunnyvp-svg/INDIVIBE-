<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .reels-container { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; display: none; }
        .reel { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status-box { text-align: center; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; border: 1px solid #00f2ea; width: 80%; }
        button { background: #00f2ea; color: #000; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="status-box">
        <h2 id="msg">INDIVIBE Connecting...</h2>
        <div id="btn-area"></div>
    </div>

    <div id="reels" class="reels-container"></div>

    <script>
        // Bilkul sahi connection details
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        
        const _supa = supabase.createClient(URL, KEY);

        async function loadVideos() {
            const msg = document.getElementById('msg');
            const btnArea = document.getElementById('btn-area');
            const container = document.getElementById('reels');

            try {
                const { data, error } = await _supa.from('videos').select('*');

                if (error) {
                    msg.innerText = "Error: " + error.message;
                } else if (data && data.length > 0) {
                    msg.innerText = "App is Ready!";
                    btnArea.innerHTML = '<button onclick="startApp()">WATCH NOW</button>';
                    
                    data.forEach(v => {
                        const d = document.createElement('div');
                        d.className = 'reel';
                        // Backticks (`) ka sahi use:
                        d.innerHTML = `<video src="${v.video_url}" loop playsinline></video>`;
                        container.appendChild(d);
                    });
                } else {
                    msg.innerText = "Database is empty! Check Supabase.";
                }
            } catch (e) {
                msg.innerText = "Connection Failed!";
            }
        }

        function startApp() {
            document.getElementById('status-box').style.display = 'none';
            document.getElementById('reels').style.display = 'block';
            const vids = document.querySelectorAll('video');
            if(vids[0]) vids[0].play();
        }

        loadVideos();
    </script>
</body>
</html>

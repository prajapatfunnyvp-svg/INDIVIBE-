<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe FB Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB TOPBAR */
        .fb-top { position: absolute; top: 0; width: 100%; height: 50px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%); z-index: 10; }
        .fb-top i { font-size: 24px; margin-right: 15px; }
        .fb-top b { font-size: 19px; flex: 1; font-weight: 500; }

        /* RIGHT ACTIONS - CLEAN FB STYLE */
        .fb-actions { position: absolute; right: 12px; bottom: 90px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .act-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        /* 🔴 ONLY RED HEART FOR LIKE */
        .heart { font-size: 32px !important; color: white; transition: 0.1s; }
        .fb-icon { font-size: 30px !important; color: white; }
        .count { font-size: 12px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 2px #000; }

        /* FB BOTTOM OVERLAY */
        .fb-bottom { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%); z-index: 10; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid white; }
        .u-name { font-weight: 700; font-size: 15px; color: white; }
        .u-dot { font-size: 12px; margin: 0 4px; opacity: 0.8; }
        .f-btn { font-weight: 700; font-size: 14px; color: white; background: none; border: none; }
        .caption { font-size: 14px; line-height: 1.3; margin-bottom: 15px; }

        /* 💬 FB STYLE CHHOTA COMMENT BOX */
        .fb-comment-box { width: 100%; height: 42px; background: rgba(255, 255, 255, 0.18); border-radius: 22px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; align-items: center; padding: 0 15px; color: #eee; font-size: 14px; }

        /* WATERMARK */
        .wm { position: absolute; top: 60px; right: 15px; opacity: 0.4; font-size: 13px; font-weight: bold; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="feed"></div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function fetchVideos() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(v => `
                    <div class="reel">
                        <div class="fb-top">
                            <i class="material-icons-outlined">arrow_back</i>
                            <b>Reels</b>
                            <i class="material-icons-outlined" style="margin-left:auto">search</i>
                            <i class="material-icons-outlined">person_outline</i>
                        </div>
                        <div class="wm">IndiVibe</div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="fb-actions">
                            <div class="act-btn" onclick="like(this)">
                                <i class="material-icons-outlined heart">favorite_border</i>
                                <span class="count">1.5M</span>
                            </div>
                            <div class="act-btn">
                                <i class="material-icons-outlined fb-icon">chat_bubble_outline</i>
                                <span class="count">45K</span>
                            </div>
                            <div class="act-btn" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons-outlined fb-icon" style="transform: scaleX(-1);">reply</i>
                                <span class="count">Share</span>
                            </div>
                            <div class="act-btn">
                                <i class="material-icons-outlined fb-icon">more_horiz</i>
                            </div>
                        </div>

                        <div class="fb-bottom">
                            <div class="user-info">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
                                <span class="u-name">Vishnupur Fifthoot <span class="u-dot">•</span> <span class="f-btn">Follow</span></span>
                            </div>
                            <div class="caption">${v.caption || 'New Reel on IndiVibe'}</div>
                            <div class="fb-comment-box">कमेंट जोड़ें...</div>
                        </div>
                    </div>
                `).join('');
                playLogic();
            }
        }

        function playLogic() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target.querySelector('video');
                    if (e.isIntersecting) video.play(); else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => obs.observe(r));
        }

        function like(el) {
            const i = el.querySelector('.heart');
            if(i.innerText === 'favorite_border') {
                i.innerText = 'favorite'; i.style.color = '#ff3040';
            } else {
                i.innerText = 'favorite_border'; i.style.color = 'white';
            }
        }

        fetchVideos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .box { border: 2px solid #00f2ea; padding: 30px; border-radius: 15px; text-align: center; width: 85%; }
        button { background: #00f2ea; color: #000; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 18px; box-shadow: 0 0 10px #00f2ea; }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="ui" class="box">
        <h2 id="st">Connecting...</h2>
        <p id="msg">Verifying API Key</p>
        <div id="btn"></div>
    </div>

    <video id="player" loop playsinline controls></video>

    <script>
        // Bilkul dhyan se check ki gayi keys
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';

        const supabaseClient = supabase.createClient(URL, KEY);

        async function startApp() {
            const st = document.getElementById('st');
            const msg = document.getElementById('msg');
            
            try {
                const { data, error } = await supabaseClient.from('videos').select('*');
                
                if (error) {
                    st.innerText = "Key/Policy Error";
                    msg.innerText = error.message;
                } else if (data && data.length > 0) {
                    st.innerText = "INDIVIBE READY";
                    msg.innerText = "Connection Successful!";
                    document.getElementById('btn').innerHTML = '<button onclick="play()">WATCH NOW</button>';
                    document.getElementById('player').src = data[data.length - 1].video_url;
                } else {
                    st.innerText = "Empty Database";
                    msg.innerText = "No videos found.";
                }
            } catch (e) {
                st.innerText = "System Failure";
                msg.innerText = e.message;
            }
        }

        function play() {
            document.getElementById('ui').style.display = 'none';
            const p = document.getElementById('player');
            p.style.display = 'block';
            p.play();
        }

        startApp();
    </script>
</body>
</html>

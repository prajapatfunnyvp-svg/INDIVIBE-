<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .card { border: 2px solid #00f2ea; padding: 35px; border-radius: 25px; width: 85%; background: #111; box-shadow: 0 0 20px #00f2ea; }
        button { background: #00f2ea; color: #000; border: none; padding: 18px 45px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 22px; margin-top: 25px; }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; position: fixed; top: 0; left: 0; z-index: 1000; }
    </style>
</head>
<body>

    <div id="ui" class="card">
        <h1>INDIVIBE</h1>
        <p id="st">Connecting...</p>
        <div id="btn-box"></div>
    </div>

    <video id="v-player" loop playsinline controls></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        // Maine yahan aapki bheji hui key fix kar di hai
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzMxMzQxOSwiZXhwIjoyMDU4OTMzNDE5fQ.8DDeRlTfDqlLanNJSUlYXGDwO4enbls3gQcc0huI740'; 

        const _supa = supabase.createClient(URL, KEY);

        async function start() {
            try {
                const { data, error } = await _supa.from('videos').select('*');
                if (data && data.length > 0) {
                    document.getElementById('st').innerText = "INDIVIBE READY!";
                    document.getElementById('btn-box').innerHTML = '<button onclick="play()">WATCH NOW</button>';
                    document.getElementById('v-player').src = data[data.length - 1].video_url;
                } else if (error) {
                    document.getElementById('st').innerText = "Key Error: " + error.message;
                } else {
                    document.getElementById('st').innerText = "Database is Empty";
                }
            } catch (e) {
                document.getElementById('st').innerText = "Connection Failed";
            }
        }

        function play() {
            document.getElementById('ui').style.display = 'none';
            const vid = document.getElementById('v-player');
            vid.style.display = 'block';
            vid.play();
        }
        start();
    </script>
</body>
</html>

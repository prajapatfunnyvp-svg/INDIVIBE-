<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 1. INSTAGRAM STYLE HEADER */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 35px; height: 35px; border-radius: 8px; box-shadow: 0 0 10px #00f2ea; }
        .header-name { font-size: 22px; font-weight: 900; color: #00f2ea; text-transform: uppercase; letter-spacing: 1px; text-shadow: 2px 2px #000; }
        .search-icon { font-size: 22px; cursor: pointer; }

        /* 2. REELS FEED */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .v-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 3. SIDE BUTTONS */
        .side-icons { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .icon-btn { text-align: center; font-size: 28px; cursor: pointer; filter: drop-shadow(2px 2px 5px #000); }
        .icon-btn span { font-size: 11px; display: block; margin-top: 4px; }

        /* 4. SEND TO FRIEND MODAL */
        #share-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 450px;
            background: #121212; border-radius: 20px 20px 0 0; z-index: 200;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 20px; box-sizing: border-box;
            border-top: 2px solid #00f2ea;
        }
        .search-friend { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #222; color: white; margin-bottom: 20px; }
        .friend-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: #1a1a1a; padding: 10px; border-radius: 10px; }
        .send-btn { background: #00f2ea; color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }

        /* SPLASH SCREEN */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-left">
            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="header-logo">
            <div class="header-name">IndiVibe</div>
        </div>
        <div class="search-icon" onclick="alert('Searching feature opening...')">🔍</div>
    </div>

    <div id="main-feed" class="feed"></div>

    <div id="share-panel">
        <h3 style="text-align: center;">Send Reel to Friend</h3>
        <input type="text" class="search-friend" placeholder="Search ID (e.g. @Dshrat)">
        <div class="friend-row">
            <span>@Dshrat_Nayak</span>
            <button class="send-btn" onclick="sendTo('@Dshrat_Nayak')">Send</button>
        </div>
        <div class="friend-row">
            <span>@Vishnu_Indi</span>
            <button class="send-btn" onclick="sendTo('@Vishnu_Indi')">Send</button>
        </div>
        <button onclick="closeShare()" style="width:100%; background:none; color:gray; border:none; margin-top:10px;">Close</button>
    </div>

    <div id="splash">
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:110px; filter: drop-shadow(0 0 15px #00f2ea);">
        <h1 style="color:#00f2ea; margin-top: 15px; font-size: 35px;">IndiVibe</h1>
        <button onclick="initApp()" style="background:#00f2ea; border:none; padding:15px 50px; border-radius:30px; font-weight:bold; margin-top:20px; box-shadow: 0 0 20px rgba(0,242,234,0.4);">ENTER APP</button>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function initApp() {
            document.getElementById('splash').style.display = 'none';
            const feed = document.getElementById('main-feed');
            
            // Database se sirf Approved Videos hi uthayega (Safety Algorithm)
            const { data, error } = await supa.from('videos').select('*').eq('is_safe', true);
            
            if (data && data.length > 0) {
                feed.innerHTML = data.map(v => `
                    <div class="v-card">
                        <video src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                        <div class="side-icons">
                            <div class="icon-btn" onclick="alert('Liked!')">❤️<span>12k</span></div>
                            <div class="icon-btn" onclick="alert('Chat active!')">💬<span>45</span></div>
                            <div class="icon-btn" onclick="openShare()">🚀<span>Send</span></div>
                        </div>
                        <div style="position:absolute; bottom:40px; left:15px; font-family:sans-serif;">
                            <h4 style="margin:0;">@IndiVibe_Creator</h4>
                            <p style="font-size:14px; margin:5px 0; opacity:0.8;">🎵 Instrumental Melody</p>
                        </div>
                    </div>
                `).join('');
                document.querySelector('video').play();
            } else {
                feed.innerHTML = "<h3 style='text-align:center; padding-top:100px;'>No Videos found in Database!</h3>";
            }
        }

        function openShare() { document.getElementById('share-panel').style.bottom = '0'; }
        function closeShare() { document.getElementById('share-panel').style.bottom = '-100%'; }
        function sendTo(id) {
            alert("Sent to " + id + "!");
            closeShare();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE - Next Gen Reels</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: white; font-family: 'Segoe UI', sans-serif; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .reels-video { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Social Buttons */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .icon-unit { text-align: center; cursor: pointer; }
        .icon-unit i { font-size: 30px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .icon-unit span { font-size: 12px; font-weight: bold; display: block; margin-top: 4px; }

        /* User Info & Branding */
        .bottom-ui { position: absolute; bottom: 30px; left: 15px; z-index: 10; width: 70%; }
        .bottom-ui h4 { margin: 0; font-size: 18px; color: #00f2ea; }
        .bottom-ui p { margin: 5px 0; font-size: 14px; opacity: 0.9; }

        /* Chat floating button */
        .chat-btn { position: absolute; right: 15px; top: 20px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; z-index: 20; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .play-btn { background: #00f2ea; color: #000; border: none; padding: 20px 60px; border-radius: 50px; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 0 20px #00f2ea; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:#00f2ea; font-size: 40px; margin-bottom: 5px;">INDIVIBE</h1>
        <p id="msg">Setting up your experience...</p>
        <button class="play-btn" id="go" onclick="startApp()" style="display:none;">VIBE NOW</button>
    </div>

    <div id="reels-feed" class="feed"></div>

    <script>
        const SUPA_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const SUPA_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

        async function init() {
            const { data, error } = await supa.from('videos').select('*');
            if (data && data.length > 0) {
                window.videoData = data;
                document.getElementById('msg').innerText = "Everything is Ready! ✅";
                document.getElementById('go').style.display = "block";
            } else {
                document.getElementById('msg').innerText = "Database error or empty table.";
            }
        }
        init();

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            const feed = document.getElementById('reels-feed');
            
            feed.innerHTML = window.videoData.map((v, i) => `
                <div class="reels-video">
                    <video id="vid-${i}" src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted; this.play();"></video>
                    
                    <div class="side-icons">
                        <div class="icon-unit" onclick="alert('Liked!')">❤️<span>14.5k</span></div>
                        <div class="icon-unit" onclick="alert('Comments opening...')">💬<span>230</span></div>
                        <div class="icon-unit" onclick="alert('Link Copied!')">🚀<span>Share</span></div>
                    </div>

                    <div class="bottom-ui">
                        <h4>@IndiVibe_Music</h4>
                        <p>Instrumental Bliss • Original Audio</p>
                    </div>
                </div>
            `).join('');
            
            const first = document.querySelector('video');
            if(first) first.play();
        }

        document.getElementById('reels-feed').addEventListener('scroll', () => {
            const vids = document.querySelectorAll('video');
            vids.forEach(v => {
                const rect = v.getBoundingClientRect();
                if(rect.top >= 0 && rect.top < window.innerHeight / 2) v.play();
                else v.pause();
            });
        });
    </script>
</body>
</html>

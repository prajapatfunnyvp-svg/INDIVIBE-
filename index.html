<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe - Feel the Vibe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Base Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Vibe Feed */
        #feed { height: calc(100vh - 65px); overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: calc(100vh - 65px); width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Watermark (Promotion) */
        .watermark { position: absolute; top: 20px; right: 15px; display: flex; align-items: center; gap: 6px; opacity: 0.8; z-index: 10; pointer-events: none; }
        .watermark img { width: 25px; height: 25px; border-radius: 5px; }
        .watermark span { font-weight: bold; font-size: 15px; text-shadow: 1px 1px 3px #000; }

        /* Sidebar Buttons */
        .sidebar { position: absolute; right: 12px; bottom: 90px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .side-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .side-btn i { font-size: 32px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .side-btn span { font-size: 11px; margin-top: 2px; font-weight: 600; }
        .liked { color: #ff3040 !important; }
        .saved { color: #ffd700 !important; }

        /* User & Music Info */
        .vibe-details { position: absolute; bottom: 20px; left: 16px; width: 70%; z-index: 100; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .user-logo { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #fff; }
        .user-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 4px; }
        .music-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; overflow: hidden; width: 80%; }
        .scrolling-music { white-space: nowrap; animation: scrollText 8s linear infinite; font-size: 13px; opacity: 0.9; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Pill Comment Sheet */
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 20px 20px 0 0; z-index: 2000; transition: 0.4s ease; }
        .bottom-sheet.open { bottom: 0; }
        .sheet-header { padding: 15px; text-align: center; border-bottom: 0.5px solid #333; font-weight: bold; }
        .pill-input-area { padding: 15px 15px 30px; background: #242526; border-top: 0.5px solid #333; }
        .pill-box { background: #3a3b3c; border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        .pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }

        /* Bottom Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; z-index: 1000; }
        .nav-item { color: #fff; opacity: 0.6; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="feed">
        </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('home')"><i class="material-icons">home</i></div>
        <div class="nav-item" onclick="showPage('search')"><i class="material-icons">search</i></div>
        <div class="nav-item" onclick="alert('Upload feature coming soon!')"><i class="material-icons" style="font-size:35px;">add_circle_outline</i></div>
        <div class="nav-item" onclick="showPage('vibe')"><i class="material-icons">play_circle_outline</i></div>
        <div class="nav-item" onclick="showPage('profile')"><i class="material-icons">person_outline</i></div>
    </nav>

    <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

    <div class="bottom-sheet" id="commentSheet">
        <div class="sheet-header">Comments</div>
        <div style="height:40vh; display:flex; align-items:center; justify-content:center; color:#888;">No vibes yet. Start the conversation!</div>
        <div class="pill-input-area">
            <div class="pill-box">
                <input type="text" placeholder="Add a comment...">
                <i class="material-icons" style="color:#1877F2;">send</i>
            </div>
        </div>
    </div>

    <script>
        // Supabase Setup
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function fetchVibes() {
            const { data, error } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                const feed = document.getElementById('feed');
                feed.innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="togglePlay(this)"></video>
                        
                        <div class="watermark">
                            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png">
                            <span>Indivibe</span>
                        </div>

                        <div class="sidebar">
                            <div class="side-btn" onclick="toggleLike(this)"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="side-btn" onclick="openSheet()"><i class="material-icons-outlined">chat_bubble_outline</i><span>540</span></div>
                            <div class="side-btn" onclick="shareVibe('${v.video_url}')"><i class="material-icons-outlined" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="side-btn" onclick="toggleSave(this)"><i class="material-icons-outlined">bookmark_border</i><span>Save</span></div>
                            <div class="side-btn"><i class="material-icons">more_horiz</i></div>
                        </div>

                        <div class="vibe-details">
                            <div class="user-info">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-logo">
                                <span class="user-name">Vishnu Raj <i class="material-icons" style="color:#1877F2; font-size:14px;">check_circle</i></span>
                            </div>
                            <p style="font-size:14px; text-shadow:1px 1px 2px #000;">${v.caption || 'Naya Vibe, Nayi Shuruaat! #indivibe'}</p>
                            <div class="music-row">
                                <i class="material-icons" style="font-size:16px;">music_note</i>
                                <div class="scrolling-music">Original Audio - Indivibe Official Track</div>
                            </div>
                        </div>
                    </div>
                `).join('');
                startObserver();
            }
        }

        // Functions
        function togglePlay(vid) { vid.paused ? vid.play() : vid.pause(); }
        
        function toggleLike(btn) { 
            const icon = btn.querySelector('i');
            icon.classList.toggle('liked');
            icon.innerText = icon.classList.contains('liked') ? 'favorite' : 'favorite_border';
        }

        function toggleSave(btn) {
            const icon = btn.querySelector('i');
            icon.classList.toggle('saved');
            icon.innerText = icon.classList.contains('saved') ? 'bookmark' : 'bookmark_border';
        }

        function openSheet() {
            document.getElementById('commentSheet').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeSheet() {
            document.getElementById('commentSheet').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        function shareVibe(url) {
            if (navigator.share) {
                navigator.share({ title: 'Indivibe', url: url });
            } else {
                alert("Link copied: " + url);
            }
        }

        function startObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play();
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(card => observer.observe(card));
        }

        function showPage(page) {
            console.log("Switching to " + page);
            // Future: Switch between Feed and Profile page logic
        }

        fetchVibes();
    </script>
</body>
</html>

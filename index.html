<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE - Facebook Reels</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Full Screen Snap Scroll */
        #main-feed { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #main-feed::-webkit-scrollbar { display: none; }

        .reel-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Top Bar: Reels Text & Search */
        .top-ui { position: absolute; top: 15px; width: 100%; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .reels-text { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .top-icons i { font-size: 28px; margin-left: 15px; }

        /* Right Side Interaction Bar (Like, Comment, Share) */
        .right-actions { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-item i { font-size: 32px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .action-item span { font-size: 13px; font-weight: 500; margin-top: 4px; }
        .fb-blue-icon { color: #1877F2; } /* Facebook Like Blue */

        /* User Info & Caption (Bottom Left) */
        .bottom-ui { position: absolute; bottom: 85px; left: 15px; z-index: 100; max-width: 70%; }
        .u-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .u-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #fff; }
        .u-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .caption { font-size: 14px; margin-bottom: 5px; line-height: 1.3; }

        /* Bottom Comment Box (As per Screenshot) */
        .comment-box-bar { position: absolute; bottom: 15px; width: 100%; padding: 0 15px; display: flex; align-items: center; gap: 10px; z-index: 100; }
        .comment-input { flex: 1; background: rgba(255,255,255,0.2); border-radius: 25px; padding: 10px 15px; font-size: 14px; border: 0.5px solid rgba(255,255,255,0.3); color: #fff; }
        .comment-icons i { font-size: 24px; color: #fff; opacity: 0.8; }

        /* Double Tap Heart */
        .pop-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: #fff; z-index: 200; opacity: 0; pointer-events: none; }
        .pop-heart.active { animation: fbHeart 0.8s ease; }
        @keyframes fbHeart { 0% { scale: 0; opacity: 0; } 50% { scale: 1.2; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-feed">
        </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function fetchReels() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                const feed = document.getElementById('main-feed');
                feed.innerHTML = data.map(v => `
                    <div class="reel-unit">
                        <div class="top-ui">
                            <div class="reels-text"><i class="material-icons">arrow_back</i> Reels</div>
                            <div class="top-icons"><i class="material-icons">search</i><i class="material-icons">account_circle</i></div>
                        </div>
                        
                        <video src="${v.video_url}" loop playsinline onclick="togglePlay(this)" ondblclick="fireLike(this)"></video>
                        <div class="pop-heart material-icons">thumb_up</div>
                        
                        <div class="right-actions">
                            <div class="action-item" onclick="fireLike(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons like-btn">thumb_up_off_alt</i><span>1</span>
                            </div>
                            <div class="action-item">
                                <i class="material-icons">chat_bubble_outline</i><span>0</span>
                            </div>
                            <div class="action-item">
                                <i class="material-icons">reply</i><span>Share</span>
                            </div>
                            <div class="action-item" onclick="window.open('${v.video_url}')">
                                <i class="material-icons">download</i>
                            </div>
                            <div class="action-item">
                                <i class="material-icons">more_horiz</i>
                            </div>
                        </div>

                        <div class="bottom-ui">
                            <div class="u-info">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
                                <span class="u-name">Vishnupur Fifthoot <i class="material-icons" style="font-size:16px; color:#1877F2;">check_circle</i></span>
                            </div>
                            <p class="caption">${v.caption || ''}</p>
                        </div>

                        <div class="comment-box-bar">
                            <div class="comment-input">कमेंट जोड़ें...</div>
                            <div class="comment-icons"><i class="material-icons">sentiment_satisfied</i></div>
                        </div>
                    </div>
                `).join('');
                initObserver();
            }
        }

        let clickT;
        function togglePlay(v) {
            if (clickT) return;
            clickT = setTimeout(() => { v.paused ? v.play() : v.pause(); clickT = null; }, 250);
        }

        function fireLike(v) {
            clearTimeout(clickT); clickT = null;
            const h = v.parentElement.querySelector('.pop-heart');
            h.classList.add('active');
            setTimeout(() => h.classList.remove('active'), 800);
            
            const lIcon = v.parentElement.querySelector('.like-btn');
            lIcon.innerText = 'thumb_up';
            lIcon.classList.add('fb-blue-icon');
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-unit').forEach(r => obs.observe(r));
        }

        fetchReels();
    </script>
</body>
</html>

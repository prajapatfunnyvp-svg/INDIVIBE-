    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Smooth Snap Scroll like Insta/FB */
        #feed { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Top Watermark */
        .brand { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 22px; font-weight: 900; text-shadow: 2px 2px 8px #000; opacity: 0.9; }

        /* RIGHT ACTIONS (FB Style Spacing) */
        .sidebar { position: absolute; right: 12px; bottom: 130px; display: flex; flex-direction: column; gap: 24px; align-items: center; z-index: 100; }
        .act-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .act-btn i { font-size: 32px; text-shadow: 0 2px 10px #000; }
        .act-btn span { font-size: 13px; font-weight: 600; margin-top: 4px; }
        .liked { color: #ff3040 !important; }

        /* USER INFO */
        .user-overlay { position: absolute; bottom: 100px; left: 15px; z-index: 100; max-width: 75%; }
        .u-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-pfp { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #fff; }
        .v-tick { color: #1877F2; font-size: 18px; margin-left: 4px; }

        /* EXACT FB COMPACT COMMENT BOX */
        .comment-anchor { position: absolute; bottom: 30px; width: 100%; padding: 0 15px; z-index: 100; display: flex; justify-content: center; }
        .fb-comment-pill { 
            width: 100%; max-width: 400px; background: rgba(50, 50, 50, 0.7); 
            backdrop-filter: blur(15px); border-radius: 25px; padding: 12px 18px; 
            display: flex; align-items: center; justify-content: space-between;
            border: 0.5px solid rgba(255,255,255,0.15);
        }
        .fb-comment-pill span { color: #ddd; font-size: 15px; }

        /* THREE DOT MENU (Save, Not Interested, Report) */
        .menu-modal { 
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; 
            border-top-left-radius: 20px; border-top-right-radius: 20px; 
            padding: 20px; z-index: 500; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-modal.open { bottom: 0; }
        .m-option { display: flex; align-items: center; gap: 15px; padding: 16px 0; border-bottom: 0.5px solid #333; cursor: pointer; }
        .m-option i { font-size: 26px; color: #e4e6eb; }
        .m-option span { font-size: 16px; color: #e4e6eb; }
        .scrim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 400; }

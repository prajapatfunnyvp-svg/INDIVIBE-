<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe Pro Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Full Screen Feed Logic */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Double Tap & Heart Animation */
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #fff; font-size: 110px; opacity: 0; pointer-events: none; z-index: 1000; }
        .animate-heart { animation: pop 0.8s ease-out; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        /* Sidebar - All Buttons Active */
        .sidebar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .v-btn { text-align: center; cursor: pointer; transition: 0.2s; }
        .v-btn i { font-size: 34px; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .v-btn span { font-size: 11px; font-weight: 600; margin-top: 4px; display: block; }
        .liked { color: #ff3040 !important; font-variation-settings: 'FILL' 1; }
        .saved { color: #ffd700 !important; font-variation-settings: 'FILL' 1; }

        /* User & Caption */
        .meta { position: absolute; bottom: 100px; left: 16px; z-index: 100; width: 75%; pointer-events: none; }
        .u-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; pointer-events: auto; }
        .u-pic { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .v-tick { color: #1877F2; font-size: 16px; }

        /* THE GOL (PILL) COMMENT SHEET */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
        .sheet { position: fixed; bottom: -100%; width: 100%; background: #1a1a1a; border-radius: 15px 15px 0 0; z-index: 3000; transition: 0.3s cubic-bezier(0.17, 0.84, 0.44, 1); }
        .com-sheet { height: 65%; display: flex; flex-direction: column; }
        .sheet.active { bottom: 0; }
        .handle { width: 40px; height: 4px; background: #444; margin: 10px auto; border-radius: 10px; }
        
        /* GOL (PILL) INPUT */
        .pill-footer { padding: 12px 16px; background: #1a1a1a; border-top: 0.5px solid #333; display: flex; align-items: center; gap: 12px; }
        .pill-box { flex: 1; background: #333; border-radius: 50px; padding: 10px 20px; display: flex; align-items: center; }
        .pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 14px; }

        /* 3-DOT MENU (Full Setup) */
        .menu-sheet { padding-bottom: 30px; }
        .m-row { display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 0.1px solid #333; }
        .m-icon-box { text-align: center; cursor: pointer; }
        .m-icon-box i { background: #333; padding: 12px; border-radius: 10px; margin-bottom: 6px; }
        .m-list-opt { padding: 16px 25px; display: flex; align-items: center; gap: 15px; font-size: 16px; cursor: pointer; }
        .m-list-opt:active { background: #333; }

        /* Nav Bar */
        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; z-index: 2500; border-top: 0.1px solid #222; }
        .nav i { font-size: 28px; color: #fff; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>
    <i class="material-icons big-heart" id="bigHeart">favorite</i>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="sheet com-sheet" id="comSheet">
        <div class="handle"></div>
        <div style="text-align:center; padding:10px; font-weight:bold; border-bottom:0.1px solid #333;">Comments</div>
        <div id="comList" style="flex:1; overflow-y:auto; padding:20px; color:#888; text-align:center;">No comments yet.</div>
        <div class="pill-footer">
            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:34px; border-radius:5

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Instagram Style Smooth Scroll */
        #feed-container { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed-container::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Top Bar - FB Style */
        .top-ui { position: absolute; top: 15px; width: 100%; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .back-area { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; text-shadow: 0 2px 4px #000; }

        /* RIGHT ACTIONS (Facebook Style Vertical) */
        .side-actions { position: absolute; right: 12px; bottom: 110px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .icon-group { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-group i { font-size: 32px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .icon-group span { font-size: 13px; font-weight: 600; margin-top: 2px; }
        .share-icon { transform: scaleX(-1); } /* Arrow pointing right like FB */

        /* User Info (Bottom Left) */
        .user-data { position: absolute; bottom: 85px; left: 15px; z-index: 100; max-width: 75%; }
        .profile-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #fff; }
        .name-tag { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 4px; }
        .blue-tick { font-size: 16px; color: #1877F2; }

        /* COMPACT COMMENT BOX (Exactly like Facebook) */
        .fb-comment-wrap { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; padding: 0 15px; z-index: 100; }
        .fb-comment-pill { 
            width: 100%; 
            background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(15px); 
            border-radius: 25px; 
            padding: 8px 18px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border: 0.5px solid rgba(255,255,255,0.3);
        }
        .fb-comment-pill span { font-size: 14px; color: #e4e6eb; }

        /* Heart Animation (Instagram Style) */
        .insta-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; color: #fff; opacity: 0; z-index: 200; pointer-events: none; }
        .animate-heart { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1; opacity: 0; } }

        /* Like Red Color */
        .is-liked { color: #ff3040 !important; }
    </style>
</head>
<body>

    <div id="feed-container">
        </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadReels() {
            const { data, error } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                const feed = document.getElementById('feed-container');
                feed.innerHTML = data.map(v => `
                    <div class="reel-unit">
                        <div class="top-ui">
                            <div class="back-area"><i class="material-icons">arrow_back</i> Reels</div>
                            <div style="display:flex; gap:15px;"><i class="material-icons">search</i><i class="material-icons">more_vert</i></div>
                        </div>

                        <video src="${v.video_url}" loop playsinline onclick="handleVideoTap(this)" ondblclick="handleDoubleTap(this)"></video>
                        <div class="insta-pop material-icons">favorite</div>

                        <div class="side-actions">
                            <div class="icon-group" onclick="handleDoubleTap(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons h-btn">favorite_border</i><span>1</span>
                            </div>
                            <div class="icon-group"><i class="material-icons">chat_bubble_outline</i><span>0</span></div>
                            <div class="icon-group" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons share-icon">reply</i><span>Share</span>
                            </div>
                            <div class="icon-group" onclick="window.open('${v.video_url}')"><i class="material-icons">download</i></div>
                            <div class="icon-group"><i class="material-icons">more_horiz</i></div>
                        </div>

                        <div class="user-data">
                            <div class="profile-info">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="avatar">
                                <span class="name-tag">Vishnupur Fifthoot <i class="material-icons blue-tick">check_circle</i></span>
                            </div>
                            <p style="font-size:14px; text-shadow: 1px 1px 2px #000;">${v.caption || ''}</p>
                        </div>

                        <div class="fb-comment-wrap">
                            <div class="fb-comment-pill">
                                <span>कमेंट जोड़ें...</span>
                                <i class="material-icons" style="font-size:22px; opacity:0.8;">sentiment_satisfied</i>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupVideoObserver();
            }
        }

        let tapTimeout;
        function handleVideoTap(v) {
            if (tapTimeout) return;
            tapTimeout = setTimeout(() => { v.paused ? v.play() : v.pause(); tapTimeout = null; }, 250);
        }

        function handleDoubleTap(v) {
            clearTimeout(tapTimeout); tapTimeout = null;
            const heart = v.parentElement.querySelector('.insta-pop');
            heart.classList.add('animate-heart');
            setTimeout(() => heart.classList.remove('animate-heart'), 800);
            
            const heartIcon = v.parentElement.querySelector('.h-btn');
            heartIcon.innerText = 'favorite'; 
            heartIcon.classList.add('is-liked');
        }

        function setupVideoObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-unit').forEach(r => observer.observe(r));
        }

        loadReels();
    </script>
</body>
</html>

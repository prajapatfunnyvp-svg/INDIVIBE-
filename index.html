<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE REELS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Yeh container videos ko upar-neeche scroll karwayega */
        .feed-container { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth;
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .video-card { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .overlay { position: absolute; bottom: 100px; left: 15px; color: white; z-index: 10; }
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 30px; z-index: 10; }
        .icon { font-size: 28px; color: white; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        /* Starting Button taaki browser video block na kare */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #start-btn { background: #00f2ea; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn" onclick="initApp()">START WATCHING</button>
    </div>

    <div id="feed" class="feed-container"></div>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        async function initApp() {
            document.getElementById('start-screen').style.display = 'none';
            const { data } = await _supa.from('videos').select('*');
            
            if (data) {
                const feed = document.getElementById('feed');
                feed.innerHTML = data.map(item => `
                    <div class="video-card">
                        <video src="${item.video_url}" loop playsinline onclick="togglePlay(this)"></video>
                        <div class="overlay"><h3>@IndiVibe_Music</h3><p>Instrumental Bliss</p></div>
                        <div class="side-bar">
                            <div class="icon">❤️</div>
                            <div class="icon">🚀</div>
                        </div>
                    </div>
                `).join('');

                // Auto play first video
                const firstVid = document.querySelector('video');
                if(firstVid) firstVid.play();
            }
        }

        function togglePlay(vid) {
            if (vid.paused) vid.play();
            else vid.pause();
        }

        // Jab user scroll kare toh agla video apne aap chalu ho jaye
        document.getElementById('feed').addEventListener('scroll', () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.top < window.innerHeight / 2) {
                    v.play();
                } else {
                    v.pause();
                }
            });
        });
    </script>
</body>
</html>

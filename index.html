<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .v-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Logo Watermark */
        .watermark { position: absolute; top: 20px; right: 20px; width: 60px; z-index: 10; opacity: 0.8; }
        
        /* Social Buttons */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .btn { text-align: center; font-size: 25px; }
        .btn span { font-size: 10px; display: block; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: #00f2ea; color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:120px; margin-bottom:20px;">
        <h2 style="color:#00f2ea">INDIVIBE</h2>
        <p id="msg">Aapka App Taiyaar Hai!</p>
        <button class="start-btn" onclick="startApp()">VIBE START KAREIN</button>
    </div>

    <div id="feed" class="feed"></div>

    <script>
        // Seedha video data (Agar database nakhre kare toh bhi chale)
        const myVideos = [
            {url: "https://vjs.zencdn.net/v/oceans.mp4", user: "@Dshrat_Nayak"},
            {url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4", user: "@IndiVibe_Music"}
        ];

        function startApp() {
            document.getElementById('loader').style.display = 'none';
            const feed = document.getElementById('feed');
            
            feed.innerHTML = myVideos.map(v => `
                <div class="v-card">
                    <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="watermark">
                    <video src="${v.url}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                    <div class="side-bar">
                        <div class="btn">❤️<span>Like</span></div>
                        <div class="btn">💬<span>Chat</span></div>
                        <div class="btn">🚀<span>Share</span></div>
                    </div>
                    <div style="position:absolute; bottom:30px; left:15px;">
                        <h4>${v.user}</h4>
                        <p>Relaxing Instrumental Flute 🎵</p>
                    </div>
                </div>
            `).join('');
            document.querySelector('video').play();
        }
    </script>
</body>
</html>

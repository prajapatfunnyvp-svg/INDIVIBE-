<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        .main-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-container::-webkit-scrollbar { display: none; }
        
        .fb-reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB TOPBAR */
        .header { position: absolute; top: 0; width: 100%; height: 50px; display: flex; align-items: center; padding: 0 16px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 10; }
        .header b { font-size: 20px; flex: 1; }

        /* FB SIDEBAR ICONS */
        .side-actions { position: absolute; right: 12px; bottom: 90px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .btn-box { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .heart-icon { font-size: 32px !important; color: white; }
        .fb-icon { font-size: 28px !important; color: white; }
        .count-val { font-size: 11px; margin-top: 2px; font-weight: 600; }

        /* FB BOTTOM INFO */
        .bottom-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 0 16px 15px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); z-index: 10; }
        .user-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-img { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #fff; }
        .u-name { font-weight: 700; font-size: 15px; }
        .f-tag { border: 1px solid #fff; padding: 1px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .v-cap { font-size: 14px; margin-bottom: 12px; }

        /* 💬 CHHOTA COMMENT BOX (Trigger) */
        .fb-comment-trigger { width: 100%; height: 40px; background: rgba(255, 255, 255, 0.2); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; padding: 0 15px; color: #ccc; font-size: 14px; }

        /* 📱 REAL FB COMMENT SHEET (WORKING FUNCTION) */
        #comment-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65%; background: #242526; border-radius: 15px 15px 0 0; z-index: 100; transition: 0.3s ease-out; display: flex; flex-direction: column; }
        #comment-sheet.active { bottom: 0; }
        .sheet-header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; }
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; color: #ddd; }
        .sheet-input-area { padding: 10px 15px 25px; border-top: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .sheet-input { background: #3a3b3c; border-radius: 20px; padding: 10px 15px; flex: 1; border: none; color: white; outline: none; }
        .post-btn { color: #1877F2; font-weight: bold; }
    </style>
</head>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE - Reels</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .reels-container { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .reel-actions { position: absolute; bottom: 100px; right: 15px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .reel-actions i { font-size: 28px; color: #fff; text-shadow: 0 0 5px #000; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 100; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div id="reels" class="reels-container">
        <div id="status">Connecting to INDIVIBE...</div>
    </div>
    <div class="bottom-nav">
        <i class="fas fa-home"></i><i class="fas fa-search"></i><i class="far fa-plus-square"></i><i class="far fa-heart"></i><i class="far fa-user-circle"></i>
    </div>
    <script>
        const SUPABASE_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        
        // Vishu, ye hai aapki poori lambi key. Ise bilkul mat chhedna.
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadReels() {
            const statusBox = document.getElementById('status');
            try {
                const { data, error } = await _supabase.from('videos').select('*');
                if (error) {
                    statusBox.innerHTML = "Error: " + error.message;
                    return;
                }
                if (data && data.length > 0) {
                    statusBox.style.display = 'none';
                    const container = document.getElementById('reels');
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'reel';
                        div.innerHTML = `<video src="${item.video_url}" loop autoplay muted playsinline></video>
                        <div class="reel-actions"><i class="far fa-heart"></i><i class="far fa-comment"></i><i class="fas fa-paper-plane"></i></div>`;
                        container.appendChild(div);
                    });
                } else {
                    statusBox.innerText = "Database is Empty! Add videos in Supabase.";
                }
            } catch (e) {
                statusBox.innerText = "Connection Failed!";
            }
        }
        loadReels();
    </script>
</body>
</html>

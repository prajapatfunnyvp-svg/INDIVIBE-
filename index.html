<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Side Buttons (Like, Comment, Share) */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; z-index: 20; text-align: center; }
        .btn { font-size: 28px; cursor: pointer; text-shadow: 0 0 10px #000; }
        .btn span { font-size: 12px; display: block; margin-top: 2px; }

        /* UI Overlay */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: #00f2ea; color: #000; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:#00f2ea; margin-bottom:10px;">INDIVIBE</h1>
        <p id="status">Connecting...</p>
        <button class="start-btn" id="sBtn" onclick="launchApp()" style="display:none;">ENTER APP</button>
    </div>

    <div id="main-feed" class="feed"></div>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        async function connectDB() {
            try {
                const { data, error } = await _supa.from('videos').select('*');
                if (data && data.length > 0) {
                    window.allVideos = data;
                    document.getElementById('status').innerText = "Ready to Vibe!";
                    document.getElementById('sBtn').style.display = 'block';
                } else {
                    document.getElementById('status').innerText = "Empty Database. Add rows in Supabase!";
                }
            } catch (err) {
                document.getElementById('status').innerText = "Connection Failed. Refresh!";
            }
        }
        connectDB();

        function launchApp() {
            document.getElementById('start-overlay').style.display = 'none';
            const feed = document.getElementById('main-feed');
            
            feed.innerHTML = window.allVideos.map((v, i) => `
                <div class="video-card">
                    <video src="${v.video_url}" id="v-${i}" loop playsinline muted onclick="this.muted=!this.muted; this.play();"></video>
                    <div class="side-bar">
                        <div class="btn" onclick="alert('Liked!')">❤️<span>12k</span></div>
                        <div class="btn" onclick="alert('Comments opening...')">💬<span>450</span></div>
                        <div class="btn" onclick="alert('Link Copied!')">🚀<span>Share</span></div>
                    </div>
                    <div style="position:absolute; bottom:30px; left:15px; z-index:10;">
                        <h4 style="margin:0;">@IndiVibe_Music</h4>
                        <p style="margin:5px 0; font-size:14px;">Relaxing Flute Melody</p>
                    </div>
                </div>
            `).join('');
            
            // First video auto play
            const fv = document.querySelector('video');
            if(fv) fv.play();
        }

        // Scroll logic for playing next video
        document.getElementById('main-feed').addEventListener('scroll', () => {
            document.querySelectorAll('video').forEach(vid => {
                const pos = vid.getBoundingClientRect();
                if(pos.top >= 0 && pos.top < window.innerHeight / 2) vid.play();
                else vid.pause();
            });
        });
    </script>
</body>
</html>

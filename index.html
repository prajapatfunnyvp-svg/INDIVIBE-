<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe FB Basic</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB TOPBAR - Basic & Clean */
        .top { position: absolute; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%); z-index: 10; }
        .top i { font-size: 26px; margin-right: 12px; }
        .top b { font-size: 20px; flex: 1; }

        /* FB SIDE ACTIONS */
        .actions { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 10; }
        .btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .h-icon { font-size: 32px !important; color: white; } /* Heart Like */
        .fb-icon { font-size: 30px !important; color: white; } /* Standard Icons */
        .count { font-size: 12px; margin-top: 2px; font-weight: 500; }

        /* FB BOTTOM INFO - Stick to Bottom */
        .bottom-info { position: absolute; left: 0; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); z-index: 10; }
        .u-line { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .u-pic { width: 36px; height: 36px; border-radius: 50%; border: 1px solid white; }
        .u-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .u-name::after { content: '•'; font-size: 12px; opacity: 0.8; }
        .follow-txt { color: #fff; font-weight: 600; font-size: 14px; }
        .caption { font-size: 14px; margin-top: 5px; line-height: 1.4; }

        /* FB COMMENT INPUT BOX */
        .comment-bar { width: 95%; height: 45px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 25px; margin: 10px auto; display: flex; align-items: center; padding: 0 15px; font-size: 14px; color: #ccc; }

        .watermark { position: absolute; top: 70px; right: 15px; opacity: 0.4; font-size: 14px; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="feed"></div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function init() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(v => `
                    <div class="reel">
                        <div class="top">
                            <i class="material-icons-outlined">arrow_back</i>
                            <b>Reels</b>
                            <i class="material-icons-outlined" style="margin-left:auto">search</i>
                            <i class="material-icons-outlined">person_outline</i>
                        </div>
                        <div class="watermark">IndiVibe</div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="actions">
                            <div class="btn" onclick="toggleLike(this)">
                                <i class="material-icons-outlined h-icon">favorite_border</i>
                                <span class="count">1.5M</span>
                            </div>
                            <div class="btn">
                                <i class="material-icons-outlined fb-icon">chat_bubble_outline</i>
                                <span class="count">45K</span>
                            </div>
                            <div class="btn" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons-outlined fb-icon" style="transform: scaleX(-1);">reply</i>
                                <span class="count">Share</span>
                            </div>
                            <div class="btn">
                                <i class="material-icons-outlined fb-icon">more_horiz</i>
                            </div>
                        </div>

                        <div class="bottom-info">
                            <div class="u-line">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-pic">
                                <span class="u-name">Vishnupur Fifthoot</span>
                                <span class="follow-txt">Follow</span>
                            </div>
                            <div class="caption">${v.caption || ''}</div>
                            <div class="comment-bar">कमेंट जोड़ें...</div>
                        </div>
                    </div>
                `).join('');
                startLogic();
            }
        }

        function startLogic() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => obs.observe(r));
        }

        function toggleLike(el) {
            const i = el.querySelector('.h-icon');
            if(i.innerText === 'favorite_border') {
                i.innerText = 'favorite'; i.style.color = '#ff3040';
            } else {
                i.innerText = 'favorite_border'; i.style.color = 'white';
            }
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Final v4</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* REELS FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* TOP HEADER (Facebook Style) */
        .fb-header { position: absolute; top: 0; width: 100%; display: flex; align-items: center; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); z-index: 100; }
        .fb-header span { font-size: 28px; margin-right: 15px; }
        .fb-header b { font-size: 20px; flex: 1; }

        /* RIGHT ACTIONS (FB Sequence + IG Heart) */
        .vibe-actions { position: absolute; right: 12px; bottom: 90px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-label { font-size: 12px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 3px #000; }
        
        /* ❤️ INSTAGRAM HEART STYLE */
        .heart-btn { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); transition: 0.2s; }

        /* BOTTOM INFO (Facebook Style) */
        .vibe-info { position: absolute; left: 15px; bottom: 90px; width: 75%; z-index: 100; }
        .user-box { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-pic { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid white; }
        .u-name { font-weight: 700; font-size: 14px; }
        .f-btn { border: 1px solid white; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); }
        .v-desc { font-size: 14px; text-shadow: 0 1px 3px #000; }

        /* BOTTOM TRAY FOR DOWNLOAD */
        #tray { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 1000; transition: 0.3s; padding: 20px 0; }
        #tray.show { bottom: 0; }
        .tray-btn { padding: 15px 25px; display: flex; align-items: center; gap: 15px; font-weight: 600; cursor: pointer; border-bottom: 0.1px solid #333; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div id="tray">
        <div style="width: 40px; height: 4px; background: #555; margin: 0 auto 15px; border-radius: 2px;"></div>
        <div class="tray-btn" id="dl-now"><span class="material-icons-outlined">file_download</span> Download Video</div>
        <div class="tray-btn" onclick="alert('Reported!')" style="color: #ff4d4d;"><span class="material-icons-outlined">report</span> Report Content</div>
        <div class="tray-btn" onclick="toggleTray()">Close</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function load() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="fb-header">
                            <span class="material-icons-outlined">arrow_back</span>
                            <b>Reels</b>
                            <span class="material-icons-outlined">search</span>
                            <span class="material-icons-outlined">account_circle</span>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-info">
                            <div class="user-box">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-pic">
                                <span class="u-name">@vishnu_vibes</span>
                                <div class="f-btn">Follow</div>
                            </div>
                            <div class="v-desc">${v.caption || 'New Reel'}</div>
                        </div>
                        <div class="vibe-actions">
                            <div class="action-item" onclick="like(this)">
                                <span class="material-icons-outlined heart-btn">favorite_border</span>
                                <span class="action-label">1.5M</span>
                            </div>
                            <div class="action-item"><span class="material-icons-outlined">mode_comment</span><span class="action-label">45K</span></div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})"><span class="material-icons-outlined">share</span><span class="action-label">Share</span></div>
                            <div class="action-item" onclick="toggleTray('${v.video_url}')"><span class="material-icons-outlined">more_horiz</span></div>
                        </div>
                    </div>
                `).join('');
                const obs = new IntersectionObserver((es) => {
                    es.forEach(e => {
                        const v = e.target.querySelector('video');
                        if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
                    });
                }, { threshold: 0.8 });
                document.querySelectorAll('.vibe-card').forEach(c => obs.observe(c));
            }
        }

        function toggleTray(url) {
            const t = document.getElementById('tray');
            t.classList.toggle('show');
            if(url) {
                document.getElementById('dl-now').onclick = () => { window.open(url); toggleTray(); };
            }
        }

        function like(el) {
            const i = el.querySelector('.heart-btn');
            i.innerText = (i.innerText === 'favorite_border') ? 'favorite' : 'favorite_border';
            i.style.color = (i.innerText === 'favorite') ? '#ff3040' : 'white';
        }

        load();
    </script>
</body>
</html>

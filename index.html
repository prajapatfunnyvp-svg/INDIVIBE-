<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Final v10</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

        /* VIBE FEED - SNAP SCROLL */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FACEBOOK TOP BAR (image_6.png style) */
        .fb-header { position: absolute; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); z-index: 100; }
        .fb-header .material-icons-outlined { font-size: 26px; margin-right: 18px; cursor: pointer; color: #fff; }
        .fb-header b { font-size: 20px; flex: 1; letter-spacing: 0.5px; color: #fff; }

        /* RIGHT ACTIONS (FB Sequence) */
        .vibe-actions { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        /* ❤️ INSTAGRAM HEART (Small size) */
        .heart-btn { font-size: 28px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        
        /* 💬 FB COMMENT/SHARE ICONS */
        .fb-mini-icon { font-size: 26px !important; color: white; opacity: 0.9; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .count-label { font-size: 11px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 3px #000; color: #fff; }

        /* BOTTOM INFO (Exact FB image_6.png Layout) */
        .vibe-info { position: absolute; left: 15px; bottom: 85px; width: 75%; z-index: 100; }
        .user-line { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-pic { width: 36px; height: 36px; border-radius: 50%; border: 1.2px solid #fff; object-fit: cover; }
        .u-name { font-weight: 700; font-size: 15px; text-shadow: 0 1px 4px #000; color: #fff; }
        .f-tag { border: 1px solid white; padding: 2px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); color: #fff; }
        .v-cap { font-size: 14px; text-shadow: 0 1px 4px #000; line-height: 1.3; font-weight: 400; color: #fff; opacity: 0.95; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function initFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="fb-header">
                            <span class="material-icons-outlined">arrow_back</span>
                            <b>Vibes</b>
                            <span class="material-icons-outlined" style="margin-left:auto">search</span>
                            <span class="material-icons-outlined">account_circle</span>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-info">
                            <div class="user-line">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-pic">
                                <span class="u-name">@vishnu_vibes</span>
                                <div class="f-tag">Follow</div>
                            </div>
                            <div class="v-cap">${v.caption || 'Made with IndiVibe ❤️'}</div>
                        </div>
                        <div class="vibe-actions">
                            <div class="action-item" onclick="toggleLike(this)">
                                <span class="material-icons-outlined heart-btn">favorite_border</span>
                                <span class="count-label">1.5M</span>
                            </div>
                            <div class="action-item"><span class="material-icons-outlined fb-mini-icon">mode_comment</span><span class="count-label">45K</span></div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})"><span class="material-icons-outlined fb-mini-icon">share</span><span class="count-label">Share</span></div>
                            <div class="action-item"><span class="material-icons-outlined fb-mini-icon">more_horiz</span><span class="count-label">More</span></div>
                        </div>
                    </div>
                `).join('');
                startVibes();
            }
        }

        function startVibes() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target.querySelector('video');
                    if (e.isIntersecting) { video.play().catch(a => {}); } 
                    else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => obs.observe(c));
        }

        function toggleLike(el) {
            const i = el.querySelector('.heart-btn');
            if(i.innerText === 'favorite_border') {
                i.innerText = 'favorite'; i.style.color = '#ff3040';
            } else {
                i.innerText = 'favorite_border'; i.style.color = 'white';
            }
        }

        initFeed();
    </script>
</body>
</html>

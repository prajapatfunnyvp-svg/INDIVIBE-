<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        #box { text-align: center; border: 2px solid #00f2ea; padding: 30px; border-radius: 20px; width: 85%; }
        button { background: #00f2ea; color: #000; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; box-shadow: 0 0 10px #00f2ea; }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="box">
        <h2 id="msg">Checking Video...</h2>
        <div id="btn-area"></div>
    </div>

    <video id="vid" loop playsinline controls></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        const _supa = supabase.createClient(URL, KEY);

        async function init() {
            const msg = document.getElementById('msg');
            // Hum table se data la rahe hain
            const { data, error } = await _supa.from('videos').select('*');

            if (error) {
                msg.innerText = "Error: " + error.message;
            } else if (data && data.length > 0) {
                msg.innerText = "INDIVIBE Ready!";
                document.getElementById('btn-area').innerHTML = '<button onclick="start()">WATCH VIDEO</button>';
                // Table ki sabse nayi row ka video link uthayenge
                const videoUrl = data[data.length - 1].video_url;
                document.getElementById('vid').src = videoUrl;
            } else {
                msg.innerText = "No Video Found!";
            }
        }

        function start() {
            document.getElementById('box').style.display = 'none';
            const v = document.getElementById('vid');
            v.style.display = 'block';
            v.play();
        }

        init();
    </script>
</body>
</html>

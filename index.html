<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root { --neon: #00f2ea; --bg: #000; --border: #262626; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* REELS FEED - Simple & Smooth */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* ACTION BUTTONS (Right Side) */
        .vibe-actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .vibe-icon { font-size: 32px !important; cursor: pointer; text-shadow: 0 2px 8px #000; }
        
        /* INFO (Bottom Left) */
        .vibe-info { position: absolute; left: 15px; bottom: 90px; width: 75%; z-index: 10; }
        .user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .user-pic { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid white; }

        /* SIMPLE UPLOAD MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; padding: 20px; box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; height: 80px; font-size: 16px; margin-top: 15px; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid var(--border); z-index: 100; }
        .nav-btn { font-size: 28px !important; opacity: 0.7; cursor: pointer; }
        .active-btn { opacity: 1; color: var(--neon); }
    </style>
</head>
<body>

    <div id="vibe-feed">
        <div style="padding: 100px 20px; text-align: center; color: gray;">Vibes Load ho rahi hain...</div>
    </div>

    <div id="upload-modal" class="modal">
        <div class="modal-header">
            <span class="material-icons-outlined" onclick="closeModal()">close</span>
            <b style="font-size: 18px;">New Vibe</b>
            <span style="color: var(--neon); font-weight: bold;" onclick="uploadVibe()">Share</span>
        </div>
        <div id="preview-area" style="width:100%; height:250px; background:#111; border-radius:12px; display:flex; align-items:center; justify-content:center;">
            <p id="placeholder-text" style="color:gray;">Video selected</p>
        </div>
        <textarea id="vibe-title" placeholder="Video ke baare mein likhein..."></textarea>
        <div id="up-progress" style="text-align: center; margin-top: 20px; color: var(--neon);"></div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-btn" onclick="location.reload()">home</span>
        <span class="material-icons-outlined nav-btn">search</span>
        <span class="material-icons-outlined nav-btn" onclick="openFilePicker()">add_box</span>
        <span class="material-icons-outlined nav-btn active-btn">play_circle</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width: 26px; height: 26px; border-radius: 50%;">
    </div>

    <input type="file" id="file-input" accept="video/*" style="display: none;" onchange="showModal(event)">

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        let selectedVideo = null;

        // 1. VIDEOS LOAD KARNA
        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data && data.length > 0) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pic">
                                <b>@vishnu_vibes</b>
                            </div>
                            <p style="font-size: 14px; margin:0;">${v.caption || 'IndiVibe Pro'}</p>
                        </div>
                        <div class="vibe-actions">
                            <span class="material-icons-outlined vibe-icon" onclick="this.style.color='red'; this.innerText='favorite'">favorite_border</span>
                            <span class="material-icons-outlined vibe-icon" onclick="alert('Comments feature coming soon!')">chat_bubble_outline</span>
                            <span class="material-icons-outlined vibe-icon" onclick="navigator.share({url:'${v.video_url}'})">send</span>
                        </div>
                    </div>
                `).join('');
                document.querySelector('video').play(); // Pehla video auto-play
            }
        }

        // 2. UPLOAD LOGIC
        function openFilePicker() { document.getElementById('file-input').click(); }

        function showModal(e) {
            selectedVideo = e.target.files[0];
            if(selectedVideo) document.getElementById('upload-modal').style.display = 'block';
        }

        async function uploadVibe() {
            const status = document.getElementById('up-progress');
            status.innerText = "🚀 Uploading...";
            
            const fileName = `${Date.now()}.mp4`;
            const { data, error } = await supa.storage.from('vibe-videos').upload(fileName, selectedVideo);

            if (!error) {
                const { data: urlData } = supa.storage.from('vibe-videos').getPublicUrl(fileName);
                const caption = document.getElementById('vibe-title').value;
                
                await supa.from('videos').insert([{ 
                    video_url: urlData.publicUrl, 
                    caption: caption, 
                    is_safe: true 
                }]);
                
                status.innerText = "✅ Shared!";
                setTimeout(() => location.reload(), 1000);
            } else {
                alert("Upload Error: " + error.message);
                status.innerText = "";
            }
        }

        function closeModal() { document.getElementById('upload-modal').style.display = 'none'; }

        loadVibes();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe - Real Instagram Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* HEADER */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box;
            background: #000; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 32px; height: 32px; border-radius: 8px; }
        .header-name { font-size: 22px; font-weight: bold; letter-spacing: -1px; }

        /* REELS FEED */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .v-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* SIDEBAR ICONS (Real Instagram Style) */
        .side-icons { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 18px; z-index: 50; align-items: center; }
        .icon-btn { text-align: center; cursor: pointer; color: white; }
        .icon-btn .material-icons-outlined { font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .icon-btn span { font-size: 12px; display: block; margin-top: 2px; font-weight: 500; }

        /* PANELS (SEARCH & SHARE) */
        .panel {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; transition: 0.3s ease-out;
            display: flex; flex-direction: column;
        }
        .panel.active { top: 0; }
        .panel-header { display: flex; align-items: center; padding: 15px; border-bottom: 0.5px solid #222; }
        .search-input { flex: 1; background: #262626; border: none; padding: 10px 15px; border-radius: 10px; color: white; font-size: 16px; outline: none; }

        /* SHARE MODAL (Niche se aane wala) */
        .share-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%;
            background: #262626; border-radius: 15px 15px 0 0; z-index: 300;
            transition: 0.3s; padding: 20px; box-sizing: border-box;
        }
        .share-modal.active { bottom: 0; }
        .friend-list { margin-top: 20px; }
        .friend-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .send-btn { background: #0095f6; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; }

        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-left">
            <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="header-logo">
            <div class="header-name">IndiVibe</div>
        </div>
        <span class="material-icons-outlined" onclick="openPanel('search-panel')">search</span>
    </div>

    <div id="main-feed" class="feed"></div>

    <div id="search-panel" class="panel">
        <div class="panel-header">
            <span class="material-icons-outlined" onclick="closePanel('search-panel')" style="margin-right:15px">arrow_back</span>
            <input type="text" class="search-input" placeholder="Search">
        </div>
        <div style="padding: 20px; color: #8e8e8e; text-align: center;">Explore videos, creators, and vibes.</div>
    </div>

    <div id="share-modal" class="share-modal">
        <div style="width: 40px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 15px;"></div>
        <h3 style="margin:0">Send</h3>
        <div class="friend-list">
            <div class="friend-row"><span>@Dshrat_Nayak</span><button class="send-btn" onclick="sendTo('@Dshrat_Nayak')">Send</button></div>
            <div class="friend-row"><span>@Vishnu_Indi</span><button class="send-btn" onclick="sendTo('@Vishnu_Indi')">Send</button></div>
        </div>
        <button onclick="closeShare()" style="width:100%; background:none; color:#ed4956; border:none; margin-top:20px; font-weight:bold;">Cancel</button>
    </div>

    <div id="splash">
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:80px;">
        <h2 style="margin-top:20px">IndiVibe</h2>
        <button onclick="initApp()" style="background:#0095f6; border:none; padding:12px 40px; border-radius:8px; color:white; font-weight:bold; margin-top:30px;">Enter App</button>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function initApp() {
            document.getElementById('splash').style.display = 'none';
            const { data } = await supa.from('videos').select('*').eq('is_safe', true);
            if (data) {
                document.getElementById('main-feed').innerHTML = data.map(v => `
                    <div class="v-card">
                        <video src="${v.video_url}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                        <div class="side-icons">
                            <div class="icon-btn"><span class="material-icons-outlined">favorite_border</span><span>12k</span></div>
                            <div class="icon-btn"><span class="material-icons-outlined">chat_bubble_outline</span><span>45</span></div>
                            <div class="icon-btn" onclick="openShare()"><span class="material-icons-outlined">send</span><span>Share</span></div>
                        </div>
                    </div>
                `).join('');
                document.querySelector('video').play();
            }
        }

        function openPanel(id) { document.getElementById(id).classList.add('active'); }
        function closePanel(id) { document.getElementById(id).classList.remove('active'); }
        function openShare() { document.getElementById('share-modal').classList.add('active'); }
        function closeShare() { document.getElementById('share-modal').classList.remove('active'); }
        function sendTo(id) { alert("Sent to " + id); closeShare(); }
    </script>
</body>
</html>

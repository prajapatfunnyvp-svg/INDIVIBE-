<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro v8</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* VIBE FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB TOP BAR (Exact Size) */
        .fb-header { position: absolute; top: 0; width: 100%; height: 56px; display: flex; align-items: center; padding: 0 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); z-index: 100; }
        .fb-header span { font-size: 24px; margin-right: 18px; }
        .fb-header b { font-size: 19px; flex: 1; font-weight: 600; }

        /* RIGHT ACTIONS (Only 4 Buttons - Exact FB Style) */
        .vibe-actions { position: absolute; right: 12px; bottom: 80px; display: flex; flex-direction: column; gap: 24px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        /* ❤️ IG HEART (Small & Slim) */
        .heart-btn { font-size: 26px !important; color: white; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
        
        /* 💬 FB STYLE ICONS (Small 24px) */
        .fb-mini { font-size: 24px !important; color: white; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
        .count-text { font-size: 12px; margin-top: 2px; font-weight: 500; text-shadow: 0 1px 2px #000; }

        /* USER INFO (FB Layout) */
        .vibe-info { position: absolute; left: 16px; bottom: 90px; width: 75%; z-index: 100; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .u-pic { width: 34px; height: 34px; border-radius: 50%; border: 1px solid white; }
        .u-name { font-weight: 700; font-size: 14px; text-shadow: 0 1px 3px #000; }
        .follow-tag { border: 1px solid white; padding: 1px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); }
        .v-desc { font-size: 14px; text-shadow: 0 1px 3px #000; line-height: 1.3; }

        /* TRAY */
        #tray { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 16px 16px 0 0; z-index: 2000; transition: 0.3s ease; padding-bottom: 40px; }
        #tray.open { bottom: 0; }
        .tray-line { width: 36px; height: 4px; background: #555; margin: 12px auto; border-radius: 10px; }
        .tray-opt { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 0.1px solid #333; font-size: 16px; font-weight: 500; color: white; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div id="tray">
        <div class="tray-line" onclick="closeTray()"></div>
        <div class="tray-opt" onclick="alert('Saved!')"><span class="material-icons-outlined">bookmark_border</span> Save Vibe</div>
        <div class="tray-opt" id="dl-v"><span class="material-icons-outlined">file_download</span> Download Video</div>
        <div class="tray-opt" onclick="alert('Reported!')" style="color:#ff4d4d;"><span class="material-icons-outlined">report</span> Report</div>
        <div class="tray-opt" onclick="closeTray()">Cancel</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function init() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="fb-header">
                            <span class="material-icons-outlined">arrow_back</span>
                            <b>Vibes</b>
                            <span class="material-icons-outlined" style="margin-left:auto">search</span>
                            <span class="material-icons-outlined">account_circle</span>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-pic">
                                <span class="u-name">@vishnu_vibes</span>
                                <div class="follow-tag">Follow</div>
                            </div>
                            <div class="v-desc">${v.caption || ''}</div>
                        </div>
                        <div class="vibe-actions">
                            <div class="action-item" onclick="like(this)">
                                <span class="material-icons-outlined heart-btn">favorite_border</span>
                                <span class="count-text">1.5M</span>
                            </div>
                            <div class="action-item"><span class="material-icons-outlined fb-mini">chat_bubble_outline</span><span class="count-text">45K</span></div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})"><span class="material-icons-outlined fb-mini">share</span></div>
                            <div class="action-item" onclick="openTray('${v.video_url}')"><span class="material-icons-outlined fb-mini">more_horiz</span></div>
                        </div>
                    </div>
                `).join('');
                setupObs();
            }
        }

        function setupObs() {
            const observer = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => observer.observe(c));
        }

        function like(el) {
            const i = el.querySelector('.heart-btn');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        function openTray(url) {
            document.getElementById('tray').classList.add('open');
            document.getElementById('dl-v').onclick = () => { window.open(url); closeTray(); };
        }
        function closeTray() { document.getElementById('tray').classList.remove('open'); }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE TEST</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        #status { padding: 20px; }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; }
    </style>
</head>
<body>
    <div id="status">Connecting to Database...</div>
    <video id="player" loop autoplay muted playsinline></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        const _supa = supabase.createClient(URL, KEY);

        async function check() {
            const status = document.getElementById('status');
            const player = document.getElementById('player');

            const { data, error } = await _supa.from('videos').select('*');

            if (error) {
                status.innerHTML = "Database Error: " + error.message;
            } else if (data && data.length > 0) {
                status.style.display = 'none';
                player.style.display = 'block';
                player.src = data[0].video_url;
                player.play().catch(e => {
                    status.style.display = 'block';
                    status.innerHTML = "Video mil gaya! Chalane ke liye screen par touch karein.";
                });
            } else {
                status.innerHTML = "Database se connect ho gaya, par table khali hai!";
            }
        }
        check();
        window.onclick = () => { document.getElementById('player').play(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indivibe Vibe Core</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Vibe Container - Smooth Scrolling */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar UI - Right Side */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action { text-align: center; cursor: pointer; }
        .action i { font-size: 35px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .action span { font-size: 12px; font-weight: 600; margin-top: 4px; display: block; }
        .liked { color: #ff3040 !important; font-variation-settings: 'FILL' 1; }

        /* User Info - Bottom Left */
        .video-meta { position: absolute; bottom: 145px; left: 16px; z-index: 100; width: 75%; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .blue-tick { color: #1877F2; font-size: 16px; }

        /* Instagram Style Pill Comment Box */
        .comment-wrapper { position: fixed; bottom: 85px; width: 100%; padding: 0 16px; z-index: 1000; }
        .pill-box { background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; }
        .pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #222; z-index: 2500; }
        .nav-bar i { font-size: 30px; color: #fff; opacity: 0.5; }
        .active-tab { opacity: 1 !important; }

        /* Options Menu (3-Dot) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 3000; }
        .menu-sheet { position: fixed; bottom: -100%; width: 100%; background: #262626; border-radius: 15px 15px 0 0; z-index: 3500; transition: 0.3s; padding: 15px 0; }
        .menu-sheet.active { bottom: 0; }
        .menu-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; font-size: 16px; border-bottom: 0.1px solid #333; }
        .menu-item:last-child { border: none; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div class="comment-wrapper">
        <div class="pill-box">
            <input type="text" id="comInput" placeholder="कमेंट जोड़ें..." onkeypress="if(event.key==='Enter') postComment()">
            <i class="material-icons" style="opacity:0.7;">sentiment_satisfied_alt</i>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>
    <div class="menu-sheet" id="menuSheet">
        <div style="width:40px; height:4px; background:#555; margin:0 auto 15px; border-radius:10px;"></div>
        <div class="menu-item" onclick="alert('Downloading...')"><i class="material-icons">file_download</i> Download Video</div>
        <div class="menu-item" onclick="alert('Marked as Not Interested')"><i class="material-icons">sentiment_dissatisfied</i> Not Interested</div>
        <div class="menu-item" style="color:#ff3040;" onclick="alert('Reported')"><i class="material-icons">report_problem</i> Report</div>
    </div>

    <nav class="nav-bar">
        <i class="material-icons">home</i>
        <i class="material-icons">search</i>
        <i class="material-icons" style="font-size:38px;">add_box</i>
        <i class="material-icons active-tab">play_circle_outline</i>
        <i class="material-icons">person_outline</i>
    </nav>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', {ascending: false});
            if(data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar">
                            <div class="action" onclick="toggleLike(this)"><i class="material-icons">favorite</i><span>1.2M</span></div>
                            <div class="action" onclick="document.getElementById('comInput').focus()"><i class="material-icons">chat_bubble_outline</i><span>1,155</span></div>
                            <div class="action" onclick="alert('Sharing...')"><i class="material-icons" style="transform:scaleX(-1)">reply</i><span>13.3K</span></div>
                            <div class="action"><i class="material-icons">bookmark_border</i><span>Save</span></div>
                            <div class="action" onclick="toggleMenu(true)"><i class="material-icons">more_horiz</i></div>
                        </div>
                        <div class="video-meta">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-avatar">
                                <strong>Vishnu Raj <i class="material-icons blue-tick">check_circle</i></strong>
                            </div>
                            <p style="font-size:14px; text-shadow: 0 1px 2px #000;">${v.caption || 'Naya Vibe! #indivibe'}</p>
                        </div>
                    </div>
                `).join('');
                initObserver();
            }
        }

        function toggleLike(el) { el.querySelector('i').classList.toggle('liked'); }
        function toggleMenu(show) { 
            document.getElementById('menuSheet').classList.toggle('active', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        }
        function postComment() { alert('Comment Posted!'); document.getElementById('comInput').value = ''; }

        function initObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => { const v = e.target.querySelector('video'); if(e.isIntersecting) v.play(); else v.pause(); });
            }, { threshold: 0.6 });
            document.querySelectorAll('.vibe-card').forEach(c => obs.observe(c));
        }

        loadVibes();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* Full Screen Video Feed */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Transparent Sidebar */
        .sidebar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .v-btn { text-align: center; cursor: pointer; }
        .v-btn i { font-size: 32px; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8); font-variation-settings: 'FILL' 0; transition: 0.2s; }
        .v-btn span { font-size: 11px; margin-top: 2px; display: block; }
        
        /* Fill Animation on Click */
        .v-btn.active i { font-variation-settings: 'FILL' 1; }
        .like-btn.active i { color: #ff3040; }
        .save-btn.active i { color: #fff; }

        /* THE GOL (PILL) COMMENT BOX - ONLY INSIDE SHEET */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 2000; }
        .sheet { position: fixed; bottom: -100%; width: 100%; background: #1a1a1a; border-radius: 20px 20px 0 0; z-index: 3000; transition: 0.3s; }
        .sheet.active { bottom: 0; }
        .com-sheet { height: 60%; display: flex; flex-direction: column; }
        
        /* Pill Input Style */
        .pill-area { padding: 12px 16px; border-top: 0.5px solid #333; display: flex; align-items: center; gap: 10px; }
        .pill-box { flex: 1; background: #333; border-radius: 30px; padding: 10px 18px; display: flex; align-items: center; }
        .pill-box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 14px; }

        /* 3-Dot Menu */
        .m-row { display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 0.1px solid #333; }
        .m-opt { padding: 15px 25px; display: flex; align-items: center; gap: 15px; font-size: 16px; }

        /* Double Tap Heart */
        .pop-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #fff; font-size: 100px; opacity: 0; pointer-events: none; }
        .animate { animation: heartPop 0.8s; }
        @keyframes heartPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.2; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>

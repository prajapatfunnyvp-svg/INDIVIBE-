<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe - Instagram Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Home Feed Header (Instagram Look) */
        .home-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-logo { width: 40px; }
        .header-name { font-size: 26px; font-weight: bold; color: #00f2ea; margin-left: 10px; }

        /* Reels Container (Starts after header) */
        .feed { height: calc(100vh - 60px); margin-top: 60px; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-card { height: calc(100vh - 60px); width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Social Icons */
        .side-icons { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .icon-btn { text-align: center; font-size: 26px; filter: drop-shadow(2px 2px 5px #000); cursor: pointer; }
        .icon-btn span { font-size: 10px; display: block; }

        /* Splash Screen */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div class="home-header">
        <img src="[LINK TO YOUR LOGO]" class="header-logo">
        <div class="header-name">IndiVibe</div>
    </div>

    <div id="main-feed" class="feed"></div>

    <div id="splash">
        <img src="[LINK TO YOUR LOGO]" style="width:100px; filter: drop-shadow(0 0 15px #00f2ea);">
        <h1 style="color:#00f2ea; letter-spacing:3px;">IndiVibe</h1>
        <button onclick="startApp()" style="background:#00f2ea; border:none; padding:15px 40px; border-radius:30px; font-weight:bold; margin-top:20px;">VIBE NOW</button>
    </div>

    <script>
        function startApp() {
            document.getElementById('splash').style.display = 'none';
            const feed = document.getElementById('main-feed');
            
            // Backup Videos (Jaise pichli baar the)
            const myVideos = [{v: 'https://vjs.zencdn.net/v/oceans.mp4', u: '@Dshrat_Nayak'}];
            
            feed.innerHTML = myVideos.map(v => `
                <div class="v-card">
                    <video src="${v.v}" loop playsinline muted onclick="this.muted=!this.muted;this.play()"></video>
                    <div class="side-icons">
                        <div class="icon-btn">❤️<span>15k</span></div>
                        <div class="icon-btn" onclick="alert('Chat box coming in next update!')">💬<span>80</span></div>
                        <div class="icon-btn" onclick="navigator.share({url:window.location.href})">🚀<span>Share</span></div>
                    </div>
                </div>
            `).join('');
            document.querySelector('video').play();
        }
    </script>
</body>
</html>

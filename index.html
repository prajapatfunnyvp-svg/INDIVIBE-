<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE REELS FIXED</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #start-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#00f2ea; text-align: center; }
        button { background:#00f2ea; color:#000; border:none; padding:20px 50px; border-radius:50px; font-weight:bold; font-size:22px; cursor:pointer; box-shadow: 0 0 20px #00f2ea; }
        .info { position: absolute; bottom: 80px; left: 15px; color: white; text-shadow: 1px 1px 5px #000; z-index: 10; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>INDIVIBE</h1>
        <p>Database Connecting...</p>
        <button id="sBtn" onclick="startNow()" style="display:none;">START WATCHING</button>
    </div>

    <div id="feed" class="feed-container"></div>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        // Pehle check karte hain ki database connect ho raha hai ya nahi
        async function checkConn() {
            const { data, error } = await _supa.from('videos').select('*');
            if (error) {
                document.querySelector('p').innerText = "Error: " + error.message;
            } else {
                document.querySelector('p').innerText = "Connected! Click below:";
                document.getElementById('sBtn').style.display = 'block';
                window.videoData = data;
            }
        }
        checkConn();

        function startNow() {
            document.getElementById('start-screen').style.display = 'none';
            const feed = document.getElementById('feed');
            
            feed.innerHTML = window.videoData.map((item, index) => `
                <div class="video-card">
                    <video id="vid-${index}" src="${item.video_url}" loop playsinline muted onclick="this.muted = !this.muted; this.play();"></video>
                    <div class="info">
                        <h3>@IndiVibe_Music</h3>
                        <p>Instrumental Audio</p>
                    </div>
                </div>
            `).join('');

            const firstVid = document.querySelector('video');
            if(firstVid) firstVid.play();
        }

        document.getElementById('feed').addEventListener('scroll', () => {
            const vids = document.querySelectorAll('video');
            vids.forEach(v => {
                const r = v.getBoundingClientRect();
                if(r.top >= 0 && r.top < window.innerHeight / 2) v.play();
                else v.pause();
            });
        });
    </script>
</body>
</html>

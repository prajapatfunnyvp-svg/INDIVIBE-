<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE FINAL WIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; overflow: hidden; }
        .card { border: 2px solid #00f2ea; padding: 40px; border-radius: 30px; width: 85%; background: #111; box-shadow: 0 0 25px #00f2ea; z-index: 10; }
        h1 { font-size: 38px; margin-bottom: 10px; text-shadow: 0 0 10px #00f2ea; }
        button { background: #00f2ea; color: #000; border: none; padding: 22px 55px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 26px; margin-top: 25px; box-shadow: 0 0 15px #00f2ea; -webkit-tap-highlight-color: transparent; }
        video { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: #000; }
    </style>
</head>
<body>
    <div id="ui" class="card">
        <h1>INDIVIBE</h1>
        <p id="st">READY!</p>
        <div id="box"><button id="btn">WATCH NOW</button></div>
    </div>
    <video id="v" controls playsinline loop></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        async function init() {
            const { data } = await _supa.from('videos').select('video_url');
            if (data && data.length > 0) {
                const videoLink = data[data.length - 1].video_url;
                const vid = document.getElementById('v');
                vid.src = videoLink;
                
                // Click hone par video chalane ka naya tarika
                document.getElementById('btn').addEventListener('click', function() {
                    document.getElementById('ui').style.display = 'none';
                    vid.style.display = 'block';
                    vid.play();
                });
            }
        }
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>INDIVIBE Premium</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* TOP BAR & BRANDING */
.top-bar {
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  padding:10px 15px;
}

.brand {
  font-weight:900;
  font-size:22px;
  color: #1877F2;
  letter-spacing: 1px;
}

/* STORIES BAR (PREMIUM LOOK) */
.stories {
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding: 10px 0;
  scrollbar-width: none;
}
.stories::-webkit-scrollbar { display: none; }

.story-circle {
  min-width: 62px;
  height: 62px;
  border-radius: 50%;
  background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
  padding: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.story-circle img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid black;
  object-fit: cover;
}

/* FEED SECTION */
.feed {
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scrollbar-width: none;
}
.feed::-webkit-scrollbar { display: none; }

.video-container {
  height:100vh;
  position:relative;
  scroll-snap-align:start;
  background: #000;
  display: flex;
  align-items: center;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RIGHT ACTION ICONS */
.actions {
  position:absolute;
  right:12px;
  bottom:100px;
  display:flex;
  flex-direction:column;
  gap:22px;
  align-items:center;
  z-index: 50;
}

.act-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.act-btn span { font-size: 11px; margin-top: 4px; font-weight: bold; }

/* ❤️ DOUBLE TAP HEART */
.heart-pop {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:100px;
  color:#ff3040;
  pointer-events:none;
  z-index: 60;
  opacity: 0;
}
.heart-pop.animate { animation: popHeart 0.8s ease-out; }
@keyframes popHeart {
  0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
  50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
}

/* BOTTOM NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:15px 0;
  border-top: 0.2px solid #333;
  z-index: 100;
}

/* USER INFO (BOTTOM LEFT) */
.user-info {
  position: absolute;
  bottom: 80px;
  left: 15px;
  z-index: 50;
}
.user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.u-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff; }

/* DRAWER (COMMENT) */
.drawer {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:65%;
  background:#1c1c1e;
  border-radius:20px 20px 0 0;
  transition:0.4s cubic-bezier(0, 0, 0.2, 1);
  z-index: 200;
  padding: 15px;
}
.drawer.active { bottom:0; }

</style>
</head>

<body>

<div class="top-bar">
  <div class="brand">INDIVIBE</div>
  <div class="stories">
    <div class="story-circle"><img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png"></div>
    <div class="story-circle"><img src="https://picsum.photos/101"></div>
    <div class="story-circle"><img src="https://picsum.photos/102"></div>
    <div class="story-circle"><img src="https://picsum.photos/103"></div>
    <div class="story-circle"><img src="https://picsum.photos/104"></div>
  </div>
</div>

<div class="feed" id="feed"></div>

<div class="nav">
  <i data-lucide="home"></i>
  <i data-lucide="search"></i>
  <i data-lucide="plus-square"></i>
  <i data-lucide="user"></i>
</div>

<div class="drawer" id="comm-drawer">
  <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
    <b>Comments</b>
    <i data-lucide="x" onclick="toggleC(false)"></i>
  </div>
  <div id="comm-list" style="overflow-y:auto; flex:1;">No comments yet.</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://jxjbmjburdksqfjyhrxp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4"
);

async function loadVibes() {
  const { data } = await supabase.from("videos").select("*").order('created_at', { ascending: false });
  if(data) renderFeed(data);
}

function renderFeed(videos) {
  const feed = document.getElementById("feed");
  feed.innerHTML = videos.map(v => `
    <div class="video-container">
      <video src="${v.video_url}" loop playsinline onclick="handleSingleTap(this)" ondblclick="handleLike(this)"></video>
      <div class="heart-pop">❤</div>
      
      <div class="actions">
        <div class="act-btn" onclick="handleLike(this.parentElement.parentElement.querySelector('video'))"><i data-lucide="heart" class="h-icon"></i><span>1.2M</span></div>
        <div class="act-btn" onclick="toggleC(true)"><i data-lucide="message-circle"></i><span>45K</span></div>
        <div class="act-btn" onclick="navigator.share({url:'${v.video_url}'})"><i data-lucide="share-2"></i><span>Share</span></div>
        <div class="act-btn" onclick="window.open('${v.video_url}')"><i data-lucide="download"></i></div>
      </div>

      <div class="user-info">
        <div class="user-row">
          <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-avatar">
          <b>Vishnupur Fifthoot</b>
        </div>
        <p style="font-size:14px;">${v.caption || ''}</p>
      </div>
    </div>
  `).join('');

  lucide.createIcons();
  setupObserver();
}

let tapTimer;
function handleSingleTap(v) {
  if (tapTimer) return;
  tapTimer = setTimeout(() => { v.paused ? v.play() : v.pause(); tapTimer = null; }, 250);
}

function handleLike(v) {
  clearTimeout(tapTimer); tapTimer = null;
  const h = v.parentElement.querySelector(".heart-pop");
  h.classList.add("animate");
  setTimeout(() => h.classList.remove("animate"), 800);
  
  const hIcon = v.parentElement.querySelector(".h-icon");
  hIcon.style.fill = "#ff3040"; hIcon.style.stroke = "#ff3040";
}

function setupObserver() {
  const obs = new IntersectionObserver(es => {
    es.forEach(e => {
      const v = e.target.querySelector("video");
      if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
    });
  }, { threshold: 0.8 });
  document.querySelectorAll(".video-container").forEach(c => obs.observe(c));
}

function toggleC(open) { document.getElementById("comm-drawer").classList.toggle("active", open); }

loadVibes();
</script>

</body>
</html>

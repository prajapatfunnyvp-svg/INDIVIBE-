<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* Feed System */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Header & Stories */
        .top-ui { position: absolute; top: 0; width: 100%; z-index: 100; padding: 12px 16px; background: linear-gradient(rgba(0,0,0,0.7), transparent); }
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 22px; font-weight: 900; }
        .stories { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .st-ring { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #1877F2; padding: 2px; flex-shrink: 0; }
        .st-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Sidebar Actions */
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .act-btn { display: flex; flex-direction: column; align-items: center; }
        .act-btn i { font-size: 32px; text-shadow: 0 2px 8px #000; }
        .act-btn span { font-size: 12px; font-weight: 600; margin-top: 2px; }
        .liked { color: #ff3040 !important; }

        /* FB GOOL (OVAL) COMMENT BOX - 100% PERFECT */
        .comment-fix { position: absolute; bottom: 25px; width: 100%; padding: 0 16px; z-index: 100; display: flex; justify-content: center; }
        .fb-oval-box { 
            width: 100%; max-width: 480px; 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(20px); 
            border-radius: 50px; /* Isse box bilkul gol banega */
            padding: 10px 20px; 
            display: flex; align-items: center; 
            border: 0.5px solid rgba(255,255,255,0.3);
        }
        .fb-oval-box span { flex: 1; color: #fff; font-size: 15px; opacity: 0.8; }
        .fb-icons { display: flex; gap: 15px; align-items: center; opacity: 0.9; }
        .fb-icons i { font-size: 22px; cursor: pointer; }

        /* 3-Dot Sheet */
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 1000; transition: 0.3s; padding-bottom: 20px; }
        .sheet.open { bottom: 0; }
        .opt { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-bottom: 0.5px solid #333; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 900; }

        /* Heart Animation */
        .h-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; color: #fff; opacity: 0; pointer-events: none; }
        .h-anim { animation: hPop 0.8s ease; }
        @keyframes hPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.2; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="feed"></div>
    <div class="overlay" id="overlay" onclick="closeM()"></div>
    <div class="sheet" id="sheet">
        <div style="width: 40px; height: 4px; background: #555; margin: 10px auto; border-radius: 2px;"></div>
        <div class="opt" id="dlNode"><i class="material-icons-outlined">download</i> <span>Download Video</span></div>
        <div class="opt" onclick="alert('Interested'); closeM()"><i class="material-icons-outlined">star_outline</i> <span>Interested</span></div>
        <div class="opt" onclick="alert('Not Interested'); closeM()"><i class="material-icons-outlined">visibility_off</i> <span>Not Interested</span></div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);
        let curUrl = "";

        async function loadFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(v => `
                    <div class="reel">
                        <div class="top-ui">
                            <div class="header-main">
                                <span class="logo">INDIVIBE</span>
                                <div style="display:flex; gap:18px;"><i class="material-icons-outlined">add_box</i><i class="material-icons-outlined">search</i></div>
                            </div>
                            <div class="stories">
                                <div class="st-ring" style="border-style:dashed; display:flex; align-items:center; justify-content:center;"><i class="material-icons">add</i></div>
                                <div class="st-ring"><img src="https://i.pravatar.cc/100?u=1"></div>
                                <div class="st-ring"><img src="https://i.pravatar.cc/100?u=2"></div>
                            </div>
                        </div>

                        <video src="${v.video_url}" loop playsinline onclick="vTap(this)" ondblclick="vLike(this)"></video>
                        <div class="h-pop material-icons-outlined">favorite</div>

                        <div class="sidebar">
                            <div class="act-btn" onclick="vLike(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons-outlined h-icon">favorite_border</i><span>14K</span>
                            </div>
                            <div class="act-btn"><i class="material-icons-outlined">chat_bubble_outline</i><span>980</span></div>
                            <div class="act-btn" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="act-btn" onclick="alert('Saved')"><i class="material-icons-outlined">bookmark_border</i><span>Save</span></div>
                            <div class="act-btn" onclick="openM('${v.video_url}')"><i class="material-icons-outlined">more_horiz</i></div>
                        </div>

                        <div class="comment-fix">
                            <div class="fb-oval-box">
                                <span>Write a comment...</span>
                                <div class="fb-icons">
                                    <i class="material-icons-outlined">alternate_email</i>
                                    <i class="material-icons-outlined">sentiment_satisfied</i>
                                    <i class="material-icons-outlined">gif_box</i>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                initObs();
            }
        }

        function openM(url) { curUrl = url; document.getElementById('sheet').classList.add('open'); document.getElementById('overlay').style.display='block'; }
        function closeM() { document.getElementById('sheet').classList.remove('open'); document.getElementById('overlay').style.display='none'; }
        document.getElementById('dlNode').onclick = () => { window.open(curUrl); closeM(); };

        let t;
        function vTap(v) { if(t) return; t = setTimeout(() => { v.paused ? v.play() : v.pause(); t=null; }, 250); }
        function vLike(v) {
            clearTimeout(t); t=null;
            const h = v.parentElement.querySelector('.h-pop');
            h.classList.add('h-anim'); setTimeout(() => h.classList.remove('h-anim'), 800);
            const icon = v.parentElement.querySelector('.h-icon');
            icon.innerText = 'favorite'; icon.classList.add('liked');
        }

        function initObs() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => obs.observe(r));
        }
        loadFeed();
    </script>
</body>
</html>

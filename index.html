<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root { --bg: #000; --border: #262626; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; }

        /* TOP HEADER */
        .top-nav { position: fixed; top: 0; width: 100%; height: 50px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; font-family: 'Brush Script MT', cursive; }

        /* STORIES BAR (Asli Instagram Style) */
        .stories-container { display: flex; gap: 12px; padding: 10px 15px; overflow-x: auto; border-bottom: 0.5px solid var(--border); margin-top: 50px; scrollbar-width: none; }
        .story-circle { flex-shrink: 0; text-align: center; width: 75px; }
        .img-ring { width: 68px; height: 68px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); display: flex; align-items: center; justify-content: center; }
        .img-ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid black; object-fit: cover; }
        .story-name { font-size: 11px; margin-top: 5px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* POST FEED */
        .post-card { width: 100%; margin-bottom: 20px; border-bottom: 0.5px solid var(--border); }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 10px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; }
        .post-img { width: 100%; max-height: 500px; object-fit: cover; background: #111; }
        
        /* POST ACTIONS */
        .post-actions { padding: 10px; display: flex; justify-content: space-between; }
        .action-left { display: flex; gap: 15px; }
        .action-icon { font-size: 28px !important; cursor: pointer; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="logo">IndiVibe</div>
        <div style="display: flex; gap: 20px;">
            <span class="material-icons-outlined">favorite_border</span>
            <span class="material-icons-outlined">chat_bubble_outline</span>
        </div>
    </div>

    <div class="stories-container">
        <div class="story-circle">
            <div class="img-ring" style="background: none; position: relative;">
                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png">
                <div style="position: absolute; bottom: 0; right: 0; background: #0095f6; border-radius: 50%; border: 2px solid black; font-size: 14px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;">+</div>
            </div>
            <div class="story-name">Your story</div>
        </div>
        <div class="story-circle"><div class="img-ring"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=100"></div><div class="story-name">oy_aarav...</div></div>
        <div class="story-circle"><div class="img-ring"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100"></div><div class="story-name">_prakash_</div></div>
        <div class="story-circle"><div class="img-ring"><img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100"></div><div class="story-name">chotu_salvi</div></div>
    </div>

    <div id="home-feed" style="margin-bottom: 60px;">
        <div class="post-card">
            <div class="post-header">
                <div class="user-info">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100">
                    <span style="font-weight: bold; font-size: 14px;">ur_smartmaker <span style="color:#0095f6; font-size: 12px;">✔</span></span>
                </div>
                <span class="material-icons-outlined">more_vert</span>
            </div>
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600" class="post-img">
            <div class="post-actions">
                <div class="action-left">
                    <span class="material-icons-outlined action-icon">favorite_border</span>
                    <span class="material-icons-outlined action-icon">chat_bubble_outline</span>
                    <span class="material-icons-outlined action-icon">send</span>
                </div>
                <span class="material-icons-outlined action-icon">bookmark_border</span>
            </div>
            <div style="padding: 0 10px 15px;">
                <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">1,245 likes</div>
                <div style="font-size: 14px;"><span style="font-weight: bold;">ur_smartmaker</span> Aaj ka mausam kamaal hai! ☁️</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <span class="material-icons-outlined" style="font-size: 30px;">home</span>
        <span class="material-icons-outlined" style="font-size: 30px; opacity: 0.6;">search</span>
        <span class="material-icons-outlined" style="font-size: 30px; opacity: 0.6;">add_box</span>
        <span class="material-icons-outlined" style="font-size: 30px; opacity: 0.6;" onclick="alert('Going to Reels')">play_circle</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width: 26px; height: 26px; border-radius: 50%;">
    </div>

</body>
</html>

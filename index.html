<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro - FB Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* VIBE FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FACEBOOK TOP BAR (image_1000037502) */
        .fb-header { position: absolute; top: 0; width: 100%; height: 54px; display: flex; align-items: center; padding: 0 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent); z-index: 100; }
        .fb-header span { font-size: 24px; margin-right: 20px; color: #fff; }
        .fb-header b { font-size: 19px; flex: 1; font-weight: 600; color: #fff; }

        /* RIGHT ACTIONS (Exact FB Layout & Count) */
        .vibe-actions { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        /* ❤️ INSTAGRAM HEART (Exact Small Size) */
        .heart-btn { font-size: 26px !important; color: white; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
        
        /* 💬 FB STYLE ICONS (Thin & Small 24px) */
        .fb-icon { font-size: 24px !important; color: white; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
        .action-label { font-size: 11px; margin-top: 2px; font-weight: 500; text-shadow: 0 1px 2px #000; }

        /* BOTTOM INFO (Exact Facebook Placement) */
        .vibe-info { position: absolute; left: 16px; bottom: 85px; width: 75%; z-index: 100; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; pointer-events: auto; }
        .u-pic { width: 34px; height: 34px; border-radius: 50%; border: 1px solid white; }
        .u-name { font-weight: 700; font-size: 14px; text-shadow: 0 1px 3px #000; }
        .f-badge { border: 1px solid white; padding: 2px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); }
        .v-cap { font-size: 14px; text-shadow: 0 1px 3px #000; line-height: 1.3; font-weight: 400; pointer-events: auto; }

        /* MORE MENU (Simple & Clean) */
        #tray { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 12px 12px 0 0; z-index: 2000; transition: 0.3s ease; padding-bottom: 30px; }
        #tray.open { bottom: 0; }
        .t-line { width: 32px; height: 3px; background: #555; margin: 10px auto; border-radius: 5px; }
        .t-opt { padding: 16px 20px; display: flex; align-items: center; gap: 12px; font-size: 16px; border-bottom: 0.5px solid #333; }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>

    <div id="tray">
        <div class="t-line" onclick="closeTray()"></div>
        <div class="t-opt" onclick="alert('Saved!')"><span class="material-icons-outlined">bookmark_border</span> Save Vibe</div>
        <div class="t-opt" id="dl-link"><span class="material-icons-outlined">file_download</span> Download Video</div>
        <div class="t-opt" onclick="closeTray()" style="opacity:0.6;">Cancel</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <div class="fb-header">
                            <span class="material-icons-outlined">arrow_back</span>
                            <b>Vibes</b>
                            <span class="material-icons-outlined" style="margin-left:auto">search</span>
                            <span class="material-icons-outlined">account_circle</span>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-pic">
                                <span class="u-name">@vishnu_vibes</span>
                                <div class="f-badge">Follow</div>
                            </div>
                            <div class="v-cap">${v.caption || ''}</div>
                        </div>
                        <div class="vibe-actions">
                            <div class="action-item" onclick="handleLike(this)">
                                <span class="material-icons-outlined heart-btn">favorite_border</span>
                                <span class="action-label">1.5M</span>
                            </div>
                            <div class="action-item">
                                <span class="material-icons-outlined fb-icon">chat_bubble_outline</span>
                                <span class="action-label">45K</span>
                            </div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})">
                                <span class="material-icons-outlined fb-icon">share</span>
                                <span class="action-label">Share</span>
                            </div>
                            <div class="action-item" onclick="openTray('${v.video_url}')">
                                <span class="material-icons-outlined fb-icon">more_horiz</span>
                                <span class="action-label">More</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupPlayer();
            }
        }

        function setupPlayer() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => obs.observe(c));
        }

        function handleLike(el) {
            const i = el.querySelector('.heart-btn');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        function openTray(url) {
            document.getElementById('tray').classList.add('open');
            document.getElementById('dl-link').onclick = () => { window.open(url); closeTray(); };
        }
        function closeTray() { document.getElementById('tray').classList.remove('open'); }

        loadFeed();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; overflow: hidden; }
        .card { border: 2px solid #00f2ea; padding: 40px; border-radius: 30px; width: 85%; background: rgba(0,0,0,0.9); box-shadow: 0 0 25px #00f2ea; }
        button { background: #00f2ea; color: #000; border: none; padding: 20px 45px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 24px; margin-top: 25px; transition: 0.3s; }
        button:active { transform: scale(0.9); }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; position: fixed; top: 0; left: 0; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui" class="card">
        <h1>INDIVIBE</h1>
        <p id="status">Connecting to Database...</p>
        <div id="action"></div>
    </div>

    <video id="v" loop playsinline controls></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        const _supa = supabase.createClient(URL, KEY);

        async function init() {
            try {
                const { data, error } = await _supa.from('videos').select('*');
                if (data && data.length > 0) {
                    document.getElementById('status').innerText = "App is Ready!";
                    document.getElementById('action').innerHTML = '<button onclick="play()">WATCH NOW</button>';
                    document.getElementById('v').src = data[data.length - 1].video_url;
                } else {
                    document.getElementById('status').innerText = "Database is Empty. Please add a row.";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Connection Error";
            }
        }

        function play() {
            document.getElementById('ui').style.display = 'none';
            const vid = document.getElementById('v');
            vid.style.display = 'block';
            vid.play().catch(() => alert("Click again to play!"));
        }

        init();
    </script>
</body>
</html>

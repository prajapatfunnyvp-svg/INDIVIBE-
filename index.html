<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* Instagram Smooth Scroll Logic */
        .main-scroll { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-scroll::-webkit-scrollbar { display: none; }
        
        .reel-page { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB Header */
        .fb-top { position: absolute; top: 0; width: 100%; height: 50px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 10; }
        .fb-top b { font-size: 20px; flex: 1; }

        /* FB Right Actions */
        .fb-right { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .act-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .act-btn i { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 4px #000); }
        .act-btn span { font-size: 11px; margin-top: 2px; font-weight: bold; }

        /* FB Bottom Info */
        .fb-info { position: absolute; bottom: 25px; left: 15px; width: 80%; z-index: 10; }
        .u-profile { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-img { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .u-name { font-weight: bold; font-size: 15px; }
        .u-follow { border: 1px solid #fff; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .u-cap { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 3px #000; }

        /* 📱 INSTA-STYLE HIDDEN COMMENT SHEET */
        .comm-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65%; background: #242526; border-radius: 15px 15px 0 0; z-index: 100; transition: 0.3s cubic-bezier(0, 0, 0.2, 1); display: flex; flex-direction: column; }
        .comm-sheet.active { bottom: 0; }
        .sh-head { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; position: relative; }
        .sh-list { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .sh-input-bar { padding: 10px 15px 25px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .fb-input-style { background: #3a3b3c; border-radius: 20px; padding: 10px 15px; flex: 1; border: none; color: white; outline: none; }

        /* OPTIONS MENU */
        #opt-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 101; transition: 0.3s; padding-bottom: 20px; }
        #opt-sheet.active { bottom: 0; }
        .opt-row { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; font-size: 16px; }
    </style>
</head>
<body>

    <div id="reels-viewport" class="main-scroll"></div>

    <div id="comment-parda" class="comm-sheet">
        <div class="sh-head">Comments <i class="material-icons-outlined" style="position:absolute; right:15px; top:15px" onclick="closeComm()">close</i></div>
        <div class="sh-list" id="msg-box">Koi comment nahi hai.</div>
        <div class="sh-input-bar">
            <input type="text" id="msg-text" class="fb-input-style" placeholder="Comment likhein...">
            <span style="color:#1877F2; font-weight:bold; padding-top:10px" onclick="postMsg()">Post</span>
        </div>
    </div>

    <div id="opt-sheet">
        <div class="opt-row" onclick="alert('Saved!')"><i class="material-icons-outlined">bookmark_border</i> Save Video</div>
        <div class="opt-row" onclick="alert('Downloading...')"><i class="material-icons-outlined">download</i> Download</div>
        <div class="opt-row" style="color:red" onclick="alert('Reported')"><i class="material-icons-outlined">report_problem</i> Report</div>
        <div class="opt-row" onclick="closeOpt()" style="justify-content:center; color:#aaa">Cancel</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function loadReels() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('reels-viewport').innerHTML = data.map(v => `
                    <div class="reel-page">
                        <div class="fb-top"><i class="material-icons-outlined">arrow_back</i><b>IndiVibe</b></div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="fb-right">
                            <div class="act-btn" onclick="like(this)"><i class="material-icons-outlined">favorite_border</i><span>1.2M</span></div>
                            <div class="act-btn" onclick="openComm()"><i class="material-icons-outlined">chat_bubble_outline</i><span>45K</span></div>
                            <div class="act-btn" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform: scaleX(-1);">reply</i><span>Share</span></div>
                            <div class="act-btn" onclick="openOpt()"><i class="material-icons-outlined">more_horiz</i></div>
                        </div>
                        <div class="fb-info">
                            <div class="u-profile">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-img">
                                <span class="u-name">Vishnupur Fifthoot</span>
                                <div class="u-follow">Follow</div>
                            </div>
                            <div class="u-cap">${v.caption || 'IndiVibe Reel'}</div>
                        </div>
                    </div>
                `).join('');
                setupPlayer();
            }
        }

        function setupPlayer() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.reel-page').forEach(r => obs.observe(r));
        }

        function like(el) {
            const i = el.querySelector('i');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        function openComm() { document.getElementById('comment-parda').classList.add('active'); }
        function closeComm() { document.getElementById('comment-parda').classList.remove('active'); }
        function openOpt() { document.getElementById('opt-sheet').classList.add('active'); }
        function closeOpt() { document.getElementById('opt-sheet').classList.remove('active'); }
        function postMsg() {
            const t = document.getElementById('msg-text');
            if(t.value) {
                document.getElementById('msg-box').innerHTML += `<div style="margin-bottom:10px"><b>Aap:</b> ${t.value}</div>`;
                t.value = "";
            }
        }

        loadReels();
    </script>
</body>
</html>

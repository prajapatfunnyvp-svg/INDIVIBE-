<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE - FB Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Header */
        .top-nav { position: absolute; top: 0; width: 100%; z-index: 100; padding: 15px; background: linear-gradient(rgba(0,0,0,0.7), transparent); }
        .top-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        
        /* Sidebar Actions */
        .side-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .btn-node { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .btn-node i { font-size: 32px; }
        .btn-node span { font-size: 13px; font-weight: 500; margin-top: 4px; }
        .liked { color: #ff3040 !important; animation: heartBeat 0.3s ease-in-out; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* User Info */
        .user-data { position: absolute; bottom: 85px; left: 16px; z-index: 100; width: 80%; }
        .u-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .u-img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; }
        .u-txt { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 4px; }
        .caption { font-size: 14px; margin-top: 6px; line-height: 1.4; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }

        /* COMMENT BOX - FB PILL STYLE */
        .comment-zone { position: fixed; bottom: 20px; width: 100%; padding: 0 12px; z-index: 200; }
        .fb-comment-pill { 
            width: 100%; 
            height: 48px; 
            background: rgba(40, 40, 40, 0.7); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; 
            padding: 0 15px; 
            display: flex; align-items: center; 
            border: 0.5px solid rgba(255,255,255,0.15);
        }
        .fb-comment-pill span { flex: 1; color: rgba(255,255,255,0.7); font-size: 15px; }
        .fb-icons { display: flex; gap: 15px; align-items: center; color: rgba(255,255,255,0.9); }
        .fb-icons i { font-size: 22px; }

        /* Big Heart Animation */
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; color: #fff; z-index: 200; pointer-events: none; opacity: 0; transition: 0.3s; }
        .pop { animation: popAnim 0.8s ease-out; }
        @keyframes popAnim { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        /* Menu Sheet */
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 1000; transition: 0.4s; padding-bottom: 30px; }
        .sheet.active { bottom: 0; }
        .row-item { display: flex; align-items: center; gap: 15px; padding: 18px 20px; color: #fff; font-size: 16px; border-bottom: 0.5px solid #333; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 900; }
    </style>
</head>
<body>

    <div id="feed"></div>
    
    <div class="overlay" id="overlay" onclick="hideMenu()"></div>
    <div class="sheet" id="sheet">
        <div style="width: 40px; height: 5px; background: #555; margin: 12px auto; border-radius: 10px;"></div>
        <div class="row-item" id="dlVib"><i class="material-icons-outlined">download</i> <span>Download Video</span></div>
        <div class="row-item" onclick="hideMenu()"><i class="material-icons-outlined">report</i> <span>Report</span></div>
        <div class="row-item" onclick="hideMenu()" style="border:none; color:#ff4444; justify-content:center; font-weight:bold;">Cancel</div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);
        let activeVideo = "";

        async function initFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(v => `
                    <div class="reel">
                        <div class="top-nav">
                            <div class="top-flex">
                                <div class="logo"><i class="material-icons">arrow_back</i> Reels</div>
                                <div style="display:flex; gap:20px;"><i class="material-icons">search</i><i class="material-icons">photo_camera</i></div>
                            </div>
                        </div>

                        <video src="${v.video_url}" loop playsinline onclick="togglePlay(this)" ondblclick="handleLike(this)"></video>
                        <div class="big-heart material-icons">favorite</div>

                        <div class="side-actions">
                            <div class="btn-node" onclick="handleLike(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons-outlined heart-icon">favorite_border</i><span>Like</span>
                            </div>
                            <div class="btn-node"><i class="material-icons-outlined">chat_bubble_outline</i><span>5K</span></div>
                            <div class="btn-node" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="btn-node" onclick="showMenu('${v.video_url}')"><i class="material-icons-outlined">more_horiz</i></div>
                        </div>

                        <div class="user-data">
                            <div class="u-info">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-img">
                                <span class="u-txt">Vishnupur Fifthoot <i class="material-icons" style="color:#1877F2; font-size:16px;">check_circle</i></span>
                            </div>
                            <div class="caption">${v.caption || 'Best romantic ❤️ love story vibe #love'}</div>
                        </div>

                        <div class="comment-zone">
                            <div class="fb-comment-pill">
                                <span>Write a comment...</span>
                                <div class="fb-icons">
                                    <i class="material-icons-outlined">alternate_email</i>
                                    <i class="material-icons-outlined">sentiment_satisfied</i>
                                    <i class="material-icons-outlined">gif_box</i>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupObserver();
            }
        }

        // Logic functions
        function showMenu(url) { activeVideo = url; document.getElementById('sheet').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function hideMenu() { document.getElementById('sheet').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        document.getElementById('dlVib').onclick = () => { window.open(activeVideo); hideMenu(); };

        function togglePlay(v) { v.paused ? v.play() : v.pause(); }

        function handleLike(v) {
            const container = v.parentElement;
            const bigHeart = container.querySelector('.big-heart');
            const sideHeart = container.querySelector('.heart-icon');
            
            // Big Heart Animation
            bigHeart.classList.add('pop');
            setTimeout(() => bigHeart.classList.remove('pop'), 800);

            // Side Heart Color Change
            sideHeart.innerText = 'favorite';
            sideHeart.classList.add('liked');
        }

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => obs.observe(r));
        }

        initFeed();
    </script>
</body>
</html>

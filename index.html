<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* PURE REELS FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* RIGHT SIDE BUTTONS (Like Instagram Screenshot) */
        .vibe-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .vibe-icon { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.9)); }
        .action-label { font-size: 12px; margin-top: 4px; font-weight: 600; text-shadow: 0 1px 3px #000; }

        /* USER INFO (Bottom Left - EXACT ALIGNMENT) */
        .vibe-info { position: absolute; left: 15px; bottom: 95px; width: 75%; z-index: 100; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; pointer-events: auto; }
        .user-pic { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid white; }
        .follow-btn { border: 1.5px solid white; padding: 2px 10px; border-radius: 6px; font-size: 13px; font-weight: bold; background: rgba(255,255,255,0.1); }
        .vibe-desc { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 4px #000; margin-left: 2px; }

        /* BOTTOM NAVIGATION */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #262626; z-index: 1000; }
        .nav-btn { font-size: 28px !important; color: white; opacity: 0.6; }
        .nav-btn.active { opacity: 1; }

        /* COMMENT BOX */
        #comment-box { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; background: #121212; border-radius: 20px 20px 0 0; z-index: 2000; transition: 0.4s; padding: 20px; }
        #comment-box.active { bottom: 0; }
    </style>
</head>
<body>

    <div id="vibe-feed">
        <div style="padding: 100px; text-align: center;">Loading Vibes...</div>
    </div>

    <div id="comment-box">
        <div style="width: 40px; height: 4px; background: #333; margin: 0 auto 20px;" onclick="closeComments()"></div>
        <h3>Comments</h3>
        <div id="comments-list" style="height: 70%; overflow-y: auto; color: gray;">Koi comment nahi hai.</div>
        <div style="position: absolute; bottom: 20px; width: 90%; display: flex; gap: 10px;">
            <input type="text" placeholder="Add comment..." style="flex:1; background:#222; border:none; padding:12px; border-radius:20px; color:white;">
            <button style="background:none; border:none; color:#00f2ea; font-weight:bold;">Post</button>
        </div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-btn" onclick="location.reload()">home</span>
        <span class="material-icons-outlined nav-btn">search</span>
        <span class="material-icons-outlined nav-btn" onclick="alert('Upload logic is live!')">add_box</span>
        <span class="material-icons-outlined nav-btn active">play_circle</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" style="width:26px; height:26px; border-radius:50%; border:1px solid #fff;">
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function fetchVibes() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline webkit-playsinline></video>
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pic">
                                <span style="font-weight:700;">@vishnu_vibes</span>
                                <span class="follow-btn">Follow</span>
                            </div>
                            <div class="vibe-desc">${v.caption || 'IndiVibe Quality Content 🇮🇳'}</div>
                        </div>
                        <div class="vibe-actions">
                            <div class="action-item" onclick="like(this)">
                                <span class="material-icons-outlined vibe-icon">favorite_border</span>
                                <span class="action-label">1.5M</span>
                            </div>
                            <div class="action-item" onclick="openComments()">
                                <span class="material-icons-outlined vibe-icon">chat_bubble_outline</span>
                                <span class="action-label">45K</span>
                            </div>
                            <div class="action-item" onclick="navigator.share({url:'${v.video_url}'})">
                                <span class="material-icons-outlined vibe-icon">send</span>
                            </div>
                            <div class="action-item" onclick="downloadVideo('${v.video_url}')">
                                <span class="material-icons-outlined vibe-icon">more_horiz</span>
                                <span class="action-label">Download</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupScrolling();
            }
        }

        // 🟢 INSTAGRAM SCROLLING (Auto Stop/Play)
        function setupScrolling() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        vid.play().catch(() => {});
                    } else {
                        vid.pause();
                        vid.currentTime = 0;
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-card').forEach(c => observer.observe(c));
        }

        function openComments() { document.getElementById('comment-box').classList.add('active'); }
        function closeComments() { document.getElementById('comment-box').classList.remove('active'); }

        function downloadVideo(url) {
            // Branded Download Name (Promotion)
            const a = document.createElement('a');
            a.href = url;
            a.download = `IndiVibe_@vishnu_vibes_Reel.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function like(el) {
            const icon = el.querySelector('.vibe-icon');
            icon.innerText = (icon.innerText === 'favorite_border') ? 'favorite' : 'favorite_border';
            icon.style.color = (icon.innerText === 'favorite') ? 'red' : 'white';
        }

        fetchVibes();
    </script>
</body>
</html>

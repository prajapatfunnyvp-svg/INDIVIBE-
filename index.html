<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .container { border: 2px solid #00f2ea; padding: 25px; border-radius: 20px; width: 85%; }
        button { background: #00f2ea; color: #000; border: none; padding: 15px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 20px; box-shadow: 0 0 15px #00f2ea; }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; position: fixed; top: 0; left: 0; }
        .err { color: #ff4b4b; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui" class="container">
        <h2 id="status">Connecting to INDIVIBE...</h2>
        <p id="msg">Checking Database...</p>
        <div id="action"></div>
    </div>

    <video id="player" loop playsinline controls></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        // Dhyaan se: Poori Key bina kisi space ke
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';

        const _supa = supabase.createClient(URL, KEY);

        async function init() {
            const st = document.getElementById('status');
            const msg = document.getElementById('msg');

            try {
                // Table 'videos' se data mangwana
                const { data, error } = await _supa.from('videos').select('*');

                if (error) {
                    st.innerText = "Connection Failed";
                    msg.innerHTML = `<span class="err">${error.message}</span>`;
                } else if (data && data.length > 0) {
                    st.innerText = "INDIVIBE READY!";
                    msg.innerText = "Database Connected Successfully";
                    document.getElementById('action').innerHTML = '<button onclick="playNow()">WATCH NOW</button>';
                    // ID 10 wala link set karna
                    document.getElementById('player').src = data[data.length - 1].video_url;
                } else {
                    st.innerText = "Empty Database";
                    msg.innerText = "Add a video link in Supabase table.";
                }
            } catch (err) {
                st.innerText = "System Error";
                msg.innerText = err.message;
            }
        }

        function playNow() {
            document.getElementById('ui').style.display = 'none';
            const vid = document.getElementById('player');
            vid.style.display = 'block';
            vid.play();
        }

        init();
    </script>
</body>
</html>

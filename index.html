<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE Pro - FB Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Full Screen Snap Scroll */
        #feed-wrapper { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed-wrapper::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Top Branding */
        .top-brand { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 24px; font-weight: 900; text-shadow: 2px 2px 10px #000; }
        .top-right-icons { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; gap: 20px; }

        /* RIGHT SIDE ACTIONS (FB Style Spacing) */
        .sidebar-actions { position: absolute; right: 12px; bottom: 125px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 100; }
        .action-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
        .action-btn i { font-size: 34px; text-shadow: 0 2px 8px #000; }
        .action-btn span { font-size: 13px; font-weight: 600; margin-top: 4px; text-shadow: 0 1px 3px #000; }
        .liked-heart { color: #ff3040 !important; }

        /* USER DATA (Bottom Left) */
        .user-section { position: absolute; bottom: 95px; left: 15px; z-index: 100; max-width: 75%; }
        .profile-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .pfp-img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #fff; }
        .v-check { color: #1877F2; font-size: 18px; margin-left: 4px; }

        /* FACEBOOK STYLE FLOATING COMMENT BOX */
        .comment-container { position: absolute; bottom: 25px; width: 100%; padding: 0 15px; z-index: 100; display: flex; justify-content: center; }
        .comment-box-pill { 
            width: 100%; max-width: 500px; background: rgba(45, 45, 45, 0.7); 
            backdrop-filter: blur(15px); border-radius: 30px; padding: 12px 20px; 
            display: flex; align-items: center; justify-content: space-between;
            border: 0.5px solid rgba(255,255,255,0.2);
        }
        .comment-box-pill span { color: #e4e6eb; font-size: 15px; }

        /* THREE DOT MODAL */
        .bottom-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; 
            border-top-left-radius: 20px; border-top-right-radius: 20px; 
            padding: 10px 0 30px 0; z-index: 1000; transition: 0.3s ease;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-bottom: 0.5px solid #333; cursor: pointer; color: #e4e6eb; }
        .sheet-item i { font-size: 28px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 900; }

        /* Double Tap Heart Pop */
        .pop-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; color: #fff; opacity: 0; z-index: 200; pointer-events: none; }
        .pop-animation { animation: fbInstaPop 0.8s ease; }
        @keyframes fbInstaPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="feed-wrapper"></div>
    
    <div class="modal-overlay" id="sheetOverlay" onclick="closeFBMenu()"></div>
    <div class="bottom-sheet" id="fbSheet">
        <div style="width: 40px; height: 4px; background: #555; margin: 10px auto; border-radius: 2px;"></div>
        <div class="sheet-item" id="downloadAction"><i class="material-icons-outlined">download</i> <span>Save Video (Download)</span></div>
        <div class="sheet-item" onclick="alert('Added to Not Interested'); closeFBMenu()"><i class="material-icons-outlined">visibility_off</i> <span>Not Interested</span></div>
        <div class="sheet-item" onclick="alert('Report Sent'); closeFBMenu()"><i class="material-icons-outlined">report</i> <span>Report Reel</span></div>
        <div class="sheet-item" onclick="closeFBMenu()" style="border:none; color:#888; justify-content:center;"><span>Cancel</span></div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        let tempUrl = "";

        async function initFeed() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feed-wrapper').innerHTML = data.map(v => `
                    <div class="reel-unit">
                        <div class="top-brand">INDIVIBE</div>
                        <div class="top-right-icons"><i class="material-icons-outlined">search</i><i class="material-icons-outlined">person</i></div>
                        
                        <video src="${v.video_url}" loop playsinline onclick="handleTap(this)" ondblclick="handleDoubleTap(this)"></video>
                        <div class="pop-heart material-icons-outlined">favorite</div>

                        <div class="sidebar-actions">
                            <div class="action-btn" onclick="handleDoubleTap(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons-outlined h-icon">favorite_border</i><span>14K</span>
                            </div>
                            <div class="action-btn" onclick="alert('Opening Comments...')">
                                <i class="material-icons-outlined">chat_bubble_outline</i><span>980</span>
                            </div>
                            <div class="action-btn" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons-outlined" style="transform: scaleX(-1);">reply</i><span>Share</span>
                            </div>
                            <div class="action-btn" onclick="openFBMenu('${v.video_url}')">
                                <i class="material-icons-outlined">more_horiz</i>
                            </div>
                        </div>

                        <div class="user-section">
                            <div class="profile-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="pfp-img">
                                <span style="font-weight:bold; font-size:16px;">Vishnupur Fifthoot <i class="material-icons v-check">check_circle</i></span>
                            </div>
                            <p style="padding-left:4px; font-size:14.5px; text-shadow:1px 1px 3px #000;">${v.caption || ''}</p>
                        </div>

                        <div class="comment-container">
                            <div class="comment-box-pill">
                                <span>Write a comment...</span>
                                <i class="material-icons-outlined" style="opacity:0.7;">sentiment_satisfied</i>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupObserver();
            }
        }

        function openFBMenu(url) {
            tempUrl = url;
            document.getElementById('sheetOverlay').style.display = 'block';
            document.getElementById('fbSheet').classList.add('active');
        }

        function closeFBMenu() {
            document.getElementById('sheetOverlay').style.display = 'none';
            document.getElementById('fbSheet').classList.remove('active');
        }

        document.getElementById('downloadAction').onclick = () => { window.open(tempUrl); closeFBMenu(); };

        let clickT;
        function handleTap(v) {
            if (clickT) return;
            clickT = setTimeout(() => { v.paused ? v.play() : v.pause(); clickT = null; }, 250);
        }

        function handleDoubleTap(v) {
            clearTimeout(clickT); clickT = null;
            const h = v.parentElement.querySelector('.pop-heart');
            h.classList.add('pop-animation');
            setTimeout(() => h.classList.remove('pop-animation'), 800);
            
            const icon = v.parentElement.querySelector('.h-icon');
            icon.innerText = 'favorite'; icon.classList.add('liked-heart');
        }

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-unit').forEach(r => obs.observe(r));
        }

        initFeed();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, system-ui, Roboto, sans-serif; overflow: hidden; }

        /* REELS FEED */
        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* RIGHT ACTIONS (As per your Instagram screenshot) */
        .vibe-actions { position: absolute; right: 10px; bottom: 90px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .vibe-icon { font-size: 30px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .action-label { font-size: 11px; margin-top: 2px; font-weight: 600; text-shadow: 0 1px 3px #000; }

        /* USER INFO (Bottom Left) */
        .vibe-info { position: absolute; left: 12px; bottom: 90px; width: 75%; z-index: 100; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; pointer-events: auto; }
        .user-pic { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid white; object-fit: cover; }
        .user-name { font-weight: 700; font-size: 14px; text-shadow: 0 1px 4px #000; }
        .follow-btn { border: 1px solid white; padding: 2px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.1); color: white; }
        .vibe-desc { font-size: 14px; line-height: 1.3; text-shadow: 0 1px 4px #000; padding-left: 2px; }

        /* BOTTOM NAVIGATION BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #262626; z-index: 1000; }
        .nav-btn { font-size: 26px !important; color: white; opacity: 0.6; }
        .nav-btn.active { opacity: 1; }
        .profile-thumb { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid white; }
    </style>
</head>
<body>

    <div id="vibe-feed">
        <div style="padding: 20px; text-align: center;">Loading Vibes...</div>
    </div>

    <div class="nav-bar">
        <span class="material-icons-outlined nav-btn" onclick="location.reload()">home</span>
        <span class="material-icons-outlined nav-btn">search</span>
        <span class="material-icons-outlined nav-btn" onclick="alert('Upload coming soon!')">add_box</span>
        <span class="material-icons-outlined nav-btn active">play_circle</span>
        <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="profile-thumb">
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function getReels() {
            const { data, error } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-card">
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        
                        <div class="vibe-info">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-pic">
                                <span class="user-name">@vishnu_vibes</span>
                                <button class="follow-btn">Follow</button>
                            </div>
                            <div class="vibe-desc">${v.caption || 'Made with IndiVibe ❤️'}</div>
                        </div>

                        <div class="vibe-actions">
                            <div class="action-item" onclick="handleLike(this)">
                                <span class="material-icons-outlined vibe-icon">favorite_border</span>
                                <span class="action-label">1.2M</span>
                            </div>
                            <div class="action-item" onclick="alert('Comments opening...')">
                                <span class="material-icons-outlined vibe-icon">chat_bubble_outline</span>
                                <span class="action-label">15.5K</span>
                            </div>
                            <div class="action-item" onclick="navigator.share({url: '${v.video_url}'})">
                                <span class="material-icons-outlined vibe-icon">send</span>
                            </div>
                            <div class="action-item" onclick="showMoreOptions('${v.video_url}')">
                                <span class="material-icons-outlined vibe-icon">more_horiz</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                setupScrolling();
            }
        }

        function setupScrolling() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                    } else {
                        video.pause();
                        video.currentTime = 0;
                    }
                });
            }, { threshold: 0.7 });

            document.querySelectorAll('.vibe-card').forEach(card => observer.observe(card));
        }

        function handleLike(el) {
            const icon = el.querySelector('.vibe-icon');
            if (icon.innerText === 'favorite_border') {
                icon.innerText = 'favorite';
                icon.style.color = '#ff3040';
            } else {
                icon.innerText = 'favorite_border';
                icon.style.color = 'white';
            }
        }

        function showMoreOptions(url) {
            if(confirm("Do you want to download this video?")) {
                const a = document.createElement('a');
                a.href = url;
                a.download = "IndiVibe_Reel.mp4";
                a.click();
            }
        }

        getReels();
    </script>
</body>
</html>

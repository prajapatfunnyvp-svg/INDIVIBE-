<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIVIBE Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        /* REELS SCROLL CONTAINER */
        #reels-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #reels-feed::-webkit-scrollbar { display: none; }
        .reel-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* TOP BRANDING & WATERMARK */
        .top-brand { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 22px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* SIDE ACTIONS (SAVE & REPORT) */
        .side-bar { position: absolute; right: 15px; top: 45%; display: flex; flex-direction: column; gap: 25px; z-index: 100; align-items: center; }
        .side-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .side-item i { font-size: 32px !important; color: #fff; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7)); }
        .side-item span { font-size: 11px; font-weight: bold; }

        /* USER OVERLAY */
        .user-info { position: absolute; bottom: 135px; left: 15px; z-index: 100; }
        .u-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .u-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #fff; }
        .u-name { font-weight: 700; font-size: 15px; }

        /* FACEBOOK STYLE BOTTOM ROW */
        .action-row { position: absolute; bottom: 75px; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); z-index: 100; border-top: 0.1px solid rgba(255,255,255,0.1); }
        .act-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .act-btn i { font-size: 28px !important; }
        .act-btn span { font-size: 14px; font-weight: 700; }

        /* BOTTOM NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #262626; z-index: 1000; }
        .nav-bar i { font-size: 28px; color: #fff; }

        /* BIG HEART POP */
        .heart-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 110px; color: #ff3040; opacity: 0; z-index: 500; pointer-events: none; }
        .heart-pop.active { animation: popAnim 0.8s ease; }
        @keyframes popAnim { 0% { transform: translate(-50%,-50%) scale(0); opacity: 0; } 50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0; } }
    </style>
</head>
<body>

    <div id="reels-feed"></div>

    <div class="nav-bar">
        <i class="material-icons-outlined" style="color: #1877F2;">home</i>
        <i class="material-icons-outlined">search</i>
        <i class="material-icons-outlined">add_box</i>
        <i class="material-icons-outlined">person_outline</i>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        async function loadReels() {
            const { data } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('reels-feed').innerHTML = data.map(v => `
                    <div class="reel-frame">
                        <div class="top-brand">INDIVIBE</div>
                        <video src="${v.video_url}" loop playsinline onclick="togglePlay(this)" ondblclick="likeVideo(this)"></video>
                        <div class="heart-pop material-icons-outlined">favorite</div>
                        
                        <div class="side-bar">
                            <div class="side-item" onclick="window.open('${v.video_url}')"><i class="material-icons-outlined">download</i><span>Save</span></div>
                            <div class="side-item" onclick="alert('Report Sent')"><i class="material-icons-outlined">report_problem</i><span>Report</span></div>
                        </div>

                        <div class="user-info">
                            <div class="u-head">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="u-img">
                                <span class="u-name">rajasthanking007</span>
                            </div>
                            <p style="padding-left:52px; font-size:14px; opacity:0.9;">${v.caption || ''}</p>
                        </div>

                        <div class="action-row">
                            <div class="act-btn" onclick="likeVideo(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons-outlined l-icon">favorite_border</i><span>Like</span>
                            </div>
                            <div class="act-btn" onclick="alert('Comments opening...')">
                                <i class="material-icons-outlined">chat_bubble_outline</i><span>Comment</span>
                            </div>
                            <div class="act-btn" onclick="navigator.share({url:'${v.video_url}'})">
                                <i class="material-icons-outlined">share</i><span>Share</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                attachIntersectionObserver();
            }
        }

        let clickTimer;
        function togglePlay(v) {
            if (clickTimer) return;
            clickTimer = setTimeout(() => { v.paused ? v.play() : v.pause(); clickTimer = null; }, 250);
        }

        function likeVideo(v) {
            clearTimeout(clickTimer); clickTimer = null;
            const pop = v.parentElement.querySelector('.heart-pop');
            pop.classList.add('active');
            setTimeout(() => pop.classList.remove('active'), 800);
            
            const heartIcon = v.parentElement.querySelector('.l-icon');
            heartIcon.innerText = 'favorite'; 
            heartIcon.style.color = '#ff3040';
        }

        function attachIntersectionObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) video.play(); else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-frame').forEach(reel => observer.observe(reel));
        }

        loadReels();
    </script>
</body>
</html>

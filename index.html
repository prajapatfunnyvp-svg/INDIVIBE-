<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE SUCCESS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .card { border: 2px solid #00f2ea; padding: 40px; border-radius: 30px; width: 85%; background: #111; box-shadow: 0 0 20px #00f2ea; }
        button { background: #00f2ea; color: #000; border: none; padding: 22px 55px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 26px; margin-top: 25px; box-shadow: 0 0 15px #00f2ea; }
    </style>
</head>
<body>
    <div id="ui" class="card">
        <h1>INDIVIBE</h1>
        <p id="st">Searching for Video...</p>
        <div id="box"></div>
    </div>
    <video id="v" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover;" controls playsinline loop></video>

    <script>
        const URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const _supa = supabase.createClient(URL, KEY);

        async function start() {
            const { data, error } = await _supa.from('videos').select('*');
            if (data && data.length > 0) {
                document.getElementById('st').innerText = "SUCCESS!";
                document.getElementById('box').innerHTML = '<button onclick="play()">WATCH NOW</button>';
                document.getElementById('v').src = data[data.length - 1].video_url;
            } else {
                document.getElementById('st').innerText = "Database is Empty! Check Supabase.";
            }
        }
        function play() {
            document.getElementById('ui').style.display = 'none';
            const vid = document.getElementById('v');
            vid.style.display = 'block';
            vid.play();
        }
        start();
    </script>
</body>
</html>

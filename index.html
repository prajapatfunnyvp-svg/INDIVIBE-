<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDIVIBE SUCCESS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #00f2ea; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .success-card { border: 2px solid #00f2ea; padding: 40px; border-radius: 25px; width: 85%; background: rgba(0,0,0,0.9); box-shadow: 0 0 20px #00f2ea; }
        button { background: #00f2ea; color: #000; border: none; padding: 18px 40px; border-radius: 35px; font-weight: bold; cursor: pointer; font-size: 22px; margin-top: 25px; }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; position: fixed; top: 0; left: 0; z-index: 1000; }
    </style>
</head>
<body>

    <div id="welcome" class="success-card">
        <h1 id="title">INDIVIBE LIVE</h1>
        <p id="status">Database Connected!</p>
        <div id="action-btn">
            <p>Loading Video Link...</p>
        </div>
    </div>

    <video id="player" loop playsinline controls></video>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4amJtamJ1cmRrc2ZqeWhyeHAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTg1NjE3NiwiZXhwIjoyMDU3NDMyMTc2fQ.Sb_publishable_JNJD6bR0P-R_GdV8yYdWKQ_diwkhxpC';
        const _supa = supabase.createClient(S_URL, S_KEY);

        async function loadVideo() {
            const { data, error } = await _supa.from('videos').select('*');
            
            if (data && data.length > 0) {
                document.getElementById('status').innerText = "System Ready!";
                document.getElementById('action-btn').innerHTML = '<button onclick="playVideo()">WATCH NOW</button>';
                // ID 10 wala video link uthayega
                document.getElementById('player').src = data[data.length - 1].video_url;
            } else {
                document.getElementById('status').innerText = "No Video Found in DB";
            }
        }

        function playVideo() {
            document.getElementById('welcome').style.display = 'none';
            const v = document.getElementById('player');
            v.style.display = 'block';
            v.play();
        }

        loadVideo();
    </script>
</body>
</html>

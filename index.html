<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiVibe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* Instagram Style Vertical Scroll */
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        
        .reel-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* FB Style Top Bar */
        .header-fb { position: absolute; top: 0; width: 100%; height: 55px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 10; }
        .header-fb b { font-size: 20px; flex: 1; font-weight: 600; }

        /* Side Icons */
        .actions-side { position: absolute; right: 12px; bottom: 85px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .act-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .act-item i { font-size: 32px !important; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .act-item span { font-size: 11px; margin-top: 2px; font-weight: bold; text-shadow: 0 1px 2px #000; }

        /* Profile & Caption Area (CLEAN - No Input Box) */
        .bottom-ui { position: absolute; bottom: 30px; left: 15px; width: 75%; z-index: 10; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .p-img { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #fff; }
        .p-name { font-weight: 700; font-size: 15px; text-shadow: 0 1px 2px #000; }
        .f-btn { border: 1px solid #fff; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .cap-text { font-size: 14px; line-height: 1.4; text-shadow: 0 1px 3px #000; }

        /* 📱 INSTA-STYLE SLIDING COMMENT SHEET */
        #comment-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65%; background: #242526; border-radius: 15px 15px 0 0; z-index: 100; transition: 0.3s cubic-bezier(0, 0, 0.2, 1); display: flex; flex-direction: column; }
        #comment-sheet.active { bottom: 0; }
        .sh-head { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; position: relative; }
        .sh-list { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        
        /* FB DESIGN INPUT BOX INSIDE SHEET */
        .sh-footer { padding: 10px 15px 25px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .fb-input { background: #3a3b3c; border-radius: 20px; padding: 10px 15px; flex: 1; border: none; color: white; outline: none; font-size: 14px; }
        .fb-send { color: #1877F2; font-weight: bold; padding-top: 10px; }

        /* THREE DOTS OPTIONS MENU */
        #more-menu { position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; border-radius: 15px 15px 0 0; z-index: 101; transition: 0.3s; }
        #more-menu.active { bottom: 0; }
        .opt-row { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; font-size: 16px; }
    </style>
</head>
<body>

    <div id="reels-feed" class="reels-container"></div>

    <div id="comment-sheet">
        <div class="sh-head">Comments <i class="material-icons-outlined" style="position:absolute; right:15px;" onclick="toggleComm(false)">close</i></div>
        <div class="sh-list" id="comm-data">No comments yet.</div>
        <div class="sh-footer">
            <input type="text" id="comm-in" class="fb-input" placeholder="Comment jodein...">
            <span class="fb-send" onclick="postComm()">Post</span>
        </div>
    </div>

    <div id="more-menu">
        <div class="opt-row" onclick="alert('Video Saved!')"><i class="material-icons-outlined">bookmark_border</i> Save Video</div>
        <div class="opt-row" onclick="alert('Downloading...')"><i class="material-icons-outlined">download</i> Download</div>
        <div class="opt-row" style="color:red" onclick="alert('Reported')"><i class="material-icons-outlined">report_problem</i> Report</div>
        <div class="opt-row" onclick="toggleMenu(false)" style="justify-content:center; color:#aaa">Cancel</div>
    </div>

    <script>
        const S_URL = 'https://jxjbmjburdksqfjyhrxp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function init() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('reels-feed').innerHTML = data.map(v => `
                    <div class="reel-unit">
                        <div class="header-fb">
                            <i class="material-icons-outlined">arrow_back</i>
                            <b>IndiVibe</b>
                            <i class="material-icons-outlined" style="margin-left:auto">search</i>
                            <i class="material-icons-outlined" style="margin-left:15px">camera_alt</i>
                        </div>
                        <video src="${v.video_url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="actions-side">
                            <div class="act-item" onclick="like(this)"><i class="material-icons-outlined">favorite_border</i><span>1.2M</span></div>
                            <div class="act-item" onclick="toggleComm(true)"><i class="material-icons-outlined">chat_bubble_outline</i><span>45K</span></div>
                            <div class="act-item" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform: scaleX(-1);">reply</i><span>Share</span></div>
                            <div class="act-item" onclick="toggleMenu(true)"><i class="material-icons-outlined">more_horiz</i></div>
                        </div>
                        <div class="bottom-ui">
                            <div class="user-row">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="p-img">
                                <span class="p-name">Vishnupur Fifthoot</span>
                                <div class="f-btn">Follow</div>
                            </div>
                            <div class="cap-text">${v.caption || ''}</div>
                        </div>
                    </div>
                `).join('');
                setupObserver();
            }
        }

        function setupObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.reel-unit').forEach(u => obs.observe(u));
        }

        function like(el) {
            const i = el.querySelector('i');
            if(i.innerText === 'favorite_border') { i.innerText = 'favorite'; i.style.color = '#ff3040'; }
            else { i.innerText = 'favorite_border'; i.style.color = 'white'; }
        }

        function toggleComm(show) {
            document.getElementById('comment-sheet').classList.toggle('active', show);
        }

        function toggleMenu(show) {
            document.getElementById('more-menu').classList.toggle('active', show);
        }

        function postComm() {
            const val = document.getElementById('comm-in').value;
            if(val) {
                document.getElementById('comm-data').innerHTML += `<div style="margin-bottom:10px"><b>Aap:</b> ${val}</div>`;
                document.getElementById('comm-in').value = "";
            }
        }

        init();
    </script>
</body>
</html>

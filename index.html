<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        #vibe-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #vibe-feed::-webkit-scrollbar { display: none; }
        .vibe-unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Top Header */
        .vibe-header { position: absolute; top: 15px; width: 100%; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .vibe-logo { font-size: 24px; font-weight: 900; text-shadow: 2px 2px 10px #000; }

        /* SIDE ACTIONS (Vertical FB Style) */
        .vibe-sidebar { position: absolute; right: 12px; bottom: 130px; display: flex; flex-direction: column; gap: 24px; align-items: center; z-index: 100; }
        .action-node { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-node i { font-size: 32px; text-shadow: 0 2px 10px #000; }
        .action-node span { font-size: 13px; font-weight: 600; margin-top: 4px; }
        .is-liked { color: #ff3040 !important; }

        /* USER DATA */
        .vibe-user-info { position: absolute; bottom: 95px; left: 15px; z-index: 100; max-width: 75%; }
        .user-flex { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #fff; }
        .blue-tick { color: #1877F2; font-size: 18px; margin-left: 4px; vertical-align: middle; }

        /* EXACT FB FLOATING COMMENT BOX */
        .vibe-comment-bar { position: absolute; bottom: 25px; width: 100%; padding: 0 15px; z-index: 100; }
        .fb-pill { 
            background: rgba(30, 30, 30, 0.6); 
            backdrop-filter: blur(15px); border-radius: 30px; 
            padding: 12px 20px; display: flex; align-items: center; 
            justify-content: space-between; border: 0.5px solid rgba(255,255,255,0.2);
        }
        .fb-pill span { color: #ccc; font-size: 15px; }

        /* THREE DOT MENU */
        .fb-bottom-menu { 
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #242526; 
            border-top-left-radius: 20px; border-top-right-radius: 20px; 
            padding: 20px; z-index: 500; transition: 0.3s ease;
        }
        .fb-bottom-menu.active { bottom: 0; }
        .menu-row { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 0.5px solid #333; cursor: pointer; }
        .menu-row i { font-size: 26px; }
        .overlay-scrim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 400; }

        /* Heart Animation */
        .h-pop-up { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 130px; color: #fff; z-index: 200; pointer-events: none; opacity: 0; }
        .pop-active { animation: heartEffect 0.8s ease; }
        @keyframes heartEffect { 0% { scale: 0; opacity: 0; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1; opacity: 0; } }
    </style>
</head>
<body>

    <div id="vibe-feed"></div>
    
    <div class="overlay-scrim" id="scrim" onclick="closeMenu()"></div>
    <div class="fb-bottom-menu" id="menu">
        <div class="menu-row" id="saveBtn"><i class="material-icons-outlined">download</i> <span>वीडियो सेव करें (Download)</span></div>
        <div class="menu-row" onclick="alert('Not Interested Saved'); closeMenu()"><i class="material-icons-outlined">visibility_off</i> <span>Not Interested</span></div>
        <div class="menu-row" onclick="alert('Report Sent'); closeMenu()"><i class="material-icons-outlined">report</i> <span>रिपोर्ट करें (Report)</span></div>
        <div class="menu-row" onclick="closeMenu()" style="border:none; justify-content:center; color:#999;"><span>बंद करें</span></div>
    </div>

    <script>
        const S_URL = "https://jxjbmjburdksqfjyhrxp.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amJtamJ1cmRrc3FmanlocnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTM0MTksImV4cCI6MjA4ODg4OTQxOX0.GrspI5dWCP6Tugzuqdhcs11Zrr7ZR6E5awFZbPDNVC4";
        const supa = supabase.createClient(S_URL, S_KEY);

        let currentUrl = "";

        async function initVibe() {
            const { data } = await supa.from('videos').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('vibe-feed').innerHTML = data.map(v => `
                    <div class="vibe-unit">
                        <div class="vibe-header">
                            <div class="vibe-logo">INDIVIBE</div>
                            <div style="display:flex; gap:18px;"><i class="material-icons-outlined">search</i><i class="material-icons-outlined">person</i></div>
                        </div>

                        <video src="${v.video_url}" loop playsinline onclick="vPlay(this)" ondblclick="vLike(this)"></video>
                        <div class="h-pop-up material-icons-outlined">favorite</div>

                        <div class="vibe-sidebar">
                            <div class="action-node" onclick="vLike(this.parentElement.parentElement.querySelector('video'))">
                                <i class="material-icons-outlined h-icon">favorite_border</i><span>14K</span>
                            </div>
                            <div class="action-node"><i class="material-icons-outlined">chat_bubble_outline</i><span>980</span></div>
                            <div class="action-node" onclick="navigator.share({url:'${v.video_url}'})"><i class="material-icons-outlined" style="transform:scaleX(-1)">reply</i><span>Share</span></div>
                            <div class="action-node" onclick="openMenu('${v.video_url}')"><i class="material-icons-outlined">more_horiz</i></div>
                        </div>

                        <div class="vibe-user-info">
                            <div class="user-flex">
                                <img src="https://prajapatfunnyvp-svg.github.io/INDIVIBE-/1000033710.png" class="user-avatar">
                                <span style="font-weight:bold; font-size:16px;">Vishnupur Fifthoot <i class="material-icons blue-tick">check_circle</i></span>
                            </div>
                            <p style="padding-left:4px; font-size:14.5px; text-shadow:1px 1px 3px #000;">${v.caption || ''}</p>
                        </div>

                        <div class="vibe-comment-bar">
                            <div class="fb-pill">
                                <span>Write a comment...</span>
                                <i class="material-icons-outlined" style="font-size:24px; opacity:0.7;">sentiment_satisfied</i>
                            </div>
                        </div>
                    </div>
                `).join('');
                startObserver();
            }
        }

        function openMenu(url) {
            currentUrl = url;
            document.getElementById('scrim').style.display = 'block';
            document.getElementById('menu').classList.add('active');
        }

        function closeMenu() {
            document.getElementById('scrim').style.display = 'none';
            document.getElementById('menu').classList.remove('active');
        }

        document.getElementById('saveBtn').onclick = () => { window.open(currentUrl); closeMenu(); };

        let t;
        function vPlay(v) {
            if (t) return;
            t = setTimeout(() => { v.paused ? v.play() : v.pause(); t = null; }, 250);
        }

        function vLike(v) {
            clearTimeout(t); t = null;
            const h = v.parentElement.querySelector('.h-pop-up');
            h.classList.add('pop-active');
            setTimeout(() => h.classList.remove('pop-active'), 800);
            const icon = v.parentElement.querySelector('.h-icon');
            icon.innerText = 'favorite'; icon.classList.add('is-liked');
        }

        function startObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play(); else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.vibe-unit').forEach(r => obs.observe(r));
        }

        initVibe();
    </script>
</body>
</html>
